<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIT JEE Mock Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --accent-math: #f59e0b;
    --accent-chem: #10b981;
    --accent-phys: #3b82f6;
    --text: #f0f0f5;
    --muted: #6b7280;
    --correct: #22c55e;
    --wrong: #ef4444;
    --radius: 16px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Outfit', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .container { max-width: 860px; margin: 0 auto; padding: 40px 20px 80px; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 48px; animation: fadeDown 0.6s ease; }
  .logo-badge { display: inline-block; font-family: 'Space Mono', monospace; font-size: 11px; letter-spacing: 3px; color: var(--muted); border: 1px solid var(--border); padding: 6px 16px; border-radius: 20px; margin-bottom: 20px; text-transform: uppercase; }
  header h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800; line-height: 1.1; margin-bottom: 12px; background: linear-gradient(135deg, #fff 30%, #6b7280); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  header p { color: var(--muted); font-size: 15px; font-weight: 300; }
  .scoreboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 40px; animation: fadeUp 0.6s 0.1s ease both; }
  .score-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px; text-align: center; }
  .score-card .val { font-size: 2rem; font-weight: 800; font-family: 'Space Mono', monospace; }
  .score-card .lbl { font-size: 11px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
  #score-val { color: var(--correct); }
  #wrong-val { color: var(--wrong); }
  #remain-val { color: var(--accent-phys); }
  .filter-tabs { display: flex; gap: 8px; margin-bottom: 32px; flex-wrap: wrap; animation: fadeUp 0.6s 0.2s ease both; }
  .tab { padding: 8px 20px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; }
  .tab:hover { border-color: #555; color: var(--text); }
  .tab.active { color: #000; border-color: transparent; }
  .tab[data-filter="all"].active { background: var(--text); }
  .tab[data-filter="Mathematics"].active { background: var(--accent-math); }
  .tab[data-filter="Chemistry"].active { background: var(--accent-chem); }
  .tab[data-filter="Physics"].active { background: var(--accent-phys); }
  .section-heading { display: flex; align-items: center; gap: 12px; margin: 40px 0 20px; }
  .section-heading .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .section-heading h2 { font-size: 13px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); }
  .section-heading .line { flex: 1; height: 1px; background: var(--border); }
  .q-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; transition: border-color 0.3s; animation: fadeUp 0.5s ease both; }
  .q-card:hover { border-color: #3a3a50; }
  .q-card.answered-correct { border-color: var(--correct); }
  .q-card.answered-wrong { border-color: var(--wrong); }
  .q-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .q-num { font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted); background: var(--surface); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border); }
  .q-tag { font-size: 11px; font-weight: 600; letter-spacing: 1px; padding: 4px 12px; border-radius: 6px; text-transform: uppercase; }
  .tag-math { background: rgba(245,158,11,0.15); color: var(--accent-math); }
  .tag-chem { background: rgba(16,185,129,0.15); color: var(--accent-chem); }
  .tag-phys { background: rgba(59,130,246,0.15); color: var(--accent-phys); }
  .chapter-tag { font-size: 11px; color: var(--muted); background: var(--surface); padding: 4px 10px; border-radius: 6px; margin-left: auto; }
  .q-text { font-size: 15px; line-height: 1.7; color: #e0e0ea; margin-bottom: 20px; font-weight: 400; }
  .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 18px; }
  @media (max-width: 580px) { .options { grid-template-columns: 1fr; } }
  .opt-btn { display: flex; align-items: center; gap: 12px; padding: 12px 16px; background: var(--surface); border: 1.5px solid var(--border); border-radius: 12px; color: var(--text); font-family: 'Outfit', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.2s; text-align: left; }
  .opt-btn:hover:not(:disabled) { border-color: #555; background: #1e1e2e; }
  .opt-btn .opt-label { width: 24px; height: 24px; border-radius: 6px; background: var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; font-family: 'Space Mono', monospace; flex-shrink: 0; transition: all 0.2s; }
  .opt-btn.selected { border-color: #6b7aff; background: rgba(107,122,255,0.1); }
  .opt-btn.selected .opt-label { background: #6b7aff; color: #fff; }
  .opt-btn.correct { border-color: var(--correct) !important; background: rgba(34,197,94,0.1) !important; }
  .opt-btn.correct .opt-label { background: var(--correct); color: #000; }
  .opt-btn.wrong { border-color: var(--wrong) !important; background: rgba(239,68,68,0.1) !important; }
  .opt-btn.wrong .opt-label { background: var(--wrong); color: #fff; }
  .opt-btn:disabled { cursor: default; }
  .check-btn { width: 100%; padding: 13px; border-radius: 12px; border: none; background: linear-gradient(135deg, #6b7aff, #a855f7); color: #fff; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s; letter-spacing: 0.5px; }
  .check-btn:hover { opacity: 0.9; transform: translateY(-1px); }
  .check-btn:disabled { opacity: 0.4; cursor: default; transform: none; }
  .answer-box { display: none; margin-top: 16px; padding: 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; animation: fadeUp 0.3s ease; }
  .answer-box.show { display: block; }
  .answer-box.correct-ans { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3); }
  .answer-box.wrong-ans { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3); }
  .answer-box .ans-header { display: flex; align-items: center; gap: 8px; font-weight: 700; margin-bottom: 6px; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; }
  .answer-box .ans-header.green { color: var(--correct); }
  .answer-box .ans-header.red { color: var(--wrong); }
  .answer-box .explanation { color: #b0b0c0; font-size: 13px; }
  .progress-wrap { height: 4px; background: var(--border); border-radius: 2px; margin-bottom: 40px; overflow: hidden; animation: fadeUp 0.6s 0.15s ease both; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #6b7aff, #a855f7); border-radius: 2px; transition: width 0.5s ease; width: 0%; }
  @keyframes fadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .q-card.hidden { display: none; }
  .reset-btn { display: block; margin: 40px auto 0; padding: 12px 32px; border-radius: 100px; border: 1px solid var(--border); background: transparent; color: var(--muted); font-family: 'Outfit', sans-serif; font-size: 14px; cursor: pointer; transition: all 0.2s; }
  .reset-btn:hover { border-color: var(--text); color: var(--text); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-badge">IIT JEE Prep ¬∑ Mock Test</div>
    <h1>Practice Quiz</h1>

  </header>

<script>
const questions = [
  // ===== MATHEMATICS =====

    text:"Manoj throws a fair dice. He is promised an amount thrice the value of the number showing up if the number showing up is odd and an amount twice the value of the number showing up if it is even. What is the maximum amount Manoj is willing to pay each time to throw the dice, if in the long run he wants to make an average profit of Rs 5 per throw?",
    options:["Rs 3.50","Rs 8.5","Rs 5","None of these"], correct:0,
    explanation:"Expected value = (1/6)[3√ó1 + 3√ó3 + 3√ó5 + 2√ó2 + 2√ó4 + 2√ó6] = (1/6)[3+9+15+4+8+12] = 51/6 = 8.5. For avg profit of Rs 5, max he pays = 8.5 - 5 = Rs 3.50. Answer: Rs 3.50" },

  { id:9, num:"Q22", subject:"Mathematics", chapter:"Integral Calculus",

  { id:10, num:"Q23", subject:"Mathematics", chapter:"Vectors",
    text:"If r‚Éó and s‚Éó are non-zero constant vectors and the scalar b is chosen such that |r‚Éó + bs‚Éó| is minimum, then the value of |bs‚Éó|¬≤ + |r‚Éó + bs‚Éó|¬≤ is equal to:",

    explanation:"For minimum |r‚Éó+bs‚Éó|, b = -(r‚Éó¬∑s‚Éó)/|s‚Éó|¬≤. At minimum, r‚Éó+bs‚Éó ‚ä• s‚Éó. So |bs‚Éó|¬≤+|r‚Éó+bs‚Éó|¬≤ = |r‚Éó|¬≤ (by Pythagoras in vector triangle). Answer: |r‚Éó|¬≤" },
  { id:11, num:"Q25", subject:"Mathematics", chapter:"Complex Numbers",

  { id:17, num:"Q33", subject:"Mathematics", chapter:"Calculus (Increasing/Decreasing)",

  { id:19, num:"Q35", subject:"Mathematics", chapter:"Calculus (Differentiation)",

let score=0, wrong=0, answered=0;
const total=questions.length;

function getTagClass(s){ return s==="Mathematics"?"tag-math":s==="Chemistry"?"tag-chem":"tag-phys"; }

function renderQuestions(filter="all"){
  const container=document.getElementById("quiz-container");
  container.innerHTML="";
  const subjects=["Mathematics","Chemistry","Physics"];
  const colors={Mathematics:"#f59e0b",Chemistry:"#10b981",Physics:"#3b82f6"};
  const emojis={Mathematics:"üìê",Chemistry:"‚öóÔ∏è",Physics:"‚ö°"};

  subjects.forEach(subject=>{
    const qs=questions.filter(q=>q.subject===subject&&(filter==="all"||filter===subject));
    if(qs.length===0)return;
    const heading=document.createElement("div");
    heading.className="section-heading";
    heading.innerHTML=`<div class="dot" style="background:${colors[subject]}"></div><h2>${emojis[subject]} ${subject}</h2><div class="line"></div>`;
    container.appendChild(heading);

    qs.forEach((q,idx)=>{
      const card=document.createElement("div");
      card.className="q-card";
      card.id=`card-${q.id}`;
      card.style.animationDelay=`${idx*0.04}s`;
      const saved=window.qState?.[q.id];
      if(saved){ card.classList.add(saved.correct?"answered-correct":"answered-wrong"); }

      card.innerHTML=`
        <div class="q-meta">
          <span class="q-num">${q.num}</span>
          <span class="q-tag ${getTagClass(q.subject)}">${q.subject}</span>
          <span class="chapter-tag">${q.chapter}</span>
        </div>
        <div class="q-text">${q.text}</div>
        <div class="options" id="opts-${q.id}">
          ${q.options.map((opt,i)=>`
            <button class="opt-btn ${saved&&saved.selected===i?(saved.correct?'correct':'wrong'):''} ${saved&&i===q.correct&&saved.selected!==i?'correct':''}"
              onclick="selectOption(${q.id},${i})" ${saved?'disabled':''} id="opt-${q.id}-${i}">
              <span class="opt-label">${String.fromCharCode(65+i)}</span>${opt}
            </button>`).join("")}
        </div>
        <button class="check-btn" id="check-${q.id}" onclick="checkAnswer(${q.id})" ${saved?'disabled':''}>
          ${saved?(saved.correct?'‚úì Correct!':'‚úó Wrong'):'Check Answer'}
        </button>
        <div class="answer-box ${saved?'show':''} ${saved?(saved.correct?'correct-ans':'wrong-ans'):''}" id="ans-${q.id}">
          ${saved?`<div class="ans-header ${saved.correct?'green':'red'}">${saved.correct?'‚úì Correct Answer!':'‚úó Wrong ‚Äî Correct: '+q.options[q.correct]}</div><div class="explanation">${q.explanation}</div>`:''}
        </div>`;
      container.appendChild(card);
    });
  });
  updateScore();
}

window.qState={};
window.selected={};

function selectOption(qId,optIdx){
  if(window.qState[qId])return;
  window.selected[qId]=optIdx;
  document.querySelectorAll(`#opts-${qId} .opt-btn`).forEach((btn,i)=>{
    btn.classList.remove("selected");
    if(i===optIdx)btn.classList.add("selected");
  });
  document.getElementById(`check-${qId}`).disabled=false;
}

function checkAnswer(qId){
  if(window.qState[qId])return;
  const q=questions.find(x=>x.id===qId);
  const sel=window.selected[qId];
  if(sel===undefined)return;
  const isCorrect=sel===q.correct;
  window.qState[qId]={selected:sel,correct:isCorrect};

  document.querySelectorAll(`#opts-${qId} .opt-btn`).forEach((btn,i)=>{
    btn.disabled=true;
    btn.classList.remove("selected");
    if(i===q.correct)btn.classList.add("correct");
    if(i===sel&&!isCorrect)btn.classList.add("wrong");
  });

  const ansBox=document.getElementById(`ans-${qId}`);
  ansBox.className=`answer-box show ${isCorrect?'correct-ans':'wrong-ans'}`;
  ansBox.innerHTML=`<div class="ans-header ${isCorrect?'green':'red'}">${isCorrect?'‚úì Correct Answer!':'‚úó Wrong ‚Äî Correct: '+q.options[q.correct]}</div><div class="explanation">${q.explanation}</div>`;

  document.getElementById(`card-${qId}`).classList.add(isCorrect?"answered-correct":"answered-wrong");
  const checkBtn=document.getElementById(`check-${qId}`);
  checkBtn.disabled=true;
  checkBtn.textContent=isCorrect?'‚úì Correct!':'‚úó Wrong';

  if(isCorrect)score++; else wrong++;
  answered++;
  updateScore();
}

function updateScore(){
  document.getElementById("score-val").textContent=score;
  document.getElementById("wrong-val").textContent=wrong;
  document.getElementById("remain-val").textContent=total-answered;
  document.getElementById("progress-bar").style.width=(answered/total*100)+"%";
}

function resetQuiz(){
  if(!confirm("Reset all answers?"))return;
  score=0;wrong=0;answered=0;
  window.qState={};window.selected={};
  renderQuestions(currentFilter);
}

let currentFilter="all";
document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click",function(){
    document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
    this.classList.add("active");
    currentFilter=this.dataset.filter;
    renderQuestions(currentFilter);
  });
});

renderQuestions();
</script>
