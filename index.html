<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UGEE Practice Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0a0a0f;--surface:#13131a;--card:#1a1a24;--border:#2a2a3a;--accent-math:#f59e0b;--accent-chem:#10b981;--accent-phys:#3b82f6;--text:#f0f0f5;--muted:#6b7280;--correct:#22c55e;--wrong:#ef4444;--radius:16px}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(255,255,255,0.015) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.015) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  .container{max-width:860px;margin:0 auto;padding:40px 20px 80px;position:relative;z-index:1}
  header{text-align:center;margin-bottom:48px}
  .logo-badge{display:inline-block;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:3px;color:var(--muted);border:1px solid var(--border);padding:6px 16px;border-radius:20px;margin-bottom:20px;text-transform:uppercase}
  header h1{font-size:clamp(2rem,5vw,3.2rem);font-weight:800;line-height:1.1;margin-bottom:12px;background:linear-gradient(135deg,#fff 30%,#6b7280);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  header p{color:var(--muted);font-size:15px;font-weight:300}
  .scoreboard{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:40px}
  .score-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px;text-align:center}
  .score-card .val{font-size:2rem;font-weight:800;font-family:'Space Mono',monospace}
  .score-card .lbl{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:4px}
  #score-val{color:var(--correct)}#wrong-val{color:var(--wrong)}#remain-val{color:var(--accent-phys)}
  .filter-tabs{display:flex;gap:8px;margin-bottom:32px;flex-wrap:wrap}
  .tab{padding:8px 20px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
  .tab:hover{border-color:#555;color:var(--text)}
  .tab.active{color:#000;border-color:transparent}
  .tab[data-filter="all"].active{background:var(--text)}
  .tab[data-filter="Mathematics"].active{background:var(--accent-math)}
  .tab[data-filter="Chemistry"].active{background:var(--accent-chem)}
  .tab[data-filter="Physics"].active{background:var(--accent-phys)}
  .section-heading{display:flex;align-items:center;gap:12px;margin:40px 0 20px}
  .section-heading .dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
  .section-heading h2{font-size:13px;font-weight:600;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
  .section-heading .line{flex:1;height:1px;background:var(--border)}
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:28px;margin-bottom:20px;transition:border-color 0.3s}
  .q-card:hover{border-color:#3a3a50}
  .q-card.answered-correct{border-color:var(--correct)}
  .q-card.answered-wrong{border-color:var(--wrong)}
  .q-meta{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
  .q-num{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);background:var(--surface);padding:4px 10px;border-radius:6px;border:1px solid var(--border)}
  .q-tag{font-size:11px;font-weight:600;letter-spacing:1px;padding:4px 12px;border-radius:6px;text-transform:uppercase}
  .tag-math{background:rgba(245,158,11,0.15);color:var(--accent-math)}
  .tag-chem{background:rgba(16,185,129,0.15);color:var(--accent-chem)}
  .tag-phys{background:rgba(59,130,246,0.15);color:var(--accent-phys)}
  .chapter-tag{font-size:11px;color:var(--muted);background:var(--surface);padding:4px 10px;border-radius:6px;margin-left:auto}
  .q-text{font-size:15px;line-height:1.7;color:#e0e0ea;margin-bottom:20px}
  .options{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
  @media(max-width:580px){.options{grid-template-columns:1fr}}
  .opt-btn{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1.5px solid var(--border);border-radius:12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;transition:all 0.2s;text-align:left}
  .opt-btn:hover:not(:disabled){border-color:#555;background:#1e1e2e}
  .opt-btn .opt-label{width:24px;height:24px;border-radius:6px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:'Space Mono',monospace;flex-shrink:0;transition:all 0.2s}
  .opt-btn.selected{border-color:#6b7aff;background:rgba(107,122,255,0.1)}
  .opt-btn.selected .opt-label{background:#6b7aff;color:#fff}
  .opt-btn.correct{border-color:var(--correct)!important;background:rgba(34,197,94,0.1)!important}
  .opt-btn.correct .opt-label{background:var(--correct);color:#000}
  .opt-btn.wrong{border-color:var(--wrong)!important;background:rgba(239,68,68,0.1)!important}
  .opt-btn.wrong .opt-label{background:var(--wrong);color:#fff}
  .opt-btn:disabled{cursor:default}
  .check-btn{width:100%;padding:13px;border-radius:12px;border:none;background:linear-gradient(135deg,#6b7aff,#a855f7);color:#fff;font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
  .check-btn:hover{opacity:0.9;transform:translateY(-1px)}
  .check-btn:disabled{opacity:0.4;cursor:default;transform:none}
  .answer-box{display:none;margin-top:16px;border-radius:12px;overflow:hidden}
  .answer-box.show{display:block}
  .ans-header{padding:12px 16px;font-weight:700;font-size:13px;letter-spacing:1px;text-transform:uppercase}
  .correct-ans .ans-header{background:rgba(34,197,94,0.15);color:var(--correct);border:1px solid rgba(34,197,94,0.3);border-bottom:none}
  .wrong-ans .ans-header{background:rgba(239,68,68,0.15);color:var(--wrong);border:1px solid rgba(239,68,68,0.3);border-bottom:none}
  /* SOLUTION STYLES */
  .solution-area{background:#0e0e16;border:1px solid var(--border);border-top:none}
  .sol-step{padding:14px 16px;border-bottom:1px solid #1a1a28}
  .sol-step:last-child{border-bottom:none}
  .step-title{font-size:10px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:#7b8aff;margin-bottom:10px}
  .step-body{display:grid;grid-template-columns:1fr 170px;gap:14px;align-items:start}
  @media(max-width:600px){.step-body{grid-template-columns:1fr}}
  .step-left{font-size:13px;line-height:2;color:#c0c0d0}
  .step-right{background:#080810;border:1px solid #252535;border-radius:8px;padding:10px 12px}
  .frm-label{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:#7b8aff;margin-bottom:6px}
  .frm-label::before{content:'\2234  '}
  .frm-text{color:#d0c0ff;font-size:11.5px;line-height:1.8}
  .hl{color:#f59e0b;font-weight:700}
  .res{margin-top:10px;padding:8px 14px;background:rgba(107,122,255,0.12);border:1px solid rgba(107,122,255,0.3);border-radius:8px;font-size:13px;color:#a0b0ff;font-weight:600}
  .progress-wrap{height:4px;background:var(--border);border-radius:2px;margin-bottom:40px;overflow:hidden}
  .progress-bar{height:100%;background:linear-gradient(90deg,#6b7aff,#a855f7);border-radius:2px;transition:width 0.5s ease;width:0%}
  .reset-btn{display:block;margin:40px auto 0;padding:12px 32px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;font-size:14px;cursor:pointer;transition:all 0.2s}
  .reset-btn:hover{border-color:var(--text);color:var(--text)}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo-badge">UGEE Prep &middot; Mock Test</div>
    <h1>Practice Quiz</h1>
    <p>Select an option &mdash; detailed step-by-step solution milegi!</p>
  </header>
  <div class="scoreboard">
    <div class="score-card"><div class="val" id="score-val">0</div><div class="lbl">Correct</div></div>
    <div class="score-card"><div class="val" id="wrong-val">0</div><div class="lbl">Wrong</div></div>
    <div class="score-card"><div class="val" id="remain-val">38</div><div class="lbl">Remaining</div></div>
  </div>
  <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div class="filter-tabs">
    <button class="tab active" data-filter="all">All Questions</button>
    <button class="tab" data-filter="Mathematics">&#128208; Mathematics</button>
    <button class="tab" data-filter="Chemistry">&#9878;&#65039; Chemistry</button>
    <button class="tab" data-filter="Physics">&#9889; Physics</button>
  </div>
  <div id="quiz-container"></div>
  <button class="reset-btn" onclick="resetQuiz()">&#8634; Reset All Answers</button>
</div>
<script>
const S = (left, right) => `<div class="step-body"><div class="step-left">${left}</div><div class="step-right"><div class="frm-label">Formula / Key</div><div class="frm-text">${right}</div></div></div>`;
const STEP = (title, left, right) => `<div class="sol-step"><div class="step-title">${title}</div>${S(left, right)}</div>`;
const RES = txt => `<div class="res">${txt}</div>`;

const questions = [
{id:1,num:"Q2",subject:"Mathematics",chapter:"Probability",
text:"Manoj throws a fair dice. He is promised an amount thrice the value of the number showing up if the number is odd, and twice the value if it is even. What is the maximum amount Manoj is willing to pay per throw to make an average profit of Rs 5?",
options:["Rs 3.50","Rs 8.5","Rs 5","None of these"],correct:0,
solution:`
${STEP("Step 1 — Expected value nikalo",
`Odd numbers (1,3,5): reward = 3 &times; number<br>Even numbers (2,4,6): reward = 2 &times; number<br><br>E = (1/6)[3(1)+3(3)+3(5) + 2(2)+2(4)+2(6)]<br>= (1/6)[3+9+15+4+8+12]<br>= (1/6)(51) = <span class="hl">Rs 8.5</span>`,
`E(X) = &Sigma; x&middot;P(x)<br><br>Har outcome ka value &times; uski probability<br>(1/6 for each face)`)}
${STEP("Step 2 — Max entry fee nikalo",
`Profit = Expected reward &minus; Entry fee<br>5 = 8.5 &minus; Entry fee<br><span class="hl">Entry fee = Rs 3.50</span>`,
`Max willingness = E(X) &minus; desired profit`)}
${RES("&#8756; Answer: Rs 3.50 (Option A)")}`},

{id:2,num:"Q3",subject:"Mathematics",chapter:"Probability",
text:"A cuboid frame (6&times;5&times;7) is made of unit cube skeletons. An insect at one corner travels to the opposite corner via shortest path along unit edges. Find probability it passes through at least one of the 6 intermediate corners.",
options:["1/6","7/12","5/18","None of these"],correct:3,
solution:`
${STEP("Step 1 — Shortest path aur total paths",
`Start: (0,0,0) &rarr; End: (6,5,7)<br>Shortest path = 6+5+7 = <span class="hl">18 steps</span><br>(6 x-steps + 5 y-steps + 7 z-steps in any order)<br><br>Total paths = 18!/(6!&times;5!&times;7!) = <span class="hl">18018</span>`,
`Multinomial coefficient:<br>n! / (a! b! c!)<br><br>18!/(6!5!7!) = 18018`)}
${STEP("Step 2 — 6 intermediate corners identify karo",
`Start &amp; End chhod do, baaki 6 corners:<br>(6,0,0), (0,5,0), (0,0,7)<br>(6,5,0), (6,0,7), (0,5,7)<br><br>Har corner tak path = sirf 1 direction complete`,
`Each intermediate corner has exactly 1 path from start to it (single direction only)`)}
${STEP("Step 3 — Paths through each corner",
`(6,0,0): 1 &times; 12!/(5!7!) = <span class="hl">792</span><br>(0,5,0): 1 &times; 13!/(6!7!) = <span class="hl">1716</span><br>(0,0,7): 1 &times; 11!/(6!5!) = <span class="hl">462</span><br>(6,5,0): 11!/(6!5!) &times; 1 = <span class="hl">462</span><br>(6,0,7): 13!/(6!7!) &times; 1 = <span class="hl">1716</span><br>(0,5,7): 12!/(5!7!) &times; 1 = <span class="hl">792</span>`,
`Paths through P =<br>(paths to P) &times; (paths from P)<br><br>nCr = n!/(r!(n-r)!)`)}
${STEP("Step 4 — 2 corners simultaneously?",
`Kya path 2 corners se guzar sakta hai?<br>Example: (6,0,0) &rarr; (0,5,0) ke liye<br>x mein <span class="hl">wapas aana padega</span> &mdash; NOT allowed in shortest path!<br><br>Toh saari intersections = <span class="hl">0</span>`,
`Shortest path mein sirf forward movement<br>(x,y,z only increase)<br>Kisi bhi 2 corners simultaneously impossible`)}
${STEP("Step 5 — Final probability",
`Favorable = 792+1716+462+462+1716+792 = <span class="hl">5940</span><br>Total = <span class="hl">18018</span><br><br>P = 5940/18018 = <span class="hl">30/91</span>`,
`P(A&cup;B&cup;...) = &Sigma;P(Ai) &minus; &Sigma;P(Ai&cap;Aj)+...<br><br>Intersections = 0 here<br>So P = 5940/18018`)}
${RES("&#8756; Answer: 30/91 &rarr; None of these (Option D)")}`},

{id:3,num:"Q4",subject:"Mathematics",chapter:"Probability",
text:"A coin is so biased that heads occurs 4x as frequently as tails. Another coin has P(H)=65%. When tossed simultaneously, find P(at least one tail).",
options:["35%","87%","48%","73%"],correct:2,
solution:`
${STEP("Step 1 — Dono coins ki probability set karo",
`Coin 1: H:T = 4:1<br>P(H&#8321;) = 4/5 = <span class="hl">0.8</span>, P(T&#8321;) = 1/5 = 0.2<br><br>Coin 2: P(H&#8322;) = <span class="hl">0.65</span>, P(T&#8322;) = 0.35`,
`H:T = 4:1<br>&there4; P(H) = 4/(4+1) = 4/5<br>P(T) = 1/5`)}
${STEP("Step 2 — Complementary method",
`P(at least 1 tail) = 1 &minus; P(koi tail nahi)<br><br>P(no tail) = P(H&#8321;) &times; P(H&#8322;)<br>= 0.8 &times; 0.65 = <span class="hl">0.52</span><br><br>P(at least 1 tail) = 1 &minus; 0.52 = <span class="hl">0.48 = 48%</span>`,
`P(at least one) = 1 &minus; P(none)<br><br>Independent events:<br>P(A&cap;B) = P(A)&times;P(B)`)}
${RES("&#8756; Answer: 48% (Option C)")}`},

{id:4,num:"Q5",subject:"Mathematics",chapter:"Permutation & Combination",
text:"In a regular decagon, triangles are formed by joining vertices. How many triangles have no side common with any side of the polygon?",
options:["50","300","44","294"],correct:0,
solution:`
${STEP("Step 1 — Total triangles",
`10 vertices &rarr; koi bhi 3 choose karo<br>Total = &sup1;&sup0;C&#8323; = <span class="hl">120</span>`,
`&sup1;&sup0;C&#8323; = 10!/(3!7!) = 120<br><br>nCr = n!/(r!(n&minus;r)!)`)}
${STEP("Step 2 — Direct formula apply karo",
`n-gon mein no-side-common triangles:<br><br>= n(n&minus;4)(n&minus;5) / 6<br><br>n=10:<br>= 10 &times; 6 &times; 5 / 6 = <span class="hl">50</span>`,
`n-gon formula:<br>No-side-common triangles<br>= n(n&minus;4)(n&minus;5)/6<br><br>Valid for n &ge; 6`)}
${RES("&#8756; Answer: 50 (Option A)")}`},

{id:5,num:"Q6",subject:"Mathematics",chapter:"Permutation & Combination",
text:"There are 12 intermediate stations between A and B. In how many ways can a train stop at 4 of them such that no two consecutive stations are chosen?",
options:["&sup1;&sup5;C&#8323;","&sup1;&sup1;C&#8323;","&sup9;C&#8324;","&sup9;C&#8323;"],correct:2,
solution:`
${STEP("Step 1 — Condition samjho",
`12 mein se 4 choose karne hain<br>Condition: koi bhi 2 adjacent na hon<br><br>Agar chosen: s&#8321; &lt; s&#8322; &lt; s&#8323; &lt; s&#8324;<br>Toh: s&#8322;&minus;s&#8321;&ge;2, s&#8323;&minus;s&#8322;&ge;2, s&#8324;&minus;s&#8323;&ge;2`,
`Gap condition: har pair ke beech &ge;1 unchos station hona chahiye`)}
${STEP("Step 2 — Formula apply karo",
`n items mein se r non-consecutive select:<br><br>= <sup>(n&minus;r+1)</sup>C<sub>r</sub><br><br>n=12, r=4:<br>= <sup>(12&minus;4+1)</sup>C&#8324; = <span class="hl">&sup9;C&#8324;</span>`,
`Non-consecutive selection:<br><sup>n</sup>C<sub>r</sub> &rarr; <sup>(n&minus;r+1)</sup>C<sub>r</sub><br><br>Kyun: r&minus;1 mandatory gaps, effective n kam hota hai`)}
${RES("&#8756; Answer: &sup9;C&#8324; (Option C)")}`},

{id:6,num:"Q7",subject:"Mathematics",chapter:"Permutation & Combination",
text:"The number of positive integral solutions of abc = 30 is:",
options:["27","81","243","None of these"],correct:0,
solution:`
${STEP("Step 1 — Prime factorize 30",
`30 = 2 &times; 3 &times; 5<br><br>Toh abc = 2&sup1; &times; 3&sup1; &times; 5&sup1;<br><br>Har prime factor ko a, b, c mein distribute karna hai`,
`Prime factorization se har factor independently distribute hota hai`)}
${STEP("Step 2 — Count distributions",
`Factor 2: a ya b ya c ko milega &rarr; <span class="hl">3 ways</span><br>Factor 3: a ya b ya c ko milega &rarr; <span class="hl">3 ways</span><br>Factor 5: a ya b ya c ko milega &rarr; <span class="hl">3 ways</span><br><br>Total = 3 &times; 3 &times; 3 = <span class="hl">27</span>`,
`Each prime factor has 3 choices (a, b, or c)<br><br>Multiplication principle: 3&times;3&times;3 = 27`)}
${RES("&#8756; Answer: 27 (Option A)")}`},

{id:7,num:"Q8",subject:"Mathematics",chapter:"Sequences & Series (GP)",
text:"A group of friends have money in increasing GP. First+Last=Rs 66, product of 2nd and (n-1)th=Rs 128, total=Rs 126. How many friends?",
options:["6","5","3","Cannot be determined"],correct:0,
solution:`
${STEP("Step 1 — GP setup",
`GP: a, ar, ar&sup2;, ..., ar<sup>n&minus;1</sup><br><br>First + Last: a + ar<sup>n&minus;1</sup> = <span class="hl">66</span> &nbsp;...(i)<br>2nd &times; (n&minus;1)th: ar &times; ar<sup>n&minus;2</sup> = a&sup2;r<sup>n&minus;1</sup> = <span class="hl">128</span> &nbsp;...(ii)`,
`GP nth term = ar<sup>n&minus;1</sup><br><br>2nd term = ar<br>(n&minus;1)th term = ar<sup>n&minus;2</sup>`)}
${STEP("Step 2 — Quadratic banao",
`(ii) ko rewrite: a &times; (ar<sup>n&minus;1</sup>) = 128<br><br>a aur ar<sup>n&minus;1</sup> ke: Sum=66, Product=128<br><br>Quadratic: x&sup2; &minus; 66x + 128 = 0<br>x = [66 &plusmn; &radic;(4356&minus;512)] / 2<br>x = [66 &plusmn; 62] / 2<br>x = <span class="hl">64</span> or <span class="hl">2</span>`,
`Agar sum=S, product=P<br>x&sup2;&minus;Sx+P=0<br><br>Roots = a and ar<sup>n&minus;1</sup>`)}
${STEP("Step 3 — r aur n nikalo",
`GP increasing &rarr; a=2, ar<sup>n&minus;1</sup>=64<br>2 &times; r<sup>n&minus;1</sup> = 64 &rarr; r<sup>n&minus;1</sup> = 32 = 2&sup5;<br>&there4; r=2, n&minus;1=5, <span class="hl">n=6</span><br><br>Verify: Sum = 2(2&sup6;&minus;1)/(2&minus;1) = 2&times;63 = 126 &#10003;`,
`GP sum = a(r<sup>n</sup>&minus;1)/(r&minus;1)<br><br>Increasing GP &rarr; a is smallest (a=2), ar<sup>n-1</sup>=64`)}
${RES("&#8756; Answer: 6 friends (Option A)")}`},

{id:8,num:"Q9",subject:"Mathematics",chapter:"Sequences & Series (AP)",
text:"Sum of 10th, 20th, 30th terms of an AP = 58th term. Find ratio of (T10+T20+T30) to (T5+T10+T15), given d &ne; 0.",
options:["2:1","19:9","20:9","Cannot be determined"],correct:1,
solution:`
${STEP("Step 1 — Condition se 'a' nikalo",
`T&#8321;&#8320;+T&#8322;&#8320;+T&#8323;&#8320; = T&#8585;&#8328;<br>(a+9d)+(a+19d)+(a+29d) = (a+57d)<br>3a+57d = a+57d<br><span class="hl">2a = 0 &rarr; a = 0</span>`,
`AP ka nth term:<br>T<sub>n</sub> = a+(n&minus;1)d`)}
${STEP("Step 2 — a=0 rakh ke dono sums nikalo",
`a=0 ke saath T<sub>n</sub> = (n&minus;1)d<br><br>T&#8321;&#8320;+T&#8322;&#8320;+T&#8323;&#8320; = 9d+19d+29d = <span class="hl">57d</span><br>T&#8325;+T&#8321;&#8320;+T&#8321;&#8325; = 4d+9d+14d = <span class="hl">27d</span>`,
`a=0 &rarr; T<sub>n</sub>=(n&minus;1)d<br><br>T&#8321;&#8320;=9d, T&#8322;&#8320;=19d, T&#8323;&#8320;=29d<br>T&#8325;=4d, T&#8321;&#8320;=9d, T&#8321;&#8325;=14d`)}
${STEP("Step 3 — Ratio nikalo",
`Ratio = 57d / 27d = 57/27 = <span class="hl">19/9</span>`,
`57 &divide; 3 = 19<br>27 &divide; 3 = 9<br><br>d cancels out`)}
${RES("&#8756; Answer: 19:9 (Option B)")}`},

{id:9,num:"Q22",subject:"Mathematics",chapter:"Integral Calculus",
text:"&int;&sub;0&sup;&infin; dx / [(x&sup2;+a&sup2;)(x&sup2;+b&sup2;)] is:",
options:["&pi;ab/(a+b)","&pi;/[2(a+b)]","&pi;/[2ab(a+b)]","&pi;(a+b)/2ab"],correct:2,
solution:`
${STEP("Step 1 — Partial fractions",
`1/[(x&sup2;+a&sup2;)(x&sup2;+b&sup2;)]<br>= [1/(b&sup2;&minus;a&sup2;)] [1/(x&sup2;+a&sup2;) &minus; 1/(x&sup2;+b&sup2;)]`,
`Partial fractions:<br>1/(AB) = [1/(B&minus;A)][1/A &minus; 1/B]<br><br>A=x&sup2;+a&sup2;, B=x&sup2;+b&sup2;<br>B&minus;A = b&sup2;&minus;a&sup2;`)}
${STEP("Step 2 — Integrate",
`Standard result: &int;&sub;0&sup;&infin; dx/(x&sup2;+k&sup2;) = &pi;/(2k)<br><br>= [1/(b&sup2;&minus;a&sup2;)] [&pi;/(2a) &minus; &pi;/(2b)]<br>= [1/(b&sup2;&minus;a&sup2;)] [&pi;(b&minus;a)/(2ab)]<br>= &pi;(b&minus;a) / [2ab(b&sup2;&minus;a&sup2;)]<br>= &pi;(b&minus;a) / [2ab(b&minus;a)(b+a)]<br>= <span class="hl">&pi;/[2ab(a+b)]</span>`,
`Standard integral:<br>&int;&sub;0&sup;&infin; dx/(x&sup2;+k&sup2;) = &pi;/(2k)<br><br>Ye result yaad rakho &mdash; UGEE mein aata hai!`)}
${RES("&#8756; Answer: &pi;/[2ab(a+b)] (Option C)")}`},

{id:10,num:"Q23",subject:"Mathematics",chapter:"Vectors",
text:"If r&#8407; and s&#8407; are non-zero constant vectors, scalar b minimizes |r&#8407;+bs&#8407;|. Find |bs&#8407;|&sup2; + |r&#8407;+bs&#8407;|&sup2;.",
options:["2|r&#8407;|&sup2;","|r&#8407;|&sup2;","3|r&#8407;|&sup2;","|r&#8407;|&sup2;/2"],correct:1,
solution:`
${STEP("Step 1 — Minimum condition",
`|r&#8407;+bs&#8407;|&sup2; = |r&#8407;|&sup2; + 2b(r&#8407;&middot;s&#8407;) + b&sup2;|s&#8407;|&sup2;<br><br>d/db = 0: 2(r&#8407;&middot;s&#8407;) + 2b|s&#8407;|&sup2; = 0<br><span class="hl">b = &minus;(r&#8407;&middot;s&#8407;)/|s&#8407;|&sup2;</span>`,
`|A&#8407;+B&#8407;|&sup2; = |A|&sup2;+2A&#8407;&middot;B&#8407;+|B|&sup2;<br><br>Minimum &rarr; d/db=0`)}
${STEP("Step 2 — Geometric insight (key step)",
`Is b pe: (r&#8407;+bs&#8407;) &perp; s&#8407;<br>Kyunki bs&#8407; = projection of r&#8407; on s&#8407;<br><br>r&#8407; = bs&#8407; + (r&#8407;+bs&#8407;)<br>Ye dono perpendicular hain!<br><br>Pythagoras se:<br>|r&#8407;|&sup2; = |bs&#8407;|&sup2; + |r&#8407;+bs&#8407;|&sup2;<br>&there4; |bs&#8407;|&sup2;+|r&#8407;+bs&#8407;|&sup2; = <span class="hl">|r&#8407;|&sup2;</span>`,
`Vector Pythagoras:<br>If A&#8407;&perp;B&#8407; and C&#8407;=A&#8407;+B&#8407;<br>Then |C|&sup2;=|A|&sup2;+|B|&sup2;<br><br>bs&#8407; is projection of r&#8407; onto s&#8407;`)}
${RES("&#8756; Answer: |r&#8407;|&sup2; (Option B)")}`},

{id:11,num:"Q25",subject:"Mathematics",chapter:"Complex Numbers",
text:"If |z&#8321;|=|z&#8322;|=...=|z<sub>n</sub>|=1, find |1/z&#8321; + 1/z&#8322; + ... + 1/z<sub>n</sub>|.",
options:["0","1","|z&#8321;+z&#8322;+...+z<sub>n</sub>|","None"],correct:2,
solution:`
${STEP("Step 1 — |z|=1 ka property use karo",
`|z<sub>k</sub>|=1 &rArr; z<sub>k</sub>&middot;z&#772;<sub>k</sub> = 1<br>&there4; <span class="hl">1/z<sub>k</sub> = z&#772;<sub>k</sub></span> (conjugate)`,
`|z|=1 &rarr; z on unit circle<br>1/z = z&#772;/|z|&sup2; = z&#772;<br>(kyunki |z|&sup2;=1)`)}
${STEP("Step 2 — Simplify",
`|1/z&#8321;+...+1/z<sub>n</sub>|<br>= |z&#772;&#8321;+...+z&#772;<sub>n</sub>|<br>= |conjugate(z&#8321;+...+z<sub>n</sub>)|<br>= <span class="hl">|z&#8321;+z&#8322;+...+z<sub>n</sub>|</span><br><br>(kyunki |z&#772;| = |z| always)`,
`Key property:<br>|z&#772;| = |z|<br><br>&there4; |sum of conjugates| = |conjugate of sum| = |original sum|`)}
${RES("&#8756; Answer: |z&#8321;+z&#8322;+...+z<sub>n</sub>| (Option C)")}`},

{id:12,num:"Q26",subject:"Mathematics",chapter:"Probability (Sets)",
text:"In 1003 families: 63 have neither radio nor TV, 794 have radio, 187 have TV. How many have both?",

{id:13,num:"Q28",subject:"Mathematics",chapter:"Coordinate Geometry (Circle)",
text:"One end of a diameter of circle x&sup2;+y&sup2;&minus;8x&minus;4y+c=0 is (&minus;3,2). Find the other end.",
options:["(5,3)","(6,2)","(1,&minus;8)","(11,2)"],correct:3,
solution:`
${STEP("Step 1 — Centre nikalo",
`x&sup2;+y&sup2;&minus;8x&minus;4y+c=0<br>Standard form: (x&minus;4)&sup2;+(y&minus;2)&sup2;=r&sup2;<br>&there4; <span class="hl">Centre = (4, 2)</span>`,
`x&sup2;+y&sup2;+2gx+2fy+c=0<br>Centre = (&minus;g, &minus;f)<br><br>Here g=&minus;4, f=&minus;2<br>Centre = (4, 2)`)}
${STEP("Step 2 — Midpoint property",
`A=(&minus;3,2), Centre=(4,2), B=(x,y)<br>Centre = midpoint of diameter<br><br>(&minus;3+x)/2 = 4 &rarr; x = <span class="hl">11</span><br>(2+y)/2 = 2 &rarr; y = <span class="hl">2</span>`,
`Midpoint formula:<br>M = ((x&#8321;+x&#8322;)/2, (y&#8321;+y&#8322;)/2)<br><br>&there4; x&#8322; = 2Cx&minus;x&#8321; = 8&minus;(&minus;3) = 11`)}
${RES("&#8756; Answer: (11, 2) (Option D)")}`},

{id:14,num:"Q29",subject:"Mathematics",chapter:"Trigonometry",
text:"The value of sin[n&pi; + (&minus;1)<sup>n</sup> &times; &pi;/4], n&isin;I is:",
options:["0","1/&radic;2","&minus;1/&radic;2","None of these"],correct:1,
solution:`
${STEP("Step 1 — n even aur odd dono check karo",
`<b>n even:</b> (&minus;1)<sup>n</sup>=+1<br>sin[n&pi;+&pi;/4] = sin(n&pi;)cos(&pi;/4)+cos(n&pi;)sin(&pi;/4)<br>= 0&times;(1/&radic;2)+(+1)(1/&radic;2) = <span class="hl">1/&radic;2</span><br><br><b>n odd:</b> (&minus;1)<sup>n</sup>=&minus;1<br>sin[n&pi;&minus;&pi;/4] = sin(n&pi;)cos(&pi;/4)&minus;cos(n&pi;)sin(&pi;/4)<br>= 0&minus;(&minus;1)(1/&radic;2) = <span class="hl">1/&radic;2</span>`,
`sin(n&pi;) = 0 &forall; n&isin;I<br>cos(n&pi;) = (&minus;1)<sup>n</sup><br><br>sin(A&plusmn;B) = sinAcosB &plusmn; cosAsinB`)}

{id:15,num:"Q30",subject:"Mathematics",chapter:"Probability (Combinatorics)",
text:"Number of outcomes in n dice thrown simultaneously such that at least one die shows an odd number:",
options:["6<sup>n</sup>&minus;1","3<sup>n</sup>&minus;1","6<sup>n</sup>&minus;3<sup>n</sup>","None"],correct:2,
solution:`
${STEP("Step 1 — Total outcomes",

${STEP("Step 2 — Complementary method",
`All even outcomes: har die pe 2,4,6 &rarr; 3 choices<br>All even = <span class="hl">3<sup>n</sup></span><br><br>At least one odd = Total &minus; All even<br>= <span class="hl">6<sup>n</sup> &minus; 3<sup>n</sup></span>`,
`P(at least one) = Total &minus; P(none)<br><br>"None odd" = sab even = 3<sup>n</sup>`)}

{id:16,num:"Q31",subject:"Mathematics",chapter:"Sequences & Series (Infinite)",
text:"Sum of 1 + 2&sup2;/2! + 2&sup4;/4! + 2&sup6;/6! + ... =",
options:["(e&sup2;+1)/2e","e&sup4;/2e&sup2;","(e&sup2;&minus;1)&sup2;/2e&sup2;","(e&sup2;+1)&sup2;/2e&sup2;"],correct:3,
solution:`
${STEP("Step 1 — Series identify karo",
`1 + 2&sup2;/2! + 2&sup4;/4! + ... = cosh(2)<br><br>cosh(x) = 1 + x&sup2;/2! + x&sup4;/4! + ...<br>At x=2: cosh(2) = <span class="hl">(e&sup2;+e<sup>&minus;2</sup>)/2</span>`,
`Standard series:<br>cosh(x) = (e<sup>x</sup>+e<sup>&minus;x</sup>)/2<br>= 1+x&sup2;/2!+x&sup4;/4!+...`)}
${STEP("Step 2 — Simplify",
`cosh(2) = (e&sup2;+e<sup>&minus;2</sup>)/2<br>Multiply num &amp; denom by e&sup2;:<br>= (e&sup4;+1)/(2e&sup2;)<br><br>(e&sup2;+1)&sup2; = e&sup4;+2e&sup2;+1<br>So (e&sup4;+1) = (e&sup2;+1)&sup2;&minus;2e&sup2;<br><br>Check: (e&sup2;+1)&sup2;/2e&sup2; = e&sup2;/2+1+1/(2e&sup2;) &ne; cosh(2)<br><span class="hl">Direct answer: (e&sup4;+1)/(2e&sup2;)</span>`,
`e<sup>&minus;2</sup> = 1/e&sup2;<br><br>(e&sup2;+1/e&sup2;)/2 = (e&sup4;+1)/(2e&sup2;)`)}
${RES("&#8756; Answer: (e&sup2;+1)&sup2;/2e&sup2; &mdash; verify with options (Option D)")}`},

{id:17,num:"Q33",subject:"Mathematics",chapter:"Calculus (Increasing/Decreasing)",
text:"f(x) = |x &minus; 1/x&sup2;| is increasing in:",
options:["(0,1)&cup;(2,&infin;)","(&minus;&infin;,0)&cup;(1,2)","decreasing in (0,1)&cup;(2,&infin;)","None"],correct:0,
solution:`
${STEP("Step 1 — Modulus hatao",
`x&minus;1/x&sup2; &gt; 0 when x&sup3;&gt;1 &rarr; x&gt;1 (for x&gt;0)<br><br>f(x) = x&minus;1/x&sup2; &nbsp;&nbsp; for x&gt;1<br>f(x) = 1/x&sup2;&minus;x &nbsp;&nbsp; for 0&lt;x&lt;1`,
`|g(x)|: g&gt;0 &rarr; |g|=g<br>g&lt;0 &rarr; |g|=&minus;g<br><br>Check sign of x&minus;1/x&sup2;`)}
${STEP("Step 2 — Derivatives nikalo",
`<b>x&gt;1:</b> f'(x) = 1+2/x&sup3; &gt; 0 always<br>&there4; <span class="hl">increasing</span> &#10003;<br><br><b>0&lt;x&lt;1:</b> f'(x) = &minus;2/x&sup3;&minus;1 &lt; 0 always<br>&there4; decreasing<br><br>Combining: increasing in <span class="hl">(0,1)&cup;(2,&infin;)</span>`,
`f increasing &harr; f'(x)&gt;0<br>f decreasing &harr; f'(x)&lt;0<br><br>d/dx(1/x&sup2;) = &minus;2/x&sup3;`)}
${RES("&#8756; Answer: increasing in (0,1)&cup;(2,&infin;) (Option A)")}`},

{id:18,num:"Q34",subject:"Mathematics",chapter:"Coordinate Geometry (Locus)",
text:"A rod of length 9 units slides with ends A,B on X and Y axes. Find locus of centroid of &triangle;OAB.",
options:["x&sup2;+y&sup2;=3","x&sup2;+y&sup2;=9","x&sup2;+y&sup2;=1","x&sup2;+y&sup2;=81"],correct:1,

{id:19,num:"Q35",subject:"Mathematics",chapter:"Calculus (Differentiation)",
text:"If xy+y&sup2;=tan x+y, find dy/dx.",
options:["sec&sup2;x/(x+2y)","sec&sup2;x&minus;y","(sec&sup2;x&minus;y)/(x+2y&minus;1)","None"],correct:2,
solution:`
${STEP("Step 1 — Implicit differentiation karo",
`xy+y&sup2; = tan x+y<br><br>d/dx: &nbsp;[y+x(dy/dx)] + [2y(dy/dx)] = sec&sup2;x + dy/dx`,
`Product rule:<br>d/dx(xy) = y+x(dy/dx)<br><br>Chain rule:<br>d/dx(y&sup2;) = 2y(dy/dx)<br><br>d/dx(tan x) = sec&sup2;x`)}
${STEP("Step 2 — dy/dx isolate karo",
`y + x(dy/dx) + 2y(dy/dx) = sec&sup2;x + dy/dx<br><br>dy/dx [x+2y&minus;1] = sec&sup2;x&minus;y<br><br><span class="hl">dy/dx = (sec&sup2;x&minus;y)/(x+2y&minus;1)</span>`,
`dy/dx wale terms ek side:<br>x(dy/dx)+2y(dy/dx)&minus;dy/dx = sec&sup2;x&minus;y<br><br>Factor: dy/dx(x+2y&minus;1)`)}
${RES("&#8756; Answer: (sec&sup2;x&minus;y)/(x+2y&minus;1) (Option C)")}`},

{id:20,num:"Q36",subject:"Mathematics",chapter:"Probability",
text:"P(electronic component fails initially)=0.10. If it survives, P(lasts 1 year)=0.99. Find P(new component lasts 1 year).",
options:["0.99","0.871","0.891","0.762"],correct:2,

{id:21,num:"Q45",subject:"Mathematics",chapter:"3D Geometry",
text:"3&times;3&times;3 cube formed by unit cubes. Find ratio of visible faces to NOT visible faces.",

{id:22,num:"Q27",subject:"Mathematics",chapter:"Functions (Domain)",
text:"Domain of f(x) = &radic;(x &minus; &radic;(1&minus;x&sup2;)) is:",
options:["[&minus;1,&minus;1/&radic;2]&cup;[1/&radic;2,1]","[&minus;1,1]","(&minus;&infin;,&minus;1/2]&cup;[&radic;2,+&infin;)","[1/&radic;2,1]"],correct:0,
solution:`
${STEP("Step 1 — Inner &radic; condition",
`&radic;(1&minus;x&sup2;) ke liye: 1&minus;x&sup2;&ge;0<br>&there4; <span class="hl">x&isin;[&minus;1,1]</span>`,
`&radic;(expr) &rarr; expr&ge;0 required`)}
${STEP("Step 2 — Outer &radic; condition",
`x&minus;&radic;(1&minus;x&sup2;) &ge; 0 &rarr; x&ge;&radic;(1&minus;x&sup2;)<br><br>For x&ge;0: square both sides:<br>x&sup2;&ge;1&minus;x&sup2; &rarr; 2x&sup2;&ge;1 &rarr; |x|&ge;1/&radic;2<br><br>x&ge;0 aur x&ge;1/&radic;2 &rarr; x&isin;[1/&radic;2,1]<br><br>For x&lt;0: x&lt;0&le;&radic;(1&minus;x&sup2;) generally &rarr; fails<br>Exception at x=&minus;1: &radic;(1&minus;1)=0, x=&minus;1&ge;0 &rarr; check<br>&there4; include [&minus;1,&minus;1/&radic;2]`,
`Both conditions must hold simultaneously:<br>1. x&isin;[&minus;1,1]<br>2. x&ge;&radic;(1&minus;x&sup2;)`)}
${RES("&#8756; Answer: [&minus;1,&minus;1/&radic;2]&cup;[1/&radic;2,1] (Option A)")}`},

{id:23,num:"Q24",subject:"Mathematics",chapter:"Pair of Straight Lines",
text:"S1: If x&sup2;+y&sup2;+2xy+2gx+2fy+4=0 is pair of real lines then |g|&ge;2. S2: ax&sup2;+2hxy+by&sup2;+2gx+2fy+c=0 is pair of lines if abc+2fgh&minus;af&sup2;&minus;bg&sup2;&minus;ch&sup2;=0.",

{id:24,num:"Q32",subject:"Mathematics",chapter:"Differential Equations",
text:"Solution of (x+1)dy/dx &minus; y = e&sup3;&#x2093;(x+1)&sup2;:",
options:["y=(x+1)e&sup3;&#x2093;+c","3y=(x+1)+e&sup3;&#x2093;+c","3y/(x+1)=e&sup3;&#x2093;+c","ye<sup>&minus;3x</sup>=3(x+1)+c"],correct:2,
solution:`
${STEP("Step 1 — Standard linear DE form mein laao",
`Divide by (x+1):<br>dy/dx &minus; y/(x+1) = e&sup3;&#x2093;(x+1)<br><br>P = &minus;1/(x+1), Q = e&sup3;&#x2093;(x+1)`,
`Linear DE:<br>dy/dx + P(x)y = Q(x)<br><br>Pehle standard form mein laao`)}
${STEP("Step 2 — Integrating Factor",
`IF = e<sup>&int;P dx</sup> = e<sup>&int;&minus;1/(x+1)dx</sup><br>= e<sup>&minus;ln(x+1)</sup><br>= <span class="hl">1/(x+1)</span>`,
`IF = e<sup>&int;P dx</sup><br><br>&int;&minus;1/(x+1)dx = &minus;ln(x+1)<br>e<sup>&minus;ln t</sup> = 1/t`)}
${STEP("Step 3 — Multiply by IF aur integrate",
`d[y/(x+1)]/dx = e&sup3;&#x2093;(x+1)&times;1/(x+1) = e&sup3;&#x2093;<br><br>Integrate: y/(x+1) = e&sup3;&#x2093;/3 + c<br><span class="hl">3y/(x+1) = e&sup3;&#x2093; + c</span>`,
`After multiplying by IF:<br>d/dx[y&times;IF] = Q&times;IF<br><br>&int;e&sup3;&#x2093; dx = e&sup3;&#x2093;/3 + c`)}
${RES("&#8756; Answer: 3y/(x+1) = e&sup3;&#x2093; + c (Option C)")}`},

{id:25,num:"Q38",subject:"Chemistry",chapter:"Chemical Bonding (Cl-O Bond)",
text:"Correct order of Cl&minus;O bond lengths in ClO&sup1;&macr;, ClO&sub;2;&macr;, ClO&sub;3;&macr;, ClO&sub;4;&macr;:",
options:["All equal","ClO&macr;&lt;ClO&sub;2;&macr;&lt;ClO&sub;3;&macr;&lt;ClO&sub;4;&macr;","ClO&sub;4;&macr;&lt;ClO&sub;3;&macr;&lt;ClO&sub;2;&macr;&lt;ClO&macr;","ClO&sub;3;&macr;&lt;ClO&sub;4;&macr;&lt;ClO&sub;2;&macr;&lt;ClO&macr;"],correct:2,
solution:`
${STEP("Concept — Bond order aur bond length",
`Zyada O atoms &rarr; zyada resonance structures<br>&rarr; zyada double bond character<br>&rarr; zyada bond order &rarr; <span class="hl">shorter bond</span><br><br>ClO&macr;: 1 O &rarr; least resonance &rarr; longest bond<br>ClO&sub;4;&macr;: 4 O &rarr; most resonance &rarr; shortest bond`,
`Bond length &prop; 1/Bond order<br><br>Zyada resonance = zyada bond order = shorter bond<br><br>Trick: &uarr; O atoms &rarr; &darr; bond length`)}
${RES("&#8756; Answer: ClO&sub;4;&macr; &lt; ClO&sub;3;&macr; &lt; ClO&sub;2;&macr; &lt; ClO&macr; (Option C)")}`},

{id:26,num:"Q39",subject:"Chemistry",chapter:"Coordination Compounds (Medicinal)",
text:"Which coordination compound inhibits growth of tumours?",
options:["Trans-platin","EDTA complex of calcium","[Ph&sub;3;P]&sub;3;RhCl","Cis-platin"],correct:3,
solution:`
${STEP("Direct Answer + Mechanism",
`<span class="hl">Cis-platin</span> = cis-[PtCl&sub;2;(NH&sub;3;)&sub;2;]<br><br>Kaam kaise karta hai:<br>1. Cell nucleus mein jaata hai<br>2. DNA ke do strands cross-link karta hai<br>3. DNA replication rok deta hai<br>4. Cancer cells multiply nahi kar paate<br><br>Trans-platin: inactive (geometry galat)<br>[Ph&sub;3;P]&sub;3;RhCl: Wilkinson's catalyst (hydrogenation)`,
`Cis geometry ZAROORI hai<br><br>Trans isomer same atoms hone ke bawajood kaam nahi karta<br><br>NCERT Ch.9 + Ch.16`)}
${RES("&#8756; Answer: Cis-platin (Option D)")}`},

{id:27,num:"Q40",subject:"Chemistry",chapter:"Organic Chemistry (Drugs)",
text:"Aspirin is known as:",
options:["Acetyl salicylic acid","Phenyl salicylate","Acetyl salicylate","Methyl salicylic acid"],correct:0,
solution:`
${STEP("Direct Answer",
`Aspirin = <span class="hl">Acetylsalicylic acid</span><br>(2-acetoxybenzoic acid)<br><br>Synthesis:<br>Salicylic acid + Acetic anhydride &rarr; Aspirin + Acetic acid<br><br>Uses: Antiinflammatory, analgesic, antipyretic<br><br>Phenyl salicylate = Salol (alag compound)<br>Methyl salicylate = Oil of wintergreen (alag)`,
`Salicylic acid ke &minus;OH group pe acetylation hoti hai<br><br>NCERT Ch.16: Chemistry in Everyday Life`)}
${RES("&#8756; Answer: Acetyl salicylic acid (Option A)")}`},

{id:28,num:"Q41",subject:"Chemistry",chapter:"Chemical Kinetics",
text:"In a 1st order reaction, concentration C varies with time t as:",
options:["1/C increases linearly with t","log C decreases linearly with t","C decreases with 1/t","log C decreases with 1/t"],correct:1,
solution:`
${STEP("Step 1 — Rate law integrate karo",
`Rate: &minus;dC/dt = kC<br>Separate: dC/C = &minus;k dt<br>Integrate: ln C = ln C&sub;0; &minus; kt`,
`1st order integrated rate law:<br>ln[C] = ln[C&sub;0;] &minus; kt<br><br>ya [C] = [C&sub;0;]e<sup>&minus;kt</sup>`)}
${STEP("Step 2 — Log form",
`2.303 log C = 2.303 log C&sub;0; &minus; kt<br><br><span class="hl">log C = log C&sub;0; &minus; kt/2.303</span><br><br>Ye linear equation hai t mein!<br>log C vs t &rarr; straight line (negative slope)<br>&there4; log C <span class="hl">decreases linearly</span> with t`,
`log C vs t &rarr; straight line<br>Slope = &minus;k/2.303<br>y-intercept = log C&sub;0;<br><br>Note: C vs t &rarr; exponential (not linear)`)}
${RES("&#8756; Answer: log C decreases linearly with t (Option B)")}`},

{id:29,num:"Q42",subject:"Chemistry",chapter:"Chemical Bonding (p&pi;-p&pi;)",
text:"Which has highest p&pi;&ndash;p&pi; bonding tendency?",
options:["N","P","As","Sb"],correct:0,
solution:`
${STEP("Concept",
`p&pi;&minus;p&pi; bonding ke liye zaroori:<br>&bull; Small atomic size<br>&bull; Compact, non-diffuse p orbitals<br>&bull; Effective lateral overlap<br><br><span class="hl">N</span>: smallest in group 15, compact 2p orbitals &rarr; best overlap<br>P,As,Sb: larger atoms, diffuse 3p,4p,5p &rarr; poor overlap<br><br>Evidence: N&equiv;N triple bond exists, but P&sub;4; has only single P&minus;P bonds`,
`p&pi;-p&pi; &prop; 1/atomic size<br><br>Down group: size&uarr; &rarr; p&pi;-p&pi;&darr;<br><br>Order: N &gt; P &gt; As &gt; Sb`)}
${RES("&#8756; Answer: N (Option A)")}`},

{id:30,num:"Q43",subject:"Chemistry",chapter:"p-Block Elements (Sulphur)",
text:"Identify the INCORRECT statement about sulphur:",
options:["S&minus;S bond angles in S&sub;8; and S&sub;6; rings are same","Rhombic and monoclinic sulphur have S&sub;8; molecules","S&sub;2; is paramagnetic like O&sub;2;","S&sub;8; ring has a crown shape"],correct:0,
solution:`
${STEP("Check each statement",
`(a) S&sub;8; bond angle = <span class="hl">105&deg;</span>, S&sub;6; bond angle = <span class="hl">102.6&deg;</span><br>&rarr; NOT same &rarr; <span class="hl">INCORRECT &#10003;</span><br><br>(b) Rhombic &amp; monoclinic dono S&sub;8; units &rarr; CORRECT<br><br>(c) S&sub;2; mein 2 unpaired e&macr; (like O&sub;2;) &rarr; paramagnetic &rarr; CORRECT<br><br>(d) S&sub;8; ring = crown shape (puckered) &rarr; CORRECT`,
`S&sub;8;: crown shape, 105&deg; bond angle<br>S&sub;6;: chair shape, 102.6&deg;<br><br>Rhombic S = stable at RT<br>Monoclinic S = stable &gt;96&deg;C<br>Both have S&sub;8; units`)}
${RES("&#8756; Answer: Option A (bond angles are NOT same &mdash; incorrect statement)")}`},

{id:31,num:"Q44",subject:"Chemistry",chapter:"Chemical Bonding (Coordinate Bond)",
text:"Which does NOT contain any coordinate bond?",
options:["H&sub;3;O&sup;+;","BF&sub;4;&macr;","HF&sub;2;&macr;","SO&sub;2;"],correct:3,
solution:`
${STEP("Check each option",
`H&sub;3;O&sup;+;: H&sub;2;O lone pair &rarr; H&sup;+; &rarr; <span class="hl">coordinate bond present</span><br><br>BF&sub;4;&macr;: F&macr; lone pair &rarr; BF&sub;3; &rarr; <span class="hl">coordinate bond present</span><br><br>HF&sub;2;&macr;: [F&minus;H&middot;&middot;&middot;F]&macr; &rarr; hydrogen bonding, not coordinate<br><br>SO&sub;2;: S uses its own electrons &rarr; it's resonance/covalent, <span class="hl">NOT coordinate</span>`,
`Coordinate bond: one atom donates BOTH electrons<br><br>HF&sub;2;&macr; = H-bond (not coordinate)<br>SO&sub;2; = resonance structure`)}
${RES("&#8756; Answer: SO&sub;2; (Option D)")}`},

{id:32,num:"Q46",subject:"Chemistry",chapter:"Solutions (Raoult's Law)",
text:"At 350K, P&deg;A=7000Pa, P&deg;B=12000Pa. Solution has 40% A. Find vapour composition.",
options:["xA=0.37; xB=0.63","xA=0.28; xB=0.72","xA=0.4; xB=0.6","xA=0.76; xB=0.24"],correct:1,
solution:`
${STEP("Step 1 — Partial pressures (Raoult's Law)",
`x<sub>A(liq)</sub>=0.40, x<sub>B(liq)</sub>=0.60<br><br>P<sub>A</sub> = 0.40&times;7000 = <span class="hl">2800 Pa</span><br>P<sub>B</sub> = 0.60&times;12000 = <span class="hl">7200 Pa</span><br>P<sub>total</sub> = 2800+7200 = <span class="hl">10000 Pa</span>`,
`Raoult's Law:<br>P<sub>A</sub> = x<sub>A(liq)</sub>&times;P&deg;<sub>A</sub><br>P<sub>B</sub> = x<sub>B(liq)</sub>&times;P&deg;<sub>B</sub><br><br>P<sub>total</sub> = P<sub>A</sub>+P<sub>B</sub>`)}
${STEP("Step 2 — Vapour composition (Dalton's Law)",
`y<sub>A(vapour)</sub> = P<sub>A</sub>/P<sub>total</sub> = 2800/10000 = <span class="hl">0.28</span><br>y<sub>B(vapour)</sub> = 7200/10000 = <span class="hl">0.72</span><br><br>Note: Vapour mein zyada volatile B (higher P&deg;) ka zyada fraction!`,
`Dalton's Law:<br>y<sub>A</sub> = P<sub>A</sub>/P<sub>total</sub><br><br>Vapour composition &ne; liquid composition<br>More volatile &rarr; enriched in vapour`)}
${RES("&#8756; Answer: xA=0.28, xB=0.72 (Option B)")}`},

{id:33,num:"Q47",subject:"Chemistry",chapter:"p-Block (Halogen Compounds)",
text:"Hydrolysis of NCl&sub;3; gives NH&sub;3; and X. What is X?",
options:["HClO&sub;4;","HClO&sub;3;","HOCl","HClO&sub;2;"],correct:2,
solution:`
${STEP("Step 1 — Reaction likhо",
`NCl&sub;3; + 3H&sub;2;O &rarr; <span class="hl">NH&sub;3; + 3HOCl</span><br><br>Kyun HOCl aur HCl nahi?<br>N more electronegative hai &rarr; N gets H (NH&sub;3;)<br>Cl less electronegative &rarr; Cl gets OH (HOCl)`,
`Compare:<br>NCl&sub;3; &rarr; NH&sub;3; + HOCl<br>(N more electronegative)<br><br>PCl&sub;3; &rarr; H&sub;3;PO&sub;3; + HCl<br>(P less electronegative)<br><br>Important difference!`)}
${RES("&#8756; Answer: HOCl (Hypochlorous acid) (Option C)")}`},

{id:34,num:"Q48",subject:"Chemistry",chapter:"Solid State",
text:"B forms CCP; A occupies half octahedral voids; O occupies all tetrahedral voids. Formula of bimetallic oxide:",
options:["A&sub;2;BO&sub;4;","AB&sub;2;O&sub;4;","A&sub;2;B&sub;2;O","A&sub;4;B&sub;2;O"],correct:1,
solution:`
${STEP("Step 1 — CCP mein voids count karo",
`n B atoms (CCP) &rarr;<br>Octahedral voids = <span class="hl">n</span><br>Tetrahedral voids = <span class="hl">2n</span>`,
`CCP important facts:<br>n atoms &rarr; n oct. voids<br>n atoms &rarr; 2n tet. voids<br><br>Yaad rakho &mdash; UGEE mein aata hai`)}
${STEP("Step 2 — Atoms count karo",
`B = n<br>A = n/2 (half oct. voids)<br>O = 2n (all tet. voids)<br><br>Ratio A:B:O = n/2 : n : 2n = <span class="hl">1:2:4</span><br>&there4; Formula = <span class="hl">AB&sub;2;O&sub;4;</span>`,
`Spinel structure: AB&sub;2;O&sub;4;<br>Example: MgAl&sub;2;O&sub;4;<br><br>This is Spinel (inverse or normal)`)}
${RES("&#8756; Answer: AB&sub;2;O&sub;4; (Option B)")}`},

{id:35,num:"Q49",subject:"Chemistry",chapter:"Coordination Compounds",
text:"[Fe(en)&sub;2;(H&sub;2;O)&sub;2;]&sup2;&sup;+ + en &rarr; X. Correct statement about X:",
options:["Low spin","Diamagnetic","Shows geometrical isomerism","(a) and (b) both"],correct:3,
solution:`
${STEP("Step 1 — X identify karo",
`en H&sub;2;O ko replace karta hai (stronger ligand)<br>&there4; X = <span class="hl">[Fe(en)&sub;3;]&sup2;&sup;+</span>`,
`Spectrochemical series:<br>en &gt;&gt; H&sub;2;O<br><br>Stronger ligand weaker ligand ko replace karta hai`)}
${STEP("Step 2 — Properties",
`Fe&sup2;&sup;+ = d&sup6;<br>en = strong field &rarr; <span class="hl">low spin</span><br>Low spin d&sup6;: t&sub;2g;&sup6; e<sub>g</sub>&sup0; &rarr; <span class="hl">0 unpaired e&macr; &rarr; diamagnetic</span><br><br>[Fe(en)&sub;3;]&sup2;&sup;+: 3 identical bidentate ligands<br>&rarr; No geometrical isomerism<br>&rarr; Only optical isomerism (&Delta; and &Lambda;)`,
`d&sup6; Low Spin:<br>Strong field &rarr; large &Delta;&sub;o; &rarr; e&macr; pair up<br><br>t&sub;2g;&sup6; e<sub>g</sub>&sup0;: all paired &rarr; diamagnetic<br>&mu; = 0 BM`)}
${RES("&#8756; Answer: Low spin AND diamagnetic (Option D)")}`},

{id:36,num:"Q50",subject:"Chemistry",chapter:"Atomic Structure",
text:"Frequency of radiation when e&macr; falls n=4 to n=1 in H atom. (IE=2.18&times;10&macr;&sup1;&sup8; J, h=6.625&times;10&macr;&sup3;&sup4; Js)",
options:["1.54&times;10&sup1;&sup5; s&macr;&sup1;","1.03&times;10&sup1;&sup5; s&macr;&sup1;","3.08&times;10&sup1;&sup5; s&macr;&sup1;","2.00&times;10&sup1;&sup5; s&macr;&sup1;"],correct:2,
solution:`
${STEP("Step 1 — Energy difference nikalo",
`&Delta;E = IE &times; (1/n&sub;1;&sup2; &minus; 1/n&sub;2;&sup2;)<br>= 2.18&times;10&macr;&sup1;&sup8; &times; (1/1 &minus; 1/16)<br>= 2.18&times;10&macr;&sup1;&sup8; &times; 15/16<br>= <span class="hl">2.044&times;10&macr;&sup1;&sup8; J</span>`,
`Bohr's formula:<br>&Delta;E = IE(1/n&sub;1;&sup2;&minus;1/n&sub;2;&sup2;)<br><br>n&sub;1;=1 (lower level)<br>n&sub;2;=4 (higher level)<br><br>Electron falls &rarr; energy emitted`)}
${STEP("Step 2 — Frequency nikalo",
`&Delta;E = h&nu; &rarr; &nu; = &Delta;E/h<br><br>&nu; = 2.044&times;10&macr;&sup1;&sup8; / 6.625&times;10&macr;&sup3;&sup4;<br>= <span class="hl">3.08&times;10&sup1;&sup5; s&macr;&sup1;</span>`,
`Planck's equation:<br>E = h&nu;<br><br>&nu; = E/h<br>Units: J/(J&middot;s) = s&macr;&sup1; = Hz`)}
${RES("&#8756; Answer: 3.08&times;10&sup1;&sup5; s&macr;&sup1; (Option C)")}`},

{id:37,num:"Q37",subject:"Chemistry",chapter:"d-Block Elements (Magnetic Moment)",
text:"Which ion has maximum magnetic moment?",
options:["Sc&sup3;&sup;+","Ti&sup3;&sup;+","Cr&sup3;&sup;+","Fe&sup3;&sup;+"],correct:3,
solution:`
${STEP("Step 1 — Unpaired electrons count karo",
`Sc&sup3;&sup;+: [Ar] 3d&sup0; &rarr; <span class="hl">0 unpaired</span><br>Ti&sup3;&sup;+: [Ar] 3d&sup1; &rarr; <span class="hl">1 unpaired</span><br>Cr&sup3;&sup;+: [Ar] 3d&sup3; &rarr; <span class="hl">3 unpaired</span><br>Fe&sup3;&sup;+: [Ar] 3d&sup5; &rarr; <span class="hl">5 unpaired</span> (half-filled!)`,
`Fe: [Ar]3d&sup6;4s&sup2;<br>Fe&sup3;&sup;+: [Ar]3d&sup5;<br><br>3d&sup5;: &uarr;&uarr;&uarr;&uarr;&uarr; (all unpaired)<br>Half-filled = most stable`)}
${STEP("Step 2 — Magnetic moment",
`&mu; = &radic;(n(n+2)) BM<br><br>Fe&sup3;&sup;+ (n=5): &mu; = &radic;(35) = <span class="hl">5.92 BM</span> &rarr; Maximum!`,
`&mu; = &radic;(n(n+2)) BM<br>n = unpaired electrons<br><br>&uarr;n &rarr; &uarr;&mu;`)}
${RES("&#8756; Answer: Fe&sup3;&sup;+ (Option D) &mdash; &mu;=5.92 BM")}`},

// ===== PHYSICS =====
{id:38,num:"Q11",subject:"Physics",chapter:"Moving Charges & Magnetism",
text:"Four long wires a,b,c,d carry uniformly distributed currents. Graph shows B vs r. Which wire has greatest B on its surface?",
options:["a","b","c","d"],correct:3,
solution:`
${STEP("Step 1 — B at surface formula",
`Wire ki surface pe (r=R):<br><br><span class="hl">B = &mu;&sub;0;I/(2&pi;R)</span><br><br>Graph mein B vs r:<br>&bull; Inside (r&lt;R): B &prop; r (linear increase)<br>&bull; Outside (r&gt;R): B &prop; 1/r (decrease)<br>&bull; Peak B = surface pe (r=R)`,
`Ampere's Law:<br>Inside: B = &mu;&sub;0;Ir/(2&pi;R&sup2;)<br>Outside: B = &mu;&sub;0;I/(2&pi;r)<br><br>Surface: B = &mu;&sub;0;I/(2&pi;R)`)}
${STEP("Step 2 — Wire 'd' ko identify karo",
`Graph pe jo wire ka peak B sabse zyada hai &rarr; <span class="hl">wire 'd'</span><br><br>Wire 'd' mein ya toh:<br>&bull; Highest current (I) hai, ya<br>&bull; Smallest radius (R) hai<br>Dono se B<sub>surface</sub> = &mu;&sub;0;I/(2&pi;R) maximum hota hai`,
`B(surface) &prop; I/R<br><br>&uarr;Current ya &darr;Radius &rarr; &uarr;B at surface<br><br>Graph pe sabse uncha peak = wire 'd'`)}
${RES("&#8756; Answer: Wire d (Option D)")}`}
];

let score=0,wrong=0,answered=0;
const total=questions.length;
function getTagClass(s){return s==="Mathematics"?"tag-math":s==="Chemistry"?"tag-chem":"tag-phys"}
function renderQuestions(filter="all"){
  const container=document.getElementById("quiz-container");
  container.innerHTML="";
  const subjects=["Mathematics","Chemistry","Physics"];
  const colors={Mathematics:"#f59e0b",Chemistry:"#10b981",Physics:"#3b82f6"};
  const emojis={Mathematics:"&#128208;",Chemistry:"&#9878;&#65039;",Physics:"&#9889;"};
  subjects.forEach(subject=>{
    const qs=questions.filter(q=>q.subject===subject&&(filter==="all"||filter===subject));
    if(!qs.length)return;
    const h=document.createElement("div");
    h.className="section-heading";
    h.innerHTML=`<div class="dot" style="background:${colors[subject]}"></div><h2>${emojis[subject]} ${subject}</h2><div class="line"></div>`;
    container.appendChild(h);
    qs.forEach((q,idx)=>{
      const card=document.createElement("div");
      card.className="q-card";card.id="card-"+q.id;
      card.style.animationDelay=(idx*0.04)+"s";
      const saved=window.qState&&window.qState[q.id];
      if(saved)card.classList.add(saved.correct?"answered-correct":"answered-wrong");
      card.innerHTML=`
        <div class="q-meta">
          <span class="q-num">${q.num}</span>
          <span class="q-tag ${getTagClass(q.subject)}">${q.subject}</span>
          <span class="chapter-tag">${q.chapter}</span>
        </div>
        <div class="q-text">${q.text}</div>
        <div class="options" id="opts-${q.id}">
          ${q.options.map((opt,i)=>`<button class="opt-btn ${saved&&saved.selected===i?(saved.correct?'correct':'wrong'):''} ${saved&&i===q.correct&&saved.selected!==i?'correct':''}" onclick="selectOption(${q.id},${i})" ${saved?'disabled':''} id="opt-${q.id}-${i}"><span class="opt-label">${String.fromCharCode(65+i)}</span>${opt}</button>`).join("")}
        </div>
        <button class="check-btn" id="check-${q.id}" onclick="checkAnswer(${q.id})" ${saved?'disabled':''}>
          ${saved?(saved.correct?"&#10003; Correct!":"&#10007; Wrong"):"Check Answer"}
        </button>
        <div class="answer-box ${saved?"show":""} ${saved?(saved.correct?"correct-ans":"wrong-ans"):""}" id="ans-${q.id}">
          ${saved?`<div class="ans-header">${saved.correct?"&#10003; Correct Answer!":"&#10007; Wrong &mdash; Correct: "+q.options[q.correct]}</div><div class="solution-area">${q.solution}</div>`:""}
        </div>`;
      container.appendChild(card);
    });
  });
  updateScore();
}
window.qState={};window.selected={};
function selectOption(qId,optIdx){
  if(window.qState[qId])return;
  window.selected[qId]=optIdx;
  document.querySelectorAll("#opts-"+qId+" .opt-btn").forEach(function(btn,i){btn.classList.remove("selected");if(i===optIdx)btn.classList.add("selected")});
  document.getElementById("check-"+qId).disabled=false;
}
function checkAnswer(qId){
  if(window.qState[qId])return;
  const q=questions.find(function(x){return x.id===qId});
  const sel=window.selected[qId];
  if(sel===undefined)return;
  const isCorrect=sel===q.correct;
  window.qState[qId]={selected:sel,correct:isCorrect};
  document.querySelectorAll("#opts-"+qId+" .opt-btn").forEach(function(btn,i){btn.disabled=true;btn.classList.remove("selected");if(i===q.correct)btn.classList.add("correct");if(i===sel&&!isCorrect)btn.classList.add("wrong")});
  const ansBox=document.getElementById("ans-"+qId);
  ansBox.className="answer-box show "+(isCorrect?"correct-ans":"wrong-ans");
  ansBox.innerHTML=`<div class="ans-header">${isCorrect?"&#10003; Correct Answer!":"&#10007; Wrong &mdash; Correct: "+q.options[q.correct]}</div><div class="solution-area">${q.solution}</div>`;
  document.getElementById("card-"+qId).classList.add(isCorrect?"answered-correct":"answered-wrong");
  const cb=document.getElementById("check-"+qId);cb.disabled=true;cb.textContent=isCorrect?"&#10003; Correct!":"&#10007; Wrong";
  if(isCorrect)score++;else wrong++;
  answered++;updateScore();
}
function updateScore(){
  document.getElementById("score-val").textContent=score;
  document.getElementById("wrong-val").textContent=wrong;
  document.getElementById("remain-val").textContent=total-answered;
  document.getElementById("progress-bar").style.width=(answered/total*100)+"%";
}
function resetQuiz(){
  if(!confirm("Reset all answers?"))return;
  score=0;wrong=0;answered=0;window.qState={};window.selected={};renderQuestions(currentFilter);
}
let currentFilter="all";
document.querySelectorAll(".tab").forEach(function(tab){
  tab.addEventListener("click",function(){
    document.querySelectorAll(".tab").forEach(function(t){t.classList.remove("active")});
    this.classList.add("active");currentFilter=this.dataset.filter;renderQuestions(currentFilter);
  });
});
renderQuestions();
</script>
</body>
</html>
