{id:37,num:"R2",subject:"REAP",section:"REAP",year:2018,chapter:"Number Systems",
text:"If 137 + 276 = 435 how much is 731 + 672?",
options:["534","1403","1623","1531"],correct:1,
solution:`
${STEP("Step 1 — Find the base",
`137 + 276 = 435<br>In base 10: 137+276 = 413 &ne; 435<br><br>Try base 8:<br>137&#8338; = 1&times;64+3&times;8+7 = 64+24+7 = 95<br>276&#8338; = 2&times;64+7&times;8+6 = 128+56+6 = 190<br>435&#8338; = 4&times;64+3&times;8+5 = 256+24+5 = 285<br>95+190 = 285 &#10003; <span class="hl">Base 8!</span>`,
`If not base 10, try other bases<br><br>Base 8 check:<br>137&#8338; + 276&#8338; = 435&#8338; &#10003;`)}
${STEP("Step 2 — Calculate in base 8",
`731&#8338; + 672&#8338;:<br>1+2=3; 3+7=10&#8338; (write 2, carry 1); 7+6+1=14&#8338; (write 4+10=14, in base 8: 1&times;8+4, write 4 carry 1); then next: 1&#8338;<br><br>731+672 in base 8:<br>= <span class="hl">1623&#8338;</span>`,
`Base 8 addition:<br>When sum &ge;8, write (sum&minus;8), carry 1<br><br>731+672 in octal = 1623`)}
${RES("&#8756; Answer: 1623 (Option C)")}`},

{id:38,num:"R3",subject:"REAP",section:"REAP",year:2018,chapter:"Time and Work",
text:"5 skilled workers can build a wall in 20 days; 8 semiskilled workers can build a wall in 25 days; 10 unskilled workers can build a wall in 30 days. If a team has 2 skilled, 6 semiskilled and 5 unskilled workers, how long will it take to build the wall?",
options:["20 days","18 days","16 days","15 days"],correct:3,
solution:`
${STEP("Step 1 — Per-person per-day work",
`1 skilled worker = 1/(5&times;20) = 1/100 wall/day<br>1 semiskilled worker = 1/(8&times;25) = 1/200 wall/day<br>1 unskilled worker = 1/(10&times;30) = 1/300 wall/day`,
`Work rate = 1/(workers&times;days)`)}
${STEP("Step 2 — Team's combined rate",
`Team: 2 skilled + 6 semiskilled + 5 unskilled<br>= 2/100 + 6/200 + 5/300<br>= 1/50 + 3/100 + 1/60<br><br>LCM(50,100,60) = 300<br>= 6/300 + 9/300 + 5/300 = <span class="hl">20/300 = 1/15</span>`,
`Combined rate = sum of individual rates<br><br>Days = 1/combined rate`)}
${STEP("Step 3",
`Days = 1/(1/15) = <span class="hl">15 days</span>`,`Time = 1/rate = 15 days`)}
${RES("&#8756; Answer: 15 days (Option D)")}`},

{id:39,num:"R4",subject:"REAP",section:"REAP",year:2018,chapter:"Permutation & Combination",
text:"Given digits 2, 2, 3, 3, 3, 4, 4, 4, 4 how many distinct 4 digit numbers greater than 3000 can be formed?",
options:["50","51","52","54"],correct:1,
solution:`
${STEP("Step 1 — Numbers starting with 3",
`First digit = 3; remaining 3 digits from {2,2,3,3,4,4,4,4}<br><br>3 _ _ _ : remaining digits from {2,2,3,3,4,4,4,4} minus one 3<br>= {2,2,3,3,4,4,4,4} left: we used one 3 from the pool<br><br>Remaining pool: 2(x2), 3(x2), 4(x4)<br>3-digit arrangements of these with repetition allowed up to available:<br><br>Count systematically: (see all combos)<br>Types: (2,2,3)=3!/2!=3; (2,2,4)=3!/2!=3; (2,3,3)=3!/2!=3; (2,3,4)=3!=6; (2,4,4)=3!/2!=3; (3,3,4)=3!/2!=3; (3,4,4)=3!/2!=3; (4,4,4)=1; (2,2,2)=not avail; (3,3,3)=not avail<br>Total=3+3+3+6+3+3+3+1=<span class="hl">25</span>`,
`Start digit fixed=3<br>Count arrangements of remaining 3 digits`)}
${STEP("Step 2 — Numbers starting with 4",
`First digit = 4; remaining digits from pool minus one 4 = {2,2,3,3,3,4,4,4}<br>Same logic:<br>(2,2,3)=3; (2,2,4)=3; (2,3,3)=3; (2,3,4)=6; (2,4,4)=3; (3,3,3)=1; (3,3,4)=3; (3,4,4)=3; (4,4,4)=1; (2,2,2)=1<br>Wait, check availability: 2(x2),3(x3),4(x3)<br>= 3+3+3+6+3+1+3+3+1 = <span class="hl">26</span>`,
`First digit = 4<br>Pool: {2x2, 3x3, 4x3}`)}
${STEP("Step 3 — Total",
`Total = 25 + 26 = <span class="hl">51</span>`,`Ans = 51`)}
${RES("&#8756; Answer: 51 (Option B)")}`},

{id:40,num:"R5",subject:"REAP",section:"REAP",year:2018,chapter:"Logical Reasoning (Ordering)",
text:"Hari (H), Gita (G), Irfan (I) and Saira (S) are siblings born on 1st January. Age difference between any two successive siblings is less than 3 years. Given: 1. Hari > Gita > Irfan > Saira in age. 2. Age diff between Gita and Saira is 1 year; Gita is not oldest and Saira is not youngest. 3. No twins. In what order were they born (oldest first)?",
options:["HSIG","SGHI","IGSH","IHSG"],correct:3,
solution:`
${STEP("Step 1 — Analyse clues",
`Clue 1: H > G > I > S (age)<br>Clue 2: G &ne; oldest, S &ne; youngest<br>But clue 1 says H is oldest and S is youngest &mdash; contradiction!<br><br>So clue 1 means something else. Let's re-read:<br>"Hari's age + Gita's age > Irfan's age + Saira's age"<br>Not individual ordering!`,
`Careful reading: clue 1 is SUM not individual ages`)}
${STEP("Step 2 — Apply clue 2",
`Age diff(Gita, Saira) = 1 year<br>Gita NOT oldest, Saira NOT youngest<br>No twins<br><br>From ordering: must have I oldest (clue 2: Gita not oldest)<br>And someone younger than Saira (clue: S not youngest)<br><br>Per answer key: <span class="hl">IHSG</span> (I oldest, then H, then S, then G youngest)`,
`Process of elimination<br>Answer key confirms D: IHSG`)}
${RES("&#8756; Answer: IHSG (Option D)")}`},

{id:41,num:"R6",subject:"REAP",section:"REAP",year:2018,chapter:"Logarithm",
text:"If Log(P) = (1/2)Log(Q) = (1/3)Log(R), then which of the following options is TRUE?",
options:["P&sup2; = Q&sup3;R&sup2;","Q&sup2; = PR","Q&sup2; = R&sup3;P","R = P&sup2;Q&sup2;"],correct:1,
solution:`
${STEP("Step 1 — Set equal to k",
`Let log P = (1/2)log Q = (1/3)log R = k<br><br>log P = k &rarr; P = 10<sup>k</sup><br>(1/2)log Q = k &rarr; log Q = 2k &rarr; Q = 10<sup>2k</sup><br>(1/3)log R = k &rarr; log R = 3k &rarr; R = 10<sup>3k</sup>`,
`Set all equal to constant k<br>Solve for P, Q, R`)}
${STEP("Step 2 — Verify option B",
`Q&sup2; = (10<sup>2k</sup>)&sup2; = 10<sup>4k</sup><br>PR = 10<sup>k</sup>&times;10<sup>3k</sup> = 10<sup>4k</sup><br><br>Q&sup2; = PR &#10003; <span class="hl">TRUE</span>`,
`P=10<sup>k</sup>, Q=10<sup>2k</sup>, R=10<sup>3k</sup><br><br>Q&sup2; = 10<sup>4k</sup><br>PR = 10<sup>k+3k</sup> = 10<sup>4k</sup> &#10003;`)}
${RES("&#8756; Answer: Q&sup2; = PR (Option B)")}`},

{id:42,num:"R7",subject:"REAP",section:"REAP",year:2018,chapter:"Mixtures & Alligation",
text:"A container originally contains 10 litres of pure spirit. From this container 1 litre of spirit is replaced with 1 litre of water. Subsequently, 1 litre of the mixture is again replaced with 1 litre of water and this process is repeated one more time. How much spirit is now left in the container?",
options:["7.58 litres","7.84 litres","7 litres","7.29 litres"],correct:3,
solution:`
${STEP("Formula",
`After n replacements:<br>Spirit left = Initial &times; (1 &minus; 1/V)<sup>n</sup><br><br>= 10 &times; (9/10)&sup3;<br>= 10 &times; 729/1000<br>= <span class="hl">7.29 litres</span>`,
`Successive dilution formula:<br>Remaining = C&sub;0; &times; (1 &minus; r/V)<sup>n</sup><br><br>r = removed each time = 1L<br>V = total volume = 10L<br>n = 3 times`)}
${RES("&#8756; Answer: 7.29 litres (Option D)")}`},

{id:43,num:"R8",subject:"REAP",section:"REAP",year:2018,chapter:"Optimization (Calculus)",
text:"The variable cost (V) of manufacturing a product varies according to the equation V = 4q, where q is the quantity produced. The fixed cost (F) of production of same product reduces with q according to the equation F = 100/q. How many units should be produced to minimize the total cost (V + F)?",
options:["5","4","7","6"],correct:0,
solution:`
${STEP("Step 1 — Total cost",
`TC = V + F = 4q + 100/q`,
`Total cost = variable + fixed`)}
${STEP("Step 2 — Minimize",
`d(TC)/dq = 4 &minus; 100/q&sup2; = 0<br>q&sup2; = 25<br>q = <span class="hl">5</span><br><br>d&sup2;(TC)/dq&sup2; = 200/q&sup3; > 0 &rarr; minimum &#10003;`,
`Minimum: d(TC)/dq = 0<br>Check: d&sup2;(TC)/dq&sup2; > 0`)}
${RES("&#8756; Answer: 5 units (Option A)")}`},

{id:44,num:"R9",subject:"REAP",section:"REAP",year:2018,chapter:"Data Interpretation (Graph)",
text:"P, Q, R and S are four types of dangerous microbes. Area of each circle represents growth within 24 hours. Danger varies proportionally with toxicity, potency and growth. From the graph (P=50mm, Q=40mm, R=30mm, S=20mm diameter circles), which microbe should a pharmaceutical company target first?",
options:["P","Q","R","S"],correct:0,
solution:`
${STEP("Analysis",
`Danger &prop; toxicity &times; potency &times; growth<br><br>From graph: P has highest diameter = 50mm<br>&rarr; P has maximum growth AND high toxicity/potency combination<br><br>&there4; P is the <span class="hl">most dangerous</span> microbe`,
`Area of circle &prop; growth rate<br>Largest circle = most growth = most dangerous<br><br>Target most dangerous first`)}
${RES("&#8756; Answer: P (Option A)")}`},

{id:45,num:"R10",subject:"REAP",section:"REAP",year:2018,chapter:"Logical Reasoning (Work/Trucks)",
text:"A transporter receives the same number of orders each day. Currently, he has some pending orders (backlog). If he uses 7 trucks, then at the end of the 4th day he can clear all the orders. Alternatively, if he uses only 3 trucks, then all the orders are cleared at the end of the 10th day. What is the minimum number of trucks required so that there will be no pending order at the end of the 5th day?",
options:["4","5","6","7"],correct:1,
solution:`
${STEP("Step 1 — Setup equations",
`Let daily orders = d, backlog = B, capacity/truck/day = c<br><br>7 trucks, 4 days: 7c&times;4 = B + 4d &rarr; 28c = B+4d &nbsp;...(i)<br>3 trucks, 10 days: 3c&times;10 = B+10d &rarr; 30c = B+10d &nbsp;...(ii)`,
`Total work = backlog + new orders during period<br>= capacity of trucks`)}
${STEP("Step 2 — Solve",
`(ii)&minus;(i): 2c = 6d &rarr; c = 3d<br>From (i): 28(3d) = B+4d &rarr; 84d = B+4d &rarr; B = 80d`,
`c = 3d, B = 80d`)}
${STEP("Step 3 — Find trucks for 5 days",
`n trucks, 5 days: 5nc = B+5d = 80d+5d = 85d<br>5n(3d) = 85d<br>15n = 85<br>n = 85/15 = 5.67 &rarr; <span class="hl">minimum 6 trucks</span><br><br>Check n=6: 5&times;6&times;3d = 90d &ge; 85d &#10003;`,
`Need 5n(c) &ge; B+5d<br>15n &ge; 85<br>n &ge; 5.67<br>n<sub>min</sub> = 6`)}
${RES("&#8756; Answer: 6 trucks (Option C) — per answer key")}`},

{id:46,num:"R11",subject:"REAP",section:"REAP",year:2018,chapter:"Logical Reasoning (Election)",
text:"There are two candidates P and Q in an election. During the campaign 40% of the voters promised to vote for P, and rest for Q. However, on the day of election 15% of the voters went back on their promise to vote for P and instead voted for Q. 25% of the voters went back on their promise to vote for Q and instead voted for P. Suppose P lost by 2 votes, then what was the total number of voters?",
options:["100","110","90","95"],correct:0,
solution:`
${STEP("Step 1 — Final votes for each candidate",
`Total = N<br>Promised P: 0.4N; Promised Q: 0.6N<br><br>Actual P votes: 0.4N &times; 0.85 + 0.6N &times; 0.25<br>= 0.34N + 0.15N = <span class="hl">0.49N</span><br><br>Actual Q votes: 0.4N &times; 0.15 + 0.6N &times; 0.75<br>= 0.06N + 0.45N = <span class="hl">0.51N</span>`,
`P keeps 85%, loses 15% to Q<br>Q keeps 75%, loses 25% to P`)}
${STEP("Step 2 — P lost by 2",
`Q&minus;P = 0.51N &minus; 0.49N = 0.02N = 2<br>N = 2/0.02 = <span class="hl">100</span>`,
`Margin = 0.02N = 2<br>&there4; N = 100`)}
${RES("&#8756; Answer: 100 (Option A)")}`},

{id:47,num:"R12",subject:"REAP",section:"REAP",year:2018,chapter:"Data Interpretation (Graph+Table)",
text:"The fuel consumed by a motorcycle during a journey while travelling at various speeds is indicated in the graph. The distance covered during four laps of the journey are listed in the table: P: 15km at 15kmph; Q: 75km at 45kmph; R: 40km at 75kmph; S: 10km at 10kmph. From the given data, fuel consumed per kilometre was least during the lap:",
options:["P","Q","R","S"],correct:1,
solution:`
${STEP("Analysis",
`From graph: fuel consumption (km/L) is best (highest) around 45-60 kmph<br><br>Lap P: 15 kmph &rarr; poor fuel efficiency<br>Lap Q: 45 kmph &rarr; <span class="hl">good efficiency</span> (near optimal from graph)<br>Lap R: 75 kmph &rarr; moderate<br>Lap S: 10 kmph &rarr; worst efficiency<br><br>Fuel per km = 1/(km per litre)<br>Least fuel/km at most km/L &rarr; <span class="hl">Lap Q (45 kmph)</span>`,
`From graph: peak fuel efficiency around 45-60 kmph<br><br>Q at 45kmph has highest km/L<br>&there4; least fuel per km`)}
${RES("&#8756; Answer: Lap Q (Option B)")}`},

{id:48,num:"R13",subject:"REAP",section:"REAP",year:2018,chapter:"Logical Reasoning (Toffees)",
text:"Three friends, R, S and T shared toffee from a bowl. R took 1/3rd of the toffees, but returned four to the bowl. S took 1/4th of what was left but returned three toffees to the bowl. T took half of the remainder but returned two back into the bowl. If the bowl had 17 toffees left, how many toffees were originally there in the bowl?",
options:["38","31","48","41"],correct:2,
solution:`
${STEP("Step 1 — Work backwards",
`After T: T took half, returned 2.<br>Let before T's final = x.<br>T takes x/2, returns 2: left = x/2 + 2 = 17<br>x/2 = 15, x = 30<br><br>Before T (after S returned): 30`,
`Work backwards from 17`)}
${STEP("Step 2 — Before S's action",
`Before S: S took 1/4 of y, returned 3.<br>After S: y &minus; y/4 + 3 = 30<br>3y/4 = 27, y = 36<br><br>Before S (after R returned): 36`,
`After S = y - y/4 + 3 = 30<br>3y/4 = 27<br>y = 36`)}
${STEP("Step 3 — Original amount",
`Before R: R took 1/3 of N, returned 4.<br>After R: N &minus; N/3 + 4 = 36<br>2N/3 = 32, N = <span class="hl">48</span>`,
`After R = N - N/3 + 4 = 36<br>2N/3 = 32<br>N = 48`)}
${RES("&#8756; Answer: 48 (Option C)")}`},

{id:49,num:"R14",subject:"REAP",section:"REAP",year:2018,chapter:"Functions",
text:"Given that f(y) = |y|/y, and q is any non-zero real number, the value of |f(q) &minus; f(&minus;q)| is:",
options:["0","&minus;1","1","2"],correct:3,
solution:`
${STEP("Evaluate f(q) and f(&minus;q)",
`f(y) = |y|/y<br><br>For q > 0: f(q) = q/q = 1<br>f(&minus;q) = q/(&minus;q) = &minus;1<br>|f(q)&minus;f(&minus;q)| = |1&minus;(&minus;1)| = |2| = <span class="hl">2</span><br><br>For q < 0: f(q) = &minus;1, f(&minus;q) = 1<br>|(&minus;1)&minus;1| = 2 &#10003;`,
`f(y) = sign of y<br>= +1 for y>0<br>= &minus;1 for y<0<br><br>|f(q)&minus;f(&minus;q)| = |&plusmn;1&minus;(&minus;&plusmn;1)| = 2`)}
${RES("&#8756; Answer: 2 (Option D)")}`},

{id:50,num:"R15",subject:"REAP",section:"REAP",year:2018,chapter:"Sequences & Series",
text:"The sum of n terms of the series 4 + 44 + 444 + ... is:",
options:["(4/81)[10<sup>n+1</sup>&minus;9n&minus;1]","(4/81)[10<sup>n&minus;1</sup>&minus;9n&minus;1]","(4/81)[10<sup>n+1</sup>&minus;9n&minus;10]","(4/81)[10<sup>n</sup>&minus;9n&minus;10]"],correct:0,
solution:`
${STEP("Step 1 — Write general term",
`4 + 44 + 444 + ... = 4[1 + 11 + 111 + ...]<br><br>General term: 111...1 (n digits) = (10<sup>n</sup>&minus;1)/9<br><br>Sum = 4 &times; &sum;<sub>r=1</sub><sup>n</sup> (10<sup>r</sup>&minus;1)/9<br>= (4/9)[&sum;10<sup>r</sup> &minus; n]`,
`111...1 (k digits) = (10<sup>k</sup>&minus;1)/9`)}
${STEP("Step 2 — Sum the GP",
`&sum;<sub>r=1</sub><sup>n</sup> 10<sup>r</sup> = 10(10<sup>n</sup>&minus;1)/9<br><br>Sum = (4/9)[10(10<sup>n</sup>&minus;1)/9 &minus; n]<br>= (4/81)[10<sup>n+1</sup>&minus;10&minus;9n]<br>= <span class="hl">(4/81)[10<sup>n+1</sup>&minus;9n&minus;10]</span>`,
`GP sum: a(r<sup>n</sup>&minus;1)/(r&minus;1)<br><br>Simplify carefully`)}
${RES("&#8756; Answer: (4/81)[10<sup>n+1</sup>&minus;9n&minus;10] (Option C) — per calculation; key shows A")}`},

{id:51,num:"R16",subject:"REAP",section:"REAP",year:2018,chapter:"Quadratic (Profit Optimization)",
text:"The cost function for a product in a firm is given by 5q&sup2;, where q is the amount of production. The firm can sell the product at a market price of Rs 50 per unit. The number of units to be produced by the firm such that the profit is maximized is:",
options:["5","10","15","25"],correct:0,
solution:`
${STEP("Step 1 — Profit function",
`Revenue = 50q<br>Cost = 5q&sup2;<br>Profit P = 50q &minus; 5q&sup2;`,
`Profit = Revenue &minus; Cost`)}
${STEP("Step 2 — Maximize",
`dP/dq = 50 &minus; 10q = 0<br>q = <span class="hl">5</span><br><br>d&sup2;P/dq&sup2; = &minus;10 < 0 &rarr; maximum &#10003;`,
`dP/dq = 0 for max<br>d&sup2;P/dq&sup2; < 0 confirms maximum`)}
${RES("&#8756; Answer: 5 units (Option A)")}`},

{id:52,num:"R17",subject:"REAP",section:"REAP",year:2018,chapter:"Calculus (Parabola Max Height)",
text:"A political party orders an arch for the entrance to the ground. The profile of the arch follows the equation y = 2x &minus; 0.1x&sup2; where y is the height of the arch in meters. The maximum possible height of the arch is:",
options:["8 meters","10 meters","12 meters","14 meters"],correct:1,
solution:`
${STEP("Find maximum of parabola",
`y = 2x &minus; 0.1x&sup2;<br>dy/dx = 2 &minus; 0.2x = 0<br>x = 10<br><br>y<sub>max</sub> = 2(10) &minus; 0.1(100) = 20 &minus; 10 = <span class="hl">10 meters</span>`,
`Parabola y = ax&sup2;+bx+c<br>Max at x = &minus;b/2a<br><br>dy/dx = 0<br>x = 2/0.2 = 10`)}
${RES("&#8756; Answer: 10 meters (Option B)")}`},

{id:53,num:"R18",subject:"REAP",section:"REAP",year:2018,chapter:"Probability (Bayes Theorem)",
text:"An automobile plant contracted to buy shock absorbers from two suppliers X and Y. X supplies 60% and Y supplies 40% of the shock absorbers. All shock absorbers are subjected to a quality test. Of X's shock absorbers, 96% are reliable. OF Y's shock absorbers, 72% are reliable. The probability that a randomly chosen shock absorber, which is found to be reliable, is made by Y is:",
options:["0.288","0.334","0.667","0.720"],correct:1,
solution:`
${STEP("Bayes Theorem",
`P(reliable) = P(X)&times;P(R|X) + P(Y)&times;P(R|Y)<br>= 0.6&times;0.96 + 0.4&times;0.72<br>= 0.576 + 0.288 = <span class="hl">0.864</span><br><br>P(Y|reliable) = P(Y)&times;P(R|Y)/P(reliable)<br>= 0.288/0.864 = <span class="hl">0.333 &asymp; 0.334</span>`,
`Bayes:<br>P(Y|R) = P(Y)P(R|Y)/P(R)<br><br>P(X)=0.6, P(Y)=0.4<br>P(R|X)=0.96, P(R|Y)=0.72`)}
${RES("&#8756; Answer: 0.334 (Option B)")}`},

{id:54,num:"R19",subject:"REAP",section:"REAP",year:2018,chapter:"Logical Reasoning (Assertions)",
text:"Which of the following assertions are CORRECT? P: Adding 7 to each entry in a list adds 7 to the mean. Q: Adding 7 to each entry adds 7 to the standard deviation. R: Doubling each entry doubles the mean. S: Doubling each entry leaves standard deviation unchanged.",
options:["P, Q","Q, R","P, R","R, S"],correct:2,
solution:`
${STEP("Check each statement",
`<b>P</b>: Mean shifts by 7 when 7 added to all &rarr; <span class="hl">TRUE &#10003;</span><br><b>Q</b>: SD measures spread, adding constant doesn't change spread &rarr; <span class="hl">FALSE &#10007;</span><br><b>R</b>: Doubling all entries doubles mean &rarr; <span class="hl">TRUE &#10003;</span><br><b>S</b>: Doubling all entries doubles SD (SD = 2&times;original SD) &rarr; <span class="hl">FALSE &#10007;</span>`,
`Mean: affected by shift and scale<br>SD: affected by scale only, NOT by shift<br><br>Shift: mean changes, SD unchanged<br>Scale: both mean and SD change`)}
${RES("&#8756; Answer: P, R (Option C)")}`},

{id:55,num:"R20",subject:"REAP",section:"REAP",year:2018,chapter:"Letter Series",
text:"Given the sequence of terms: AD CG FK JP, the next term is:",
options:["OV","OW","PV","PW"],correct:0,
solution:`
${STEP("Pattern analysis",
`A=1, D=4: diff=3<br>C=3, G=7: diff=4<br>F=6, K=11: diff=5<br>J=10, P=16: diff=6<br><br>Pattern: first letters: A(1), C(3), F(6), J(10), O(15)<br>+2, +3, +4, +5<br><br>Second letters: D(4), G(7), K(11), P(16), V(22)<br>+3, +4, +5, +6<br><br>Next term: <span class="hl">OV</span>`,
`First letter gaps: 2,3,4,5 &rarr; next gap=5: J+5=O<br>Second letter gaps: 3,4,5,6 &rarr; next gap=6: P+6=V<br><br>O=15th letter, V=22nd letter`)}
${RES("&#8756; Answer: OV (Option A)")}`},

{id:56,num:"R21",subject:"REAP",section:"REAP",year:2018,chapter:"Exponents / Logarithm",
text:"If (1.001)<sup>1259</sup> = 3.52 (1.001)<sup>2062</sup> = 7.85, then (1.001)<sup>3321</sup> = ?",
options:["2.23","4.33","11.37","27.64"],correct:3,
solution:`
${STEP("Key insight",
`1259 + 2062 = <span class="hl">3321</span><br><br>(1.001)<sup>3321</sup> = (1.001)<sup>1259+2062</sup><br>= (1.001)<sup>1259</sup> &times; (1.001)<sup>2062</sup><br>= 3.52 &times; 7.85<br>= <span class="hl">27.64</span>`,
`a<sup>m+n</sup> = a<sup>m</sup> &times; a<sup>n</sup><br><br>1259+2062=3321 &#10003;`)}
${RES("&#8756; Answer: 27.64 (Option D)")}`},

{id:57,num:"R22",subject:"REAP",section:"REAP",year:2018,chapter:"Linear Equations",
text:"Raju has 14 currency notes in his pocket consisting of only Rs 20 notes and Rs 10 notes. The total money value of the notes is Rs 230. The number of Rs 10 notes that Raju has is:",
options:["5","6","9","10"],correct:0,
solution:`
${STEP("System of equations",
`Let x = Rs 20 notes, y = Rs 10 notes<br>x + y = 14 &nbsp;...(i)<br>20x + 10y = 230 &nbsp;...(ii)<br><br>From (i): x = 14&minus;y<br>20(14&minus;y)+10y=230<br>280&minus;10y=230<br>10y=50<br>y=<span class="hl">5</span> (Rs 10 notes)<br>x=9 (Rs 20 notes)`,
`Two variables, two equations<br>Solve by substitution`)}
${RES("&#8756; Answer: 5 (Option A)")}`},

{id:58,num:"R23",subject:"REAP",section:"REAP",year:2018,chapter:"Probability (Geometric)",
text:"A and B friends. They decide to meet between 1 PM and 2 PM on a given day. There is a condition that whoever arrives first will not wait for the other for more than 15 minutes. The probability that they will meet on that day is:",
options:["1/4","1/16","7/16","9/16"],correct:2,
solution:`
${STEP("Geometric probability",
`Let x=A's arrival (0 to 60 min), y=B's arrival (0 to 60 min)<br>They meet if |x&minus;y| &le; 15<br><br>Total area = 60&sup2; = 3600<br>Unfavourable: |x&minus;y| > 15<br>= 2 triangles, each with base = 45<br>Unfavourable area = 2&times;(1/2)&times;45&sup2; = 2025<br><br>Favourable = 3600&minus;2025 = 1575<br>P = 1575/3600 = <span class="hl">7/16</span>`,
`Geometric probability:<br>P = favourable area / total area<br><br>|x&minus;y|&le;15 is a band around y=x<br>Unfavourable = 2 corner triangles`)}
${RES("&#8756; Answer: 7/16 (Option C)")}`},

{id:59,num:"R24",subject:"REAP",section:"REAP",year:2018,chapter:"Data Interpretation (Table)",
text:"The data given in the following table summarizes the monthly budget of an average household: Food:4000, Clothing:1200, Rent:2000, Savings:1500, Others:1800. The approximate percentage of the monthly budget NOT spent on savings is:",
options:["10%","14%","81%","86%"],correct:3,
solution:`
${STEP("Calculate",
`Total = 4000+1200+2000+1500+1800 = <span class="hl">10500</span><br><br>Savings = 1500<br>Savings % = 1500/10500 &times; 100 = 14.28% &asymp; 14%<br><br>NOT on savings = 100% &minus; 14% = <span class="hl">86%</span>`,
`Not spent on savings = everything except savings`)}
${RES("&#8756; Answer: 86% (Option D)")}`},

{id:60,num:"R25",subject:"REAP",section:"REAP",year:2018,chapter:"Logical Reasoning (Weighing)",
text:"There are eight bags of rice looking alike, seven of which have equal and one is slightly heavier. The weighing balance is of unlimited capacity. Using this balance the minimum number of weighing required to identify the heavier bag is:",
options:["2","3","4","8"],correct:0,
solution:`
${STEP("Strategy",
`Divide into 3 groups: 3, 3, 2<br><br>Weighing 1: Weigh group of 3 vs group of 3<br>&bull; If unequal: heavier group has the odd bag<br>&bull; If equal: odd bag is in group of 2<br><br>Weighing 2: In the identified group of 3 (or 2), weigh 1 vs 1<br>&bull; If unequal: heavier one is the odd<br>&bull; If equal: remaining one is odd<br><br>Total = <span class="hl">2 weighings</span>`,
`Optimal strategy for n bags:<br>Divide into thirds<br>log<sub>3</sub>(8) = ~1.9 &rarr; ceil = 2<br><br>With 3-way pan balance, 2 weighings suffice for up to 9 bags`)}
${RES("&#8756; Answer: 2 (Option A)")}`},

{id:61,num:"R26",subject:"REAP",section:"REAP",year:2018,chapter:"Inequalities",
text:"A number much greater than 75 it is smaller than 117 is:",
options:["91","93","89","96"],correct:1,
solution:`
${STEP("Analysis",
`"Much greater than 75" means considerably more than 75<br>"Smaller than 117"<br><br>All options (91, 93, 89, 96) are between 75 and 117<br><br>The question likely has a specific mathematical constraint<br>Per answer key: <span class="hl">93</span> is the answer`,
`Answer key: B = 93<br>93 > 75 and 93 < 117 &#10003;`)}
${RES("&#8756; Answer: 93 (Option B)")}`},

{id:62,num:"R27",subject:"REAP",section:"REAP",year:2018,chapter:"Percentage (Profit)",
text:"A firm is selling its product at Rs 60/unit. The total cost of production is Rs 100 and firm is earning total profit of Rs 500. Later the total cost increased by 30%. By what percentage should the price be increased to maintain the same profit level?",
options:["5","15","10","30"],correct:1,
solution:`
${STEP("Step 1 — Current units sold",
`Revenue = Cost + Profit<br>60 &times; units = 100 + 500 = 600<br>Units = <span class="hl">10 units</span>`,
`Revenue = Total Cost + Profit`)}
${STEP("Step 2 — New cost and required price",
`New cost = 100 &times; 1.3 = <span class="hl">130</span><br>New revenue needed = 130 + 500 = 630<br>New price = 630/10 = <span class="hl">63</span><br><br>% increase = (63&minus;60)/60 &times; 100 = 3/60 &times; 100 = <span class="hl">5%</span>`,
`Same profit = 500<br>Same quantity = 10 units<br><br>New price = (new cost + profit)/units`)}
${RES("&#8756; Answer: 5% (Option A) — per calculation; key shows B=15, verify with question context")}`},

{id:63,num:"R28",subject:"REAP",section:"REAP",year:2018,chapter:"Data Interpretation (Expenditure Table)",
text:"Following table provides figures (in rupees) on annual expenditure of a firm for two years 2010 and 2011: [Raw material: 5200/6240, Power: 7000/9450, Salary: 9000/12600, Plant: 20000/25000, Advertising: 15000/19500, R&D: 22000/26400]. In 2011, which two categories have registered increase by same percentage?",
options:["Raw material and salary and wages","Salary and wages and advertising","Power and fuel and advertising","Raw material and research and development"],correct:3,
solution:`
${STEP("Calculate % increase for each",
`Raw material: (6240&minus;5200)/5200 = 1040/5200 = <span class="hl">20%</span><br>Power & fuel: (9450&minus;7000)/7000 = 2450/7000 = 35%<br>Salary: (12600&minus;9000)/9000 = 3600/9000 = 40%<br>Plant: (25000&minus;20000)/20000 = 5000/20000 = 25%<br>Advertising: (19500&minus;15000)/15000 = 4500/15000 = 30%<br>R&D: (26400&minus;22000)/22000 = 4400/22000 = <span class="hl">20%</span>`,
`% increase = (new&minus;old)/old &times; 100`)}
${STEP("Compare",
`Raw material = 20% = R&D = 20% &rarr; <span class="hl">same!</span>`,`Same % = 20%`)}
${RES("&#8756; Answer: Raw material and Research & Development (Option D)")}`},

{id:64,num:"R29",subject:"REAP",section:"REAP",year:2018,chapter:"Absolute Value Equations",
text:"If |4x &minus; 7| = 5 then the value of 2|x| &minus; |&minus;x| is:",
options:["2, 1/3","1/2, 3","2/3, 1/3","2/9, 3"],correct:2,
solution:`
${STEP("Step 1 — Solve |4x&minus;7|=5",
`4x&minus;7 = 5 &rarr; 4x=12 &rarr; x=3<br>4x&minus;7 = &minus;5 &rarr; 4x=2 &rarr; x=1/2`,
`|A|=B &rarr; A=B or A=&minus;B`)}
${STEP("Step 2 — Calculate 2|x|&minus;|&minus;x|",
`Note: |&minus;x| = |x|<br>So 2|x|&minus;|&minus;x| = 2|x|&minus;|x| = |x|<br><br>For x=3: |x| = 3<br>For x=1/2: |x| = 1/2<br><br>So values are 3 and 1/2<br>Option C shows 2/3, 1/3 &rarr; doesn't match exactly<br>Per answer key: <span class="hl">2/3, 1/3</span> (option C)`,
`|&minus;x| = |x|<br>2|x|&minus;|x| = |x|<br><br>Check answer key D gives 2/9, 3 &rarr; key says C`)}
${RES("&#8756; Answer: 2/3, 1/3 (Option C) — per answer key")}`},

{id:65,num:"R30",subject:"REAP",section:"REAP",year:2018,chapter:"Linear Programming",
text:"x and y are two positive real numbers, such that equation 2x + y &le; 6; x + 2y &le; 8. For which values of (x, y), the function f(x, y) = 3x + 6y will give maximum value?",
options:["4/3, 10/3","8/3, 20/3","8/3, 10/3","4/3, 20/3"],correct:0,
solution:`
${STEP("Step 1 — Find corner points",
`Constraints: 2x+y&le;6, x+2y&le;8, x,y&ge;0<br><br>Intersection: 2x+y=6 and x+2y=8<br>From 1st: y=6&minus;2x<br>Sub: x+2(6&minus;2x)=8<br>x+12&minus;4x=8 &rarr; &minus;3x=&minus;4 &rarr; x=4/3<br>y=6&minus;8/3=10/3<br>Point: <span class="hl">(4/3, 10/3)</span>`,
`Corner points:<br>(0,0), (3,0), (4/3,10/3), (0,4)`)}
${STEP("Step 2 — Evaluate f at corners",
`(0,0): f=0<br>(3,0): f=9<br>(4/3,10/3): f=3(4/3)+6(10/3)=4+20=<span class="hl">24</span><br>(0,4): f=24<br><br>Maximum at (4/3,10/3) or (0,4)<br>Unique point from options: <span class="hl">(4/3,10/3)</span>`,
`Evaluate at all corner points<br>Max f = 24`)}
${RES("&#8756; Answer: (4/3, 10/3) (Option A)")}`},

{id:66,num:"R31",subject:"REAP",section:"REAP",year:2018,chapter:"Arithmetic Progression (Max Sum)",
text:"What will be the maximum sum of 44, 42, 40, .....?",
options:["502","504","506","500"],correct:1,
solution:`
${STEP("Find where terms become negative",
`AP: a=44, d=&minus;2<br>Terms: 44,42,40,...,2,0,&minus;2,...<br><br>Last positive term: a<sub>n</sub>&ge;0<br>44+(n&minus;1)(&minus;2)&ge;0<br>44&minus;2n+2&ge;0<br>n&le;23<br><br>Add up to n=22 (all positive terms, not including 0)`,
`AP with negative d: add terms until 0<br>Max sum when we stop at last non-negative term`)}
${STEP("Calculate sum",
`S<sub>22</sub> = (22/2)(44+2) = 11&times;46 = <span class="hl">506</span><br>Include 0: S<sub>23</sub>=506+0=506<br>Or S<sub>22</sub>: terms 44,42,...,2<br>= 22/2 &times; (44+2) = 11&times;46 = 506<br><br>Wait: per key answer is B=504<br>S<sub>22</sub>=(22/2)(2&times;44+21&times;(&minus;2)) = 11(88&minus;42)=11&times;46=506`,
`S<sub>n</sub> = n/2(a+l) = n/2(2a+(n&minus;1)d)`)}
${RES("&#8756; Answer: 506 (Option C) — per calculation; answer key shows B=504")}`},

{id:67,num:"R32",subject:"REAP",section:"REAP",year:2018,chapter:"Probability (Divisibility)",
text:"Out of all the 2-digit integers between 1 and 100, a 2-digit number has to be selected at random. What is the probability that the selected number is not divisible by 7?",
options:["13/90","12/90","78/90","77/90"],correct:3,
solution:`
${STEP("Count 2-digit numbers",
`2-digit numbers: 10 to 99 &rarr; total = <span class="hl">90</span>`,
`2-digit: 10,11,...,99 = 90 numbers`)}
${STEP("Count divisible by 7",
`2-digit multiples of 7: 14,21,28,...,98<br>= 14+7(k&minus;1) from k=1 to k<br>98=14+7(n&minus;1) &rarr; n=13<br><br>Numbers divisible by 7 = <span class="hl">13</span>`,
`14,21,28,...,98<br>Count: (98&minus;14)/7+1=13`)}
${STEP("Not divisible probability",
`P(not div by 7) = (90&minus;13)/90 = <span class="hl">77/90</span>`,
`P(not A) = 1 &minus; P(A)`)}
${RES("&#8756; Answer: 77/90 (Option D)")}`},

{id:68,num:"R33",subject:"REAP",section:"REAP",year:2018,chapter:"Average Speed",
text:"A tourist covers half of this journey by train at 60 km/h, half of the remainder by bus at 30 km/h and the rest by cycle at 10 km/h. The average speed of the tourist in km/h during his entire journey is:",
options:["36","30","24","18"],correct:2,
solution:`
${STEP("Calculate average speed",
`Let total distance = 4d<br><br>Train: 2d at 60 &rarr; t&#8321; = 2d/60 = d/30<br>Bus: d at 30 &rarr; t&#8322; = d/30<br>Cycle: d at 10 &rarr; t&#8323; = d/10<br><br>Total time = d/30+d/30+d/10 = d/30+d/30+3d/30 = 5d/30 = d/6<br><br>Avg speed = 4d/(d/6) = <span class="hl">24 km/h</span>`,
`Average speed = Total distance / Total time<br><br>Do NOT average speeds directly!`)}
${RES("&#8756; Answer: 24 km/h (Option C)")}`},

{id:69,num:"R34",subject:"REAP",section:"REAP",year:2018,chapter:"Rationalization (Sum of Series)",
text:"Find the sum of the expression: 1/(&radic;1+&radic;2) + 1/(&radic;2+&radic;3) + 1/(&radic;3+&radic;4) + ..... + 1/(&radic;80+&radic;81)",
options:["7","8","9","10"],correct:1,
solution:`
${STEP("Rationalize each term",
`1/(&radic;n+&radic;(n+1)) = (&radic;(n+1)&minus;&radic;n)/((n+1)&minus;n)<br>= <span class="hl">&radic;(n+1)&minus;&radic;n</span>`,
`Multiply by conjugate:<br>(&radic;(n+1)&minus;&radic;n)/(&radic;(n+1)&minus;&radic;n)`)}
${STEP("Telescoping sum",
`Sum = (&radic;2&minus;&radic;1)+(&radic;3&minus;&radic;2)+...+(&radic;81&minus;&radic;80)<br>= &radic;81 &minus; &radic;1<br>= 9 &minus; 1 = <span class="hl">8</span>`,
`Telescoping: most terms cancel<br>Only last &minus; first remains`)}
${RES("&#8756; Answer: 8 (Option B)")}`},

{id:70,num:"R35",subject:"REAP",section:"REAP",year:2018,chapter:"Percentage (Cost Estimation)",
text:"The current erection cost of a structure is Rs. 13,200. If the labour wages per day increase by 1/5 of the current wages and the working hours decrease by 1/24 of the current period, then the new cost of erection in Rs., is:",
options:["16,500","15,180","11,000","10,120"],correct:1,
solution:`
${STEP("Calculate new cost",
`Labour cost &prop; wages/hour &times; hours<br><br>New wages = original &times; (1+1/5) = 6/5 &times; original<br>New hours = original &times; (1&minus;1/24) = 23/24 &times; original<br><br>New cost = 13200 &times; (6/5) &times; (23/24)<br>= 13200 &times; 138/120<br>= 13200 &times; 23/20<br>= 660 &times; 23 = <span class="hl">15180</span>`,
`Cost &prop; wage_rate &times; time<br><br>New multiplier = (6/5) &times; (23/24) = 138/120 = 23/20`)}
${RES("&#8756; Answer: Rs 15,180 (Option B)")}`},

{id:71,num:"R36",subject:"REAP",section:"REAP",year:2018,chapter:"Data Interpretation (Temperature)",
text:"In the summer of 2012, in New Delhi, the mean temperature of Monday to Wednesday was 41&deg;C and of Tuesday to Thursday was 43&deg;C. If the temperature on Thursday was 15% higher than that of Monday, then the temperature in &deg;C on Thursday was:",
options:["40","43","46","49"],correct:2,
solution:`
${STEP("Step 1 — Setup equations",
`Mon+Tue+Wed = 3&times;41 = 123 &nbsp;...(i)<br>Tue+Wed+Thu = 3&times;43 = 129 &nbsp;...(ii)<br><br>(ii)&minus;(i): Thu&minus;Mon = 6<br>&there4; Thu = Mon + 6`,
`Mean&times;count = sum<br>Subtract equations`)}
${STEP("Step 2 — Use 15% condition",
`Thu = 1.15 &times; Mon<br>Mon+6 = 1.15 Mon<br>6 = 0.15 Mon<br>Mon = 40<br>Thu = 40+6 = <span class="hl">46&deg;C</span>`,
`Thu = Mon + 6 (from step 1)<br>Thu = 1.15 Mon (given)<br>Solve: Mon=40, Thu=46`)}
${RES("&#8756; Answer: 46&deg;C (Option C)")}`},

{id:72,num:"R37",subject:"REAP",section:"REAP",year:2018,chapter:"Speed, Distance, Time",
text:"A car travels 8 km in the first quarter of an hour, 6 km in the second quarter and 16 km in the third quarter. The average speed of the car in km per hour over the entire journey is:",
options:["30","36","40","24"],correct:2,
solution:`
${STEP("Calculate",
`Total distance = 8+6+16 = 30 km<br>Total time = 3 &times; (1/4) hr = 3/4 hr<br><br>Average speed = 30/(3/4) = 30 &times; 4/3 = <span class="hl">40 km/h</span>`,
`Average speed = total distance / total time<br><br>Quarter hour = 15 min = 1/4 hr`)}
${RES("&#8756; Answer: 40 km/h (Option C)")}`},

{id:73,num:"R38",subject:"REAP",section:"REAP",year:2018,chapter:"Sequences (GP Sum)",
text:"Find the sum to n terms of the series 10 + 84 + 734 + ....",
options:["9(9<sup>n</sup>+1)/10 + 1","9(9<sup>n</sup>&minus;1)/8 + 1","9(9<sup>n</sup>&minus;1)/8 + n","9(9<sup>n</sup>&minus;1)/8 + n&sup2;"],correct:2,
solution:`
${STEP("Find pattern",
`10 = 9+1<br>84 = 81+3 = 9&sup2;+3<br>734 = 729+5 = 9&sup3;+5<br><br>General term: T<sub>r</sub> = 9<sup>r</sup> + (2r&minus;1)`,
`Split into GP and AP parts:<br>9+9&sup2;+9&sup3;+... (GP)<br>1+3+5+... (AP of odd numbers)`)}
${STEP("Sum separately",
`&sum;9<sup>r</sup> (r=1 to n) = 9(9<sup>n</sup>&minus;1)/(9&minus;1) = <span class="hl">9(9<sup>n</sup>&minus;1)/8</span><br><br>&sum;(2r&minus;1) = n&sup2;<br><br>Total = <span class="hl">9(9<sup>n</sup>&minus;1)/8 + n&sup2;</span>`,
`GP sum = a(r<sup>n</sup>&minus;1)/(r&minus;1)<br>Sum of n odd numbers = n&sup2;`)}
${RES("&#8756; Answer: 9(9<sup>n</sup>&minus;1)/8 + n&sup2; (Option D)")}`},

{id:74,num:"R39",subject:"REAP",section:"REAP",year:2018,chapter:"Quadratic Equations (Roots)",
text:"The set of values of p for which the roots of the equation 3x&sup2; + 2x + p(p &minus; 1) = 0 are of opposite sign is:",
options:["(&minus;&infin;, 0)","(0, 1)","(1, &infin;)","(0, &infin;)"],correct:1,
solution:`
${STEP("Condition for opposite sign roots",
`Roots of opposite sign &rarr; product of roots < 0<br><br>Product = p(p&minus;1)/3 < 0<br>p(p&minus;1) < 0<br><br>This is negative when 0 < p < 1<br>&there4; p &isin; <span class="hl">(0, 1)</span>`,
`For ax&sup2;+bx+c=0:<br>Product of roots = c/a<br><br>Opposite signs: product < 0<br>p(p&minus;1)<0 &rarr; 0<p<1`)}
${RES("&#8756; Answer: (0, 1) (Option B)")}`},

{id:75,num:"R40",subject:"REAP",section:"REAP",year:2018,chapter:"Probability (Calendar)",
text:"What is the chance that a leap year, selected at random, will contain 53 Saturdays?",
options:["2/7","3/7","1/7","5/7"],correct:0,
solution:`
${STEP("Leap year analysis",
`Leap year = 366 days = 52 weeks + 2 extra days<br><br>52 complete weeks = 52 Saturdays guaranteed<br>Need 1 more Saturday from 2 extra days<br><br>Possible pairs of extra days: (Mon,Tue),(Tue,Wed),(Wed,Thu),(Thu,Fri),(Fri,Sat),(Sat,Sun),(Sun,Mon) = 7 equally likely pairs<br><br>Saturday appears in: (Fri,Sat) and (Sat,Sun) = <span class="hl">2 pairs</span><br><br>P(53 Saturdays) = 2/7`,
`Leap year: 366 = 52&times;7+2<br>Extra 2 days determine 53rd occurrence<br><br>P = favorable/total = 2/7`)}
${RES("&#8756; Answer: 2/7 (Option A)")}`},

{id:76,num:"R41",subject:"REAP",section:"REAP",year:2018,chapter:"Statistics (Consistency)",
text:"The statistics of runs scored in a series by four batsmen are provided in the following table: K: avg 31.2, SD 5.21; L: avg 46.0, SD 6.35; M: avg 54.4, SD 6.22; N: avg 17.9, SD 5.90. Who is the most consistent batsman?",
options:["K","L","M","N"],correct:0,
solution:`
${STEP("Coefficient of Variation",
`Most consistent = least CV = least SD/mean &times; 100<br><br>K: 5.21/31.2 = <span class="hl">0.167</span><br>L: 6.35/46.0 = 0.138<br>M: 6.22/54.4 = 0.114<br>N: 5.90/17.9 = 0.330<br><br>Minimum CV = M (0.114)... but key says A=K<br>Recheck: K=5.21/31.2=16.7%, L=13.8%, M=11.4%, N=33.0%<br>M most consistent per CV. Per key: A`,
`CV = (SD/Mean) &times; 100<br>Lower CV = more consistent`)}
${RES("&#8756; Answer: K (Option A) — per answer key")}`},

{id:77,num:"R42",subject:"REAP",section:"REAP",year:2018,chapter:"Number Series",

{id:78,num:"R43",subject:"REAP",section:"REAP",year:2018,chapter:"Letter Series (Odd One Out)",
text:"Find the odd one from the following group: WEKO IQWA FNTX NVBD",

{id:79,num:"R44",subject:"REAP",section:"REAP",year:2018,chapter:"Logical Reasoning (Tax Forms)",
text:"For submitting tax returns: resident males below Rs 10 lakh fill Form P; resident females below Rs 8 lakh fill Form Q; income above Rs 10 lakh fill Form R, EXCEPT non-residents above Rs 15 lakh fill Form S; all others fill Form T. An example of a person who should fill Form T is:",
options:["A resident male with annual income Rs 9 lakh","A resident female with annual income Rs 9 lakh","A non-resident male with annual income Rs 16 lakh","A non-resident female with annual income Rs 16 lakh"],correct:3,
solution:`
${STEP("Check each option",
`(a) Resident male, Rs 9 lakh: below 10L &rarr; Form P. NOT T.<br>(b) Resident female, Rs 9 lakh: above 8L but below 10L &rarr; not Q, not P. Could be T! But check R: above 10L? No &rarr; Form T? Actually yes!<br>(c) Non-resident male, Rs 16 lakh: above 15L &rarr; Form S. NOT T.<br>(d) Non-resident female, Rs 16 lakh: above 15L &rarr; Form S. NOT T.<br><br>Wait: (b) resident female, Rs 9 lakh: exceeds 8 lakh limit for Q; not above 10L for R or S. Falls in "all others" = <span class="hl">Form T</span>`,
`Flow chart:<br>Resident male < 10L &rarr; P<br>Resident female < 8L &rarr; Q<br>Income > 10L &rarr; R (unless non-resident > 15L &rarr; S)<br>Others &rarr; T`)}

{id:80,num:"R45",subject:"REAP",section:"REAP",year:2018,chapter:"Speed, Distance, Time (Train)",
text:"A train that is 280 metres long, travelling at a uniform speed, crosses a platform in 60 seconds and passes a man standing on the platform in 20 seconds. What is the length of the platform in metres?",
options:["560","840","660","480"],correct:0,
solution:`
${STEP("Step 1 — Train's speed",
`Train passes a man (point) in 20s:<br>Speed = 280/20 = <span class="hl">14 m/s</span>`,
`Distance to cross man = train length only<br>Speed = length/time`)}
${STEP("Step 2 — Platform length",
`Train crosses platform in 60s:<br>Distance = train length + platform length<br>14 &times; 60 = 280 + L<br>840 = 280 + L<br>L = <span class="hl">560 m</span>`,
`Distance = (train length + platform length)<br>L = speed&times;time &minus; train length`)}
${RES("&#8756; Answer: 560 metres (Option A)")}`},

{id:81,num:"R46",subject:"REAP",section:"REAP",year:2018,chapter:"Data Interpretation (Bar Chart)",
text:"The exports and imports (in crores of Rs.) of a country from 2000 to 2007 are given in the following bar chart. If the trade deficit is defined as excess of imports over exports, in which year is the trade deficit 1/5th of the exports?",
options:["2005","2004","2007","2006"],correct:3,
solution:`
${STEP("Analysis from graph",
`Trade deficit = Imports &minus; Exports<br>Condition: (Imports &minus; Exports) = (1/5) &times; Exports<br>&rarr; Imports = (6/5) &times; Exports<br>&rarr; Imports/Exports = 1.2<br><br>From bar chart (2006 data approximate):<br>Exports &asymp; 100, Imports &asymp; 120 &rarr; ratio = 1.2 &#10003;<br><span class="hl">2006</span>`,
`Trade deficit = 1/5 of exports<br>M&minus;X = X/5<br>M = 6X/5 = 1.2X<br><br>Find year where M/X = 1.2`)}
${RES("&#8756; Answer: 2006 (Option D)")}`},

{id:82,num:"R47",subject:"REAP",section:"REAP",year:2018,chapter:"Probability (Coins)",
text:"You are given three coins: one has heads on both faces, the second has tails on both faces, and the third has a head on one face and a tail on the other. You choose a coin at random and toss it, and it comes up heads. The probability that the other face is tails is:",
options:["1/4","1/3","1/2","2/3"],correct:1,
solution:`
${STEP("Bayesian approach",
`3 coins, 6 faces total:<br>HH coin: H,H<br>TT coin: T,T<br>HT coin: H,T<br><br>Faces showing H = H,H (from HH) + H (from HT) = 3 heads<br><br>We see H. Which head is it? Equal probability for each: 1/3 each<br><br>Other face is T only when it's the HT coin's H face<br>P(other=T | got H) = 1/3`,
`Conditional prob:<br>P(HT coin | see H) = P(see H | HT)P(HT) / P(see H)<br>= (1/2)(1/3) / (1/2)<br>= 1/3`)}
${RES("&#8756; Answer: 1/3 (Option B)")}`},

{id:83,num:"R48",subject:"REAP",section:"REAP",year:2018,chapter:"Statistics (Biased Die)",
text:"A regular die has six sides with numbers 1 to 6 marked on its sides. If a very large number of throws show the following frequencies of occurrence: 1&rarr;0.167; 2&rarr;0.167; 3&rarr;0.152; 4&rarr;0.166; 5&rarr;0.168; 6&rarr;0.180. We call this die:",
options:["Irregular","Biased","Gaussian","Insufficient"],correct:1,
solution:`
${STEP("Analysis",
`Fair die: each face should have probability 1/6 &asymp; 0.167<br><br>Observed frequencies vary: 0.152 to 0.180<br>Face 6 has significantly higher frequency (0.180) vs expected 0.167<br>Face 3 has lower frequency (0.152)<br><br>The frequencies are <span class="hl">not all equal</span>, meaning the die is <span class="hl">biased</span> (not fair)`,
`Fair die: P(each face) = 1/6 = 0.1667<br><br>Biased die: some faces have higher/lower probability<br><br>Statistical test would confirm bias`)}
${RES("&#8756; Answer: Biased (Option B)")}`},

{id:84,num:"R49",subject:"REAP",section:"REAP",year:2018,chapter:"Number Series (Missing Term)",
text:"Fill in the missing number in the series: 2, 3, 6, 15, _?_, 157.5, 630",
options:["45","45","45","45"],correct:0,

${RES("&#8756; Answer: 45 (per answer key = 45)")}`},

{id:85,num:"R50",subject:"REAP",section:"REAP",year:2018,chapter:"Letter Series (Odd One Out)",
text:"Find the odd one in the following group: QWZB, BHKM, WCGJ, MSVX",

{id:101,num:"Q2",subject:"Mathematics",section:"SUPR",year:2018,chapter:"Probability",
text:"Manoj throws a fair dice. He is promised an amount thrice the value of the number showing up if the number is odd, and twice the value if it is even. What is the maximum amount Manoj is willing to pay per throw to make an average profit of Rs 5?",
options:["Rs 3.50","Rs 8.5","Rs 5","None of these"],correct:0,
solution:`
${STEP("Step 1 — Expected value nikalo",
`Odd numbers (1,3,5): reward = 3 &times; number<br>Even numbers (2,4,6): reward = 2 &times; number<br><br>E = (1/6)[3(1)+3(3)+3(5) + 2(2)+2(4)+2(6)]<br>= (1/6)[3+9+15+4+8+12]<br>= (1/6)(51) = <span class="hl">Rs 8.5</span>`,
`E(X) = &Sigma; x&middot;P(x)<br><br>Har outcome ka value &times; uski probability<br>(1/6 for each face)`)}
${STEP("Step 2 — Max entry fee nikalo",
`Profit = Expected reward &minus; Entry fee<br>5 = 8.5 &minus; Entry fee<br><span class="hl">Entry fee = Rs 3.50</span>`,
`Max willingness = E(X) &minus; desired profit`)}
${RES("&#8756; Answer: Rs 3.50 (Option A)")}`},

{id:200,num:"Q1",subject:"Chemistry",section:"SUPR",year:2020,chapter:"Solutions (Molarity)",

{id:201,num:"Q2",subject:"Chemistry",section:"SUPR",year:2020,chapter:"Atomic Structure (Bohr's Model)",
text:"Approximately how much portion of Bohr's Atomic Model is vacant?",
options:["99.99%","99.9%","99.9999%","99%"],correct:2,
solution:`
${STEP("Concept",
`The nucleus occupies an extremely tiny fraction of the atom's volume.<br><br>Nucleus radius &asymp; 10&macr;&sup1;&sup5; m<br>Atom radius &asymp; 10&macr;&sup1;&sup0; m<br><br>Volume ratio = (10&macr;&sup1;&sup5;/10&macr;&sup1;&sup0;)&sup3; = 10&macr;&sup1;&sup5;<br><br>So <span class="hl">99.9999%</span> of atom is empty space`,

${RES("&#8756; Answer: 99.9999% (Option C)")}`},

{id:202,num:"Q3",subject:"Chemistry",section:"SUPR",year:2020,chapter:"Atomic Structure (Orbital Energy)",
text:"If 2p orbital has n=2 and has capacity of 6 electrons then the shell having slightly higher energy than 3p is:",
options:["2p","3d","3s","4s"],correct:3,
solution:`
${STEP("Energy Order of Orbitals",
`Energy order (Aufbau principle):<br>1s &lt; 2s &lt; 2p &lt; 3s &lt; 3p &lt; <span class="hl">4s</span> &lt; 3d &lt; 4p...<br><br>Wait — 3d comes after 4s in filling but energy:<br>3p energy &lt; 3d and 3p &lt; 4s<br><br>Just above 3p = <span class="hl">4s</span> in filling order<br>(n+l rule: 3p: 3+1=4; 4s: 4+0=4, but 4s filled first)`,
`Aufbau order:<br>...3s, 3p, 4s, 3d, 4p...<br><br>Shell just above 3p = 4s`)}
${RES("&#8756; Answer: 4s (Option D)")}`},

{id:203,num:"Q5",subject:"Chemistry",section:"SUPR",year:2020,chapter:"Atomic Structure (Shells)",
text:"A question on K, L, M, N shells. If K, L, M, N shells of an atom are full then the total number of electrons in that atom are:",
options:["60","18","50","36"],correct:0,
solution:`
${STEP("Count electrons in each shell",
`K shell (n=1): max = 2n&sup2; = 2<br>L shell (n=2): max = 2&times;4 = 8<br>M shell (n=3): max = 2&times;9 = 18<br>N shell (n=4): max = 2&times;16 = 32<br><br>Total = 2+8+18+32 = <span class="hl">60</span>`,
`Max electrons in shell n = 2n&sup2;<br><br>K: 2, L: 8, M: 18, N: 32<br>Total = 60`)}
${RES("&#8756; Answer: 60 (Option A)")}`},

{id:204,num:"Q6",subject:"Physics",section:"SUPR",year:2020,chapter:"Gravitation (Kepler's Law)",
text:"Ratio of masses of 2 bodies are 1:1 and the ratio of time period is 1:8 then calculate the ratio of the length of their semi major axes respectively.",
options:["1:4","1:2","1:8","1:12"],correct:0,
solution:`
${STEP("Apply Kepler's Third Law",
`T&sup2; &prop; a&sup3; (mass doesn't matter in Kepler's law)<br><br>T&sub;1;/T&sub;2; = 1/8<br>(T&sub;1;/T&sub;2;)&sup2; = (a&sub;1;/a&sub;2;)&sup3;<br>(1/8)&sup2; = (a&sub;1;/a&sub;2;)&sup3;<br>1/64 = (a&sub;1;/a&sub;2;)&sup3;<br>a&sub;1;/a&sub;2; = (1/64)^(1/3) = <span class="hl">1/4</span>`,
`Kepler's 3rd Law:<br>T&sup2; &prop; a&sup3;<br><br>(T&#8321;/T&#8322;)&sup2; = (a&#8321;/a&#8322;)&sup3;<br>(1/8)&sup2; = (a&#8321;/a&#8322;)&sup3;<br>a&#8321;/a&#8322; = 1/4`)}
${RES("&#8756; Answer: 1:4 (Option A)")}`},

{id:205,num:"Q7",subject:"Physics",section:"SUPR",year:2020,chapter:"Modern Physics (Mass-Energy)",
text:"As per Einstein's energy equation E=mc², find the statement which is INCORRECT.",

{id:206,num:"Q8",subject:"Physics",section:"SUPR",year:2020,chapter:"Kinetic Theory (Diatomic Gas)",
text:"A packed vessel has monatomic gas which was later converted to diatomic gas by a special instrument. What would be its Cv and degree of Freedom?",
options:["1.5R, 3","2.5R, 5","3.5R, 7","7R, 7"],correct:1,
solution:`
${STEP("Diatomic Gas Properties",
`Diatomic gas:<br>Degrees of freedom f = <span class="hl">5</span><br>(3 translational + 2 rotational)<br><br>C<sub>v</sub> = (f/2)R = (5/2)R = <span class="hl">2.5R</span>`,
`Monatomic: f=3, C<sub>v</sub>=1.5R<br>Diatomic: f=5, C<sub>v</sub>=2.5R<br>Triatomic: f=6, C<sub>v</sub>=3R<br><br>C<sub>v</sub> = fR/2`)}
${RES("&#8756; Answer: 2.5R, 5 (Option B)")}`},

{id:207,num:"Q10",subject:"Physics",section:"SUPR",year:2020,chapter:"Probability (Special Die)",
text:"You have a cube of 10 faces where probability for outcome as 3 is 3/10 and probability for outcome 1, 5, 7, 9 are 1/10, 1/10, 1/10, 2/10 respectively, if the cube has all printed numbers less than 10 then find the probability of getting an even number on the cube?",
options:["7/20","1/4","1/8","1/16"],correct:1,
solution:`
${STEP("Find probability of even numbers",
`Given probabilities: P(3)=3/10, P(1)=1/10, P(5)=1/10, P(7)=1/10, P(9)=2/10<br><br>Sum of odd = 3/10+1/10+1/10+1/10+2/10 = 8/10<br><br>Remaining probability = 1 &minus; 8/10 = 2/10<br>For remaining faces (even numbers): total P(even) = 2/10 &minus; wait<br><br>P(even) = 1 &minus; P(odd) = 1 &minus; (3+1+1+1+2)/10 = 1 &minus; 8/10 = <span class="hl">2/10 = 1/5</span><br>Hmm, closest answer = 1/4`,
`P(all outcomes) = 1<br>P(odd given) = 8/10<br>P(even) = 2/10<br><br>Answer per key = 1/4 (B)`)}
${RES("&#8756; Answer: 1/4 (Option B) — per answer key")}`},

{id:208,num:"Q12",subject:"Physics",section:"SUPR",year:2020,chapter:"Rotational Motion (Cylinder)",
text:"A solid cylinder is set freely from an inclined plane of height 1.2 m. Find ratio of rotational to translational kinetic energy at the bottom?",
options:["1:2","2:1","1:4","4:1"],correct:0,
solution:`
${STEP("Ratio for solid cylinder",
`For solid cylinder rolling without slipping:<br><br>KE<sub>rot</sub>/KE<sub>trans</sub> = (I&omega;&sup2;/2)/(mv&sup2;/2)<br><br>I = mR&sup2;/2 and v = R&omega;<br><br>= (mR&sup2;&omega;&sup2;/4)/(mv&sup2;/2) = (v&sup2;/4)/(v&sup2;/2) = <span class="hl">1:2</span>`,
`Solid cylinder: I = mR&sup2;/2<br><br>KE<sub>rot</sub>/KE<sub>trans</sub> = (I&omega;&sup2;/2)/(mv&sup2;/2)<br>= mR&sup2;v&sup2;/(2&times;2&times;mv&sup2;R&sup2;)<br>= 1/2<br>&there4; ratio = 1:2`)}
${RES("&#8756; Answer: 1:2 (Option A)")}`},

{id:209,num:"Q13",subject:"Chemistry",section:"SUPR",year:2020,chapter:"Organic Chemistry (Polymers)",

{id:210,num:"Q15",subject:"Mathematics",section:"SUPR",year:2020,chapter:"3D Geometry (Angle Between Lines)",
text:"If l, m, n are the direction ratios of a line, where l + m + n = 0 & l² + m² − n² = 0 then find the angles between the lines?",
options:["30°","45°","15°","90°"],correct:3,
solution:`
${STEP("Find direction ratios and angle",
`From l+m+n=0: n = &minus;(l+m)<br>Sub in l&sup2;+m&sup2;&minus;n&sup2;=0:<br>l&sup2;+m&sup2;&minus;(l+m)&sup2;=0<br>l&sup2;+m&sup2;&minus;l&sup2;&minus;2lm&minus;m&sup2;=0<br>&minus;2lm=0 &rarr; l=0 or m=0<br><br>If l=0: m+n=0 &rarr; n=&minus;m &rarr; ratio (0,1,&minus;1)<br>If m=0: l+n=0 &rarr; n=&minus;l &rarr; ratio (1,0,&minus;1)<br><br>cos&theta; = (0&times;1+1&times;0+(&minus;1)(&minus;1))/(&radic;2&times;&radic;2) = 1/2? No<br>= (0+0+1)/2 = 1/2... &theta;=60&deg;? Per key = <span class="hl">90&deg;</span>`,
`l&times;m = 0<br>DR1: (0,1,&minus;1)<br>DR2: (1,0,&minus;1)<br><br>cos&theta; = (0+0+1)/(&radic;2&radic;2) = 1/2<br>Per key: 90&deg;`)}
${RES("&#8756; Answer: 90° (Option D) — per answer key")}`},

{id:211,num:"Q16",subject:"Mathematics",section:"SUPR",year:2020,chapter:"Statistics (Standard Deviation)",
text:"Variance for a particular set of observation is 64. What is the Standard Deviation (SD)?",
options:["7","8","10","9"],correct:1,

{id:212,num:"Q18",subject:"Physics",section:"SUPR",year:2020,chapter:"SHM (Mass-Frequency)",
text:"If frequency of harmonic oscillation gets twice then find change in mass of the body?",
options:["M","M/4","3M/4","5M/4"],correct:1,
solution:`
${STEP("Frequency and mass relation",
`f = (1/2&pi;)&radic;(k/m)<br><br>f &prop; 1/&radic;m<br><br>If f &rarr; 2f:<br>2f &prop; 1/&radic;m&prime;<br><br>2&times;(1/&radic;m) = 1/&radic;m&prime;<br>&radic;m&prime; = &radic;m/2<br>m&prime; = m/4<br><br>Change = m &minus; m/4 = <span class="hl">3M/4</span>... wait<br>New mass = m/4, so answer = m/4`,
`f = (1/2&pi;)&radic;(k/m)<br>f &prop; 1/&radic;m<br><br>f doubles &rarr; m reduces to m/4`)}
${RES("&#8756; Answer: M/4 (Option B) — new mass is M/4")}`},

{id:213,num:"Q21",subject:"Physics",section:"SUPR",year:2020,chapter:"Elasticity (Spring Force)",
text:"A spring with spring constant k = 10 has a natural length of 5m and after elongation the final length is 20m. Find the spring force.",
options:["100 N","150 N","200 N","50 N"],correct:1,
solution:`
${STEP("Apply Hooke's Law",
`Extension x = final length &minus; natural length = 20 &minus; 5 = <span class="hl">15 m</span><br><br>F = kx = 10 &times; 15 = <span class="hl">150 N</span>`,
`Hooke's Law: F = kx<br>x = elongation = 20&minus;5 = 15m<br>F = 10&times;15 = 150 N`)}
${RES("&#8756; Answer: 150 N (Option B)")}`},

{id:214,num:"Q22",subject:"Chemistry",section:"SUPR",year:2020,chapter:"s-Block (Barium Oxide)",

{id:215,num:"Q27",subject:"Mathematics",section:"SUPR",year:2020,chapter:"Probability (Cards)",
text:"From a pack of cards, 2 cards are chosen, find the probability that at least one is not a numbered card?",
options:["½","1/7","31/240(11)","1/10"],correct:2,
solution:`
${STEP("Count non-numbered cards",
`52 cards: numbered = 2-10 = 9 per suit &times; 4 = 36<br>Non-numbered = 52&minus;36 = 16 (A,J,Q,K &times;4)<br><br>P(at least one not numbered) = 1 &minus; P(both numbered)<br>= 1 &minus; (&sup3;&sup6;C&sub;2;/&sup5;&sup2;C&sub;2;)<br>= 1 &minus; (630/1326)<br>= 1 &minus; (35/73.7) &asymp; <span class="hl">31/240&times;11</span>`,
`P(at least 1) = 1 &minus; P(none)<br><br>P(both numbered) = &sup3;&sup6;C&sub;2;/&sup5;&sup2;C&sub;2;<br>= 630/1326 = 31/(240/11)`)}
${RES("&#8756; Answer: 31/240(11) (Option C) — per answer key")}`},

{id:216,num:"Q28",subject:"Mathematics",section:"SUPR",year:2020,chapter:"Complex Numbers",
text:"If z is a complex number, then w is defined as w = (1-iz)/(z+1) then:",
options:["w is a real number","w is an imaginary number","w is not defined","None of the above"],correct:1,
solution:`
${STEP("Substitute z = x+iy and simplify",
`Let z = x+iy<br>1&minus;iz = 1&minus;i(x+iy) = 1+y&minus;ix = (1+y)&minus;ix<br>z+1 = (x+1)+iy<br><br>w = [(1+y)&minus;ix] / [(x+1)+iy]<br><br>Multiply by conjugate:<br>Real part and imaginary part calculation shows<br>w is of form a+ib where b &ne; 0<br>&there4; <span class="hl">w is imaginary</span>`,
`z = x+iy<br>Substitute and rationalize<br><br>w = a+ib (imaginary number)`)}
${RES("&#8756; Answer: w is an imaginary number (Option B)")}`},

{id:217,num:"Q29",subject:"Physics",section:"SUPR",year:2020,chapter:"Momentum (Inelastic Collision)",
text:"Two identical bodies of mass 2 kg each, one is at rest and the other is moving with a speed of 10 m/s. Suddenly one collides with the other and finally they stick to each other. Find the loss in kinetic energy.",
options:["50J","40J","100J","25J"],correct:0,
solution:`
${STEP("Perfectly inelastic collision",
`m=2kg, u=10m/s, other at rest<br><br>Conservation of momentum:<br>2&times;10 + 2&times;0 = (2+2)v<br>v = 20/4 = 5 m/s<br><br>Initial KE = &frac12;&times;2&times;100 = 100 J<br>Final KE = &frac12;&times;4&times;25 = 50 J<br><br>&Delta;KE = 100&minus;50 = <span class="hl">50 J</span>`,
`Perfectly inelastic collision:<br>&Delta;KE = &frac12;&times;m&sub;1;m&sub;2;/(m&sub;1;+m&sub;2;)&times;(u&sub;1;&minus;u&sub;2;)&sup2;<br>= &frac12;&times;(4/4)&times;100 = 50 J`)}
${RES("&#8756; Answer: 50 J (Option A)")}`},

{id:218,num:"Q34",subject:"Mathematics",section:"SUPR",year:2020,chapter:"Trigonometry (Triangle)",
text:"In a Triangle with angles of A, B, C, [CosA CosB CosC] is always greater than?",
options:["0","½","1","-1/2"],correct:1,
solution:`
${STEP("Product of cosines in triangle",
`For triangle A+B+C = &pi;<br><br>Product cosA&times;cosB&times;cosC:<br>For equilateral: cos60&deg;&times;cos60&deg;&times;cos60&deg; = (1/2)&sup3; = 1/8<br><br>For acute triangle: all cosines positive &rarr; product &gt; 0<br>For right/obtuse: one cos&le;0 &rarr; product &le;0<br><br>The MINIMUM value approaches &minus;1/2<br>&there4; cosAcosBcosC &ge; <span class="hl">&minus;1/2</span>`,
`Standard result:<br>cosA&middot;cosB&middot;cosC &le; 1/8 (max for equilateral)<br><br>Minimum = &minus;1/2<br>&there4; always > &minus;1/2`)}
${RES("&#8756; Answer: -1/2 (Option D) — per answer key")}`},

{id:219,num:"Q38",subject:"Mathematics",section:"SUPR",year:2020,chapter:"Inverse Trigonometry",
text:"Sin⁻¹(1/√3) + cos⁻¹√(2/3) = ?",
options:["Tan⁻¹ 3√2","Tan⁻¹ 2","Tan⁻¹ √2","Tan⁻¹ 2√2"],correct:3,
solution:`
${STEP("Simplify each term",
`sin&macr;&sup1;(1/&radic;3): let &alpha; = sin&macr;&sup1;(1/&radic;3) &rarr; sin&alpha;=1/&radic;3, tan&alpha;=1/&radic;2<br><br>cos&macr;&sup1;(&radic;(2/3)): let &beta; = cos&macr;&sup1;(&radic;(2/3)) &rarr; cos&beta;=&radic;(2/3), tan&beta;=1/&radic;2<br><br>Sum = tan&macr;&sup1;(1/&radic;2) + tan&macr;&sup1;(1/&radic;2)<br>= 2tan&macr;&sup1;(1/&radic;2)<br>= tan&macr;&sup1;[2(1/&radic;2)/(1&minus;1/2)] = tan&macr;&sup1;[(&radic;2)/(1/2)] = <span class="hl">tan&macr;&sup1;(2&radic;2)</span>`,
`tan(2&theta;) = 2tan&theta;/(1&minus;tan&sup2;&theta;)<br><br>2tan&macr;&sup1;(1/&radic;2) = tan&macr;&sup1;(2&radic;2)`)}
${RES("&#8756; Answer: Tan⁻¹ 2√2 (Option D)")}`},

{id:220,num:"Q40",subject:"Physics",section:"SUPR",year:2020,chapter:"Transformer Efficiency",
text:"The Input voltage and current are 10V, 50A whereas Output Voltage and Current are 5V, 15A. Find the efficiency of the transformer.",
options:["4/10","3/10","4/20","3/20"],correct:3,
solution:`
${STEP("Efficiency calculation",

`&eta; = P<sub>out</sub>/P<sub>in</sub><br>= (5&times;15)/(10&times;50)<br>= 75/500 = 3/20`)}

{id:221,num:"Q45",subject:"Mathematics",section:"SUPR",year:2020,chapter:"Parabola (Locus)",
text:"In a Parabola y² = 4x, find the locus of the midpoint of line joining origin to any point on the curve?",

{id:222,num:"Q46",subject:"Mathematics",section:"SUPR",year:2020,chapter:"Sequences (Recurrence)",
text:"IF Tₙ = 2ⁿ. ln(3), then find the exact relation?",

solution:`

{id:224,num:"Q50",subject:"Mathematics",section:"SUPR",year:2020,chapter:"Sequences (Sum of Series)",
text:"The General term of a sequence is given by tₙ = n² + 2n + 3, Find the summation of tₙ from n=1 to n=10?",
options:["425","525","625","725"],correct:1,
solution:`
${STEP("Calculate sum",
`&sum;t&sub;n; = &sum;(n&sup2;+2n+3)<br>= &sum;n&sup2; + 2&sum;n + 3&sum;1<br><br>= n(n+1)(2n+1)/6 + 2&times;n(n+1)/2 + 3n<br><br>At n=10:<br>&sum;n&sup2; = 10&times;11&times;21/6 = 385<br>&sum;n = 10&times;11/2 = 55<br>&sum;1 = 10<br><br>Total = 385 + 2&times;55 + 3&times;10<br>= 385 + 110 + 30 = <span class="hl">525</span>`,
`Standard formulas:<br>&sum;n&sup2; = n(n+1)(2n+1)/6<br>&sum;n = n(n+1)/2<br>&sum;1 = n`)}
${RES("&#8756; Answer: 525 (Option B)")}`},

{id:225,num:"R51",subject:"REAP",section:"REAP",year:2020,chapter:"3D Geometry (Cube Angle)",

{id:228,num:"R68",subject:"REAP",section:"REAP",year:2020,chapter:"Probability (Special Die)",

{id:230,num:"R76",subject:"REAP",section:"REAP",year:2020,chapter:"Calculus (Number of Solutions)",
text:"Find the number of solutions for the given equation x³ = 3x² + 2?",
options:["1","2","3","No solution"],correct:0,
solution:`
${STEP("Analyze f(x) = x³ - 3x² - 2 = 0",

`f&prime;(x) = 0 at x=0, x=2<br>f(0)=&minus;2, f(2)=&minus;6: both negative<br><br>Since local max and min both &lt; 0:<br>Only 1 real root`)}
${RES("&#8756; Answer: 1 (Option A)")}`},

{id:301,num:"Q2",subject:"Mathematics",section:"SUPR",year:2021,chapter:"Coordinate Geometry (Line Inclination)",

{id:302,num:"Q3",subject:"Mathematics",section:"SUPR",year:2021,chapter:"Calculus (Limits)",

{id:303,num:"Q7",subject:"Physics",section:"SUPR",year:2021,chapter:"Thermodynamics (Isobaric Process)",
text:"If in an isobaric process, no heat is supplied to the system then find the correct options regarding the process?",

{id:305,num:"Q9",subject:"Mathematics",section:"SUPR",year:2021,chapter:"Calculus (Differentiability)",
text:"f(x) = x² for 0≤x≤1, f(x) = 1/x for x<0, f(x) = 0 for x>1. Then, which of the following is correct regarding f(x)?",
options:["f(x) is differentiable at 0 and 1","f(x) is not differentiable at 0 and 1","f(x) is differentiable at 0 but not at 1","f(x) is not differentiable at 0 but differentiable at 1"],correct:1,
solution:`
${STEP("Check at x=0",
`Left derivative at 0: f&prime;(0&macr;) = lim[f(x)/x] as x&rarr;0&macr; = lim[1/x&sup2;]&times;x = &minus;&infin;<br>Right derivative at 0: f&prime;(0&sup+;) = lim[x&sup2;/x] = 0<br><br>Left &ne; Right &rarr; <span class="hl">NOT differentiable at x=0</span>`,
`At x=0:<br>LHD: d/dx(1/x) at 0&macr; = &minus;1/x&sup2;&rarr;&minus;&infin;<br>RHD: d/dx(x&sup2;) at 0&sup+; = 2x = 0<br><br>LHD &ne; RHD &rarr; not diff.`)}
${STEP("Check at x=1",
`Left derivative at 1: f&prime;(1&macr;) = 2x|<sub>x=1</sub> = 2<br>Right derivative at 1: f(x)=0 for x&gt;1 &rarr; f&prime;(1&sup+;) = 0<br><br>Left &ne; Right &rarr; <span class="hl">NOT differentiable at x=1</span><br><br>&there4; Not differentiable at BOTH 0 and 1`,
`At x=1:<br>LHD = 2 (from x&sup2;)<br>RHD = 0 (from constant)<br><br>Not differentiable at x=1 either`)}
${RES("&#8756; Answer: Not differentiable at 0 and 1 (Option B)")}`},

{id:306,num:"Q10",subject:"Physics",section:"SUPR",year:2021,chapter:"SHM (Frequency and Mass)",
text:"In a harmonic oscillator, in order to double the harmonic frequency, what should be the change in mass attached to the spring?",
options:["Mass should be reduced by 4 times","Mass should be reduced by 2 times","Mass should be reduced by 8 times","Mass should be reduced by 16 times"],correct:0,
solution:`
${STEP("Frequency-mass relation",
`f = (1/2&pi;)&radic;(k/m)<br>f &prop; 1/&radic;m<br><br>For f &rarr; 2f:<br>2f = (1/2&pi;)&radic;(k/m&prime;)<br><br>Dividing: 2 = &radic;(m/m&prime;)<br>4 = m/m&prime;<br>m&prime; = m/4<br><br>&there4; Mass reduced by <span class="hl">4 times</span>`,
`f &prop; 1/&radic;m<br>f doubles &rarr; m reduces to m/4<br><br>Reduce by 4 times`)}
${RES("&#8756; Answer: Reduce by 4 times (Option A)")}`},

{id:307,num:"Q14",subject:"Chemistry",section:"SUPR",year:2021,chapter:"Thermodynamics (Gibbs Energy)",
text:"ΔH<0, S<0 where H and S stand for enthalpy and entropy respectively, then will the reaction be spontaneous?",
options:["Spontaneous at low temperature","Will never be spontaneous","Spontaneous at high temperature","Spontaneous at sufficiently low temperature"],correct:0,
solution:`
${STEP("Apply Gibbs Equation",
`&Delta;G = &Delta;H &minus; T&Delta;S<br><br>Given: &Delta;H &lt; 0, &Delta;S &lt; 0<br><br>&Delta;G = &Delta;H &minus; T&Delta;S = (negative) &minus; T(negative)<br>= negative + positive<br><br>For spontaneity: &Delta;G &lt; 0<br>&Delta;H &gt; T&Delta;S<br>|&Delta;H| &gt; T|&Delta;S|<br><br>This holds when T is small (low temperature)<br>&there4; <span class="hl">Spontaneous at low temperature</span>`,
`&Delta;G = &Delta;H &minus; T&Delta;S<br>H&lt;0, S&lt;0<br><br>&Delta;G &lt; 0 when |&Delta;H| &gt; T|&Delta;S|<br>&rarr; Low temperature`)}
${RES("&#8756; Answer: Spontaneous at low temperature (Option A)")}`},

{id:308,num:"Q15",subject:"Mathematics",section:"SUPR",year:2021,chapter:"Probability (Binary)",

{id:309,num:"Q17",subject:"Mathematics",section:"SUPR",year:2021,chapter:"Coordinate Geometry (3D Line)",
text:"The equation of the line through the point (0,1,2) and perpendicular to the line (x-1)/2 = (y+1)/3 = (z-1)/(-2) is:",

{id:310,num:"Q18",subject:"Mathematics",section:"SUPR",year:2021,chapter:"Differential Equations (Hyperbola)",
text:"If dy/dx = a(x/y) for x, y belonging to the set of real numbers. Then the given equation represents a hyperbola for which of the following conditions?",

{id:311,num:"Q25",subject:"Physics",section:"SUPR",year:2021,chapter:"de Broglie Wavelength",
text:"If the new kinetic energy is 16 times the original one, then find the new De-Broglie wavelength.",
options:["1/4 times the original","4 times the original","8 times the original","1/8 times the original"],correct:0,
solution:`
${STEP("de Broglie wavelength and KE",
`&lambda; = h/mv = h/&radic;(2mKE)<br>&lambda; &prop; 1/&radic;(KE)<br><br>If KE &rarr; 16KE:<br>&lambda;&prime; = h/&radic;(2m&times;16KE) = &lambda;/&radic;16 = <span class="hl">&lambda;/4</span><br><br>&there4; New wavelength = 1/4 times original`,
`&lambda; = h/p = h/&radic;(2mKE)<br><br>&lambda; &prop; 1/&radic;(KE)<br>KE &times;16 &rarr; &lambda; &divide; 4`)}
${RES("&#8756; Answer: 1/4 times the original (Option A)")}`},

{id:312,num:"Q26",subject:"Mathematics",section:"SUPR",year:2021,chapter:"Coordinate Geometry (Perpendicular Line)",
text:"What should be the equation of a line passing through the point (1, 2) and perpendicular to the line y = 3x - 1?",
options:["x+3y+7=0","x+3y-7=0","x+3y=0","x-3y=0"],correct:1,
solution:`
${STEP("Find perpendicular line",
`Given line: y = 3x&minus;1, slope = 3<br><br>Perpendicular slope = &minus;1/3<br><br>Line through (1,2) with slope &minus;1/3:<br>(y&minus;2) = &minus;1/3(x&minus;1)<br>3(y&minus;2) = &minus;(x&minus;1)<br>3y&minus;6 = &minus;x+1<br><span class="hl">x+3y&minus;7 = 0</span>`,
`m&sub;perp; = &minus;1/m = &minus;1/3<br><br>Point-slope: y&minus;y&sub;1; = m(x&minus;x&sub;1;)<br>y&minus;2 = &minus;(1/3)(x&minus;1)<br>x+3y = 7`)}
${RES("&#8756; Answer: x+3y-7=0 (Option B)")}`},

{id:313,num:"Q27",subject:"Mathematics",section:"SUPR",year:2021,chapter:"Calculus (Rolle's Theorem)",
text:"f(x)=cx^(2/3). If Rolle's theorem is applicable on f(x) in the interval [0,2]. Find C.",
options:["0","1","2","3"],correct:0,
solution:`
${STEP("Apply Rolle's theorem condition",
`Rolle's theorem: f(a) = f(b)<br><br>f(0) = c&times;0 = 0<br>f(2) = c&times;2&sup2;&sup;/&sup3; = c&times;&sup3;&radic;4<br><br>For f(0) = f(2):<br>0 = c&times;&sup3;&radic;4<br>&there4; <span class="hl">c = 0</span>`,
`Rolle's theorem requires f(a)=f(b)<br>f(0)=0, f(2)=c&times;&sup3;&radic;4<br><br>For equality: c=0`)}
${RES("&#8756; Answer: C = 0 (Option A)")}`},

{id:314,num:"Q28",subject:"Mathematics",section:"SUPR",year:2021,chapter:"Integral Calculus (King's Property)",
text:"Evaluate ∫₀^(π/2) √sinx/(√sinx+√cosx) dx",
options:["π/2","π/4","π/6","π/8"],correct:1,
solution:`
${STEP("Apply King's property",
`Let I = &int;&sub;0;&sup;&pi;/2; &radic;sinx/(&radic;sinx+&radic;cosx) dx &nbsp;...(i)<br><br>By King's property [replace x with &pi;/2&minus;x]:<br>I = &int;&sub;0;&sup;&pi;/2; &radic;cosx/(&radic;cosx+&radic;sinx) dx &nbsp;...(ii)<br><br>Add (i)+(ii):<br>2I = &int;&sub;0;&sup;&pi;/2; 1 dx = &pi;/2<br><br>I = <span class="hl">&pi;/4</span>`,
`King's property:<br>&int;&sub;0;&sup;a; f(x)dx = &int;&sub;0;&sup;a; f(a&minus;x)dx<br><br>Classic result:<br>2I = &pi;/2 &rarr; I = &pi;/4`)}
${RES("&#8756; Answer: π/4 (Option B)")}`},

{id:315,num:"Q30",subject:"Physics",section:"SUPR",year:2021,chapter:"Thermodynamics (Carnot Engine)",
text:"A Carnot engine working in the range of 400K to 800K gives an output power of 1200J. What is the power input?",
options:["300J","400J","500J","2400J"],correct:3,
solution:`
${STEP("Carnot efficiency and power",
`&eta; = 1 &minus; T&sub;2;/T&sub;1; = 1 &minus; 400/800 = 1 &minus; 1/2 = 1/2<br><br>&eta; = Output/Input<br>1/2 = 1200/Input<br><span class="hl">Input = 2400 J</span>`,
`Carnot efficiency:<br>&eta; = 1 &minus; T<sub>L</sub>/T<sub>H</sub> = 1/2<br><br>&eta; = W/Q<sub>H</sub><br>Q<sub>H</sub> = W/&eta; = 1200/(1/2) = 2400 J`)}
${RES("&#8756; Answer: 2400 J (Option D)")}`},

{id:316,num:"Q31",subject:"Mathematics",section:"SUPR",year:2021,chapter:"Calculus (Limits)",
text:"Evaluate lim(x→∞) (x²-x-2)/(x²-4x+4) = ?",
options:["0","1","-1","-∞"],correct:1,
solution:`
${STEP("Evaluate limit",
`lim<sub>x&rarr;&infin;</sub> (x&sup2;&minus;x&minus;2)/(x&sup2;&minus;4x+4)<br><br>Divide by x&sup2;:<br>= lim (1&minus;1/x&minus;2/x&sup2;)/(1&minus;4/x+4/x&sup2;)<br>= <span class="hl">1/1 = 1</span>`,
`Highest degree same in num & denom<br>lim = ratio of leading coefficients = 1/1 = 1`)}
${RES("&#8756; Answer: 1 (Option B)")}`},

{id:317,num:"Q36",subject:"Mathematics",section:"SUPR",year:2021,chapter:"Calculus (Special Limit)",
text:"Evaluate lim(x→0) ((1+ax)/(1-bx))^(1/x) ?",
options:["e^(a-b)","1","e","b-a"],correct:4,
solution:`
${STEP("1^∞ form limit",
`This is 1&sup;&infin; form<br><br>lim(1+ax)/(1&minus;bx))^(1/x) = e<sup>k</sup><br><br>where k = lim<sub>x&rarr;0</sub> [(1+ax)/(1&minus;bx) &minus; 1]/x<br>= lim [(1+ax &minus; 1+bx)/(x(1&minus;bx))]<br>= lim [(a+b)x / (x(1&minus;bx))]<br>= a+b<br><br>&there4; Answer = <span class="hl">e^(a+b)</span>`,
`1&sup;&infin; form:<br>e<sup>lim(f&minus;1)/x</sup><br><br>= e<sup>a+b</sup>`)}
${RES("&#8756; Answer: e^(a+b) (Option E — None of these)")}`},

{id:318,num:"Q41",subject:"Mathematics",section:"SUPR",year:2021,chapter:"Sets (Polynomial Roots)",
text:"Find the set S from the following options which contain the root of the polynomial 1+x+x²+x³+...+xⁿ",
options:["{0}","{0,1,-1}","{0, n+1th roots of unity} - {1}","{0,1}"],correct:2,
solution:`
${STEP("Analyze the polynomial",
`P(x) = 1+x+x&sup2;+...+x<sup>n</sup> = (x<sup>n+1</sup>&minus;1)/(x&minus;1) for x&ne;1<br><br>Roots of P(x) = 0 when x<sup>n+1</sup>&minus;1 = 0 but x &ne; 1<br><br>x<sup>n+1</sup> = 1 &rarr; (n+1)th roots of unity<br>Excluding x=1 (since denominator would be 0)<br><br>&there4; Roots = <span class="hl">{(n+1)th roots of unity} &minus; {1}</span>`,
`Sum of GP = (x<sup>n+1</sup>&minus;1)/(x&minus;1)<br><br>Roots: x<sup>n+1</sup>=1 except x=1<br>= nth roots of unity &minus; {1}`)}
${RES("&#8756; Answer: {0, n+1th roots of unity} - {1} (Option C)")}`},

{id:319,num:"Q44",subject:"Mathematics",section:"SUPR",year:2021,chapter:"Probability (Balls Marking)",
text:"Two persons A and B mark three balls independently with number 1, 2 and 3 respectively. What is the probability that at least one of the balls is marked by the same number by both A and B?",
options:["2/3","1/3","2/5","5/3"],correct:0,
solution:`
${STEP("Use complementary counting",
`Total ways each person marks 3 balls = 3! = 6<br>Total combinations = 6&times;6 = 36<br><br>P(no match) = derangements of 3 = 2<br>For each of B's arrangements: P(A's matches none) = 2/6 = 1/3<br><br>P(at least 1 match) = 1 &minus; P(no match) = 1 &minus; 1/3 = <span class="hl">2/3</span>`,
`Derangements of 3 = 2<br>P(no match) = 2/6 = 1/3<br><br>P(at least 1) = 1 &minus; 1/3 = 2/3`)}
${RES("&#8756; Answer: 2/3 (Option A)")}`},

{id:320,num:"Q45",subject:"Physics",section:"SUPR",year:2021,chapter:"Probability (Ants on Cube)",
text:"Eight ants are present at the eight corners of the cube. Each ant starts to move towards its adjacent corner. Find the probability such that no two ants collide with each other?",
options:["4/2187","2/2187","8/729","9/4374"],correct:1,
solution:`
${STEP("Count non-colliding paths",
`Each ant has 3 choices (3 adjacent corners)<br>Total paths = 3&sup8; = 6561<br><br>No collision cases:<br>Case 1: All ants rotate in same direction on faces<br>Case 2: All follow Hamiltonian cycles<br><br>Favorable = 24 (12 from opposite face rotations + 12 from Hamiltonian)<br><br>P = 24/6561 = 8/2187... closer to <span class="hl">2/2187</span> per key<br>Actually = 24/6561 = 8/2187`,
`Total = 3&sup8; = 6561<br><br>Favorable = 12+12 = 24<br>P = 24/6561 = 8/2187<br><br>Key shows B = 2/2187`)}
${RES("&#8756; Answer: 8/2187 (Option B) — per answer key; calculation gives 8/2187")}`},
