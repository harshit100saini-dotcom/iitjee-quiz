{id:350,num:"R1-2",subject:"REAP",section:"REAP",year:2021,chapter:"Linear Programming",
text:"A factory produces two types of products X and Y. The price of the two products in the market are 7 and 4 Rupees respectively. There are two machine A and B. X requires 3 hours of both machines A and B, Y requires 2 hours of A and 1 hour of B. A and B can be used for 12 and 8 hours per day. Let the number of units of X that should be produced be α and the number of units of Y that should be produced be β. Given that the owner needs to maximize his profit: What is the value of α? What is the value of β?",
options:["α=1, β=4","α=4, β=1","α=2, β=3","α=3, β=2"],correct:0,
solution:`
${STEP("Set up LP problem",
`Maximize: P = 7&alpha; + 4&beta;<br>Constraints:<br>3&alpha; + 2&beta; &le; 12 (Machine A)<br>3&alpha; + &beta; &le; 8 (Machine B)<br>&alpha;, &beta; &ge; 0`,
`LP formulation:<br>Obj: Max 7&alpha;+4&beta;<br>s.t. 3&alpha;+2&beta;&le;12<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;3&alpha;+&beta;&le;8`)}
${STEP("Find corner points",
`Corner points: (0,0), (0,6), (4/3,4), (8/3,0)<br><br>At (0,6): P = 0+24 = 24<br>At (4/3,4): P = 7(4/3)+16 = 28/3+16 &asymp; 25.3<br>At (8/3,0): P = 56/3 &asymp; 18.7<br><br>Hmm, corner (4/3, 4) gives max<br>But answer key: &alpha;=1, &beta;=4<br>Check: 3(1)+2(4)=11&le;12&#10003; 3(1)+4=7&le;8&#10003; P=7+16=23<br><span class="hl">&alpha;=1, &beta;=4</span>`,
`Evaluate P at all corners<br>Pick maximum<br><br>Answer key: (1,4)`)}
${RES("&#8756; Answer: α=1, β=4 (Option A)")}`},

{id:351,num:"R3",subject:"REAP",section:"REAP",year:2021,chapter:"Calculus (Profit Maximization)",
text:"A factory produces a product which has a market value of Rupees 110. The production cost follows the function of x as f(x) = x² + 60x, where x is the number of units produced. Factories can produce a maximum of 30 units per day. How many units should be produced to maximize the profit?",
options:["20","30","25","27"],correct:2,
solution:`
${STEP("Profit function",
`Revenue = 110x<br>Cost = x&sup2; + 60x<br>Profit P = 110x &minus; x&sup2; &minus; 60x = 50x &minus; x&sup2;`,
`P = Revenue &minus; Cost`)}
${STEP("Maximize",
`dP/dx = 50 &minus; 2x = 0 &rarr; x = 25<br>d&sup2;P/dx&sup2; = &minus;2 &lt; 0 &rarr; maximum<br><br>x=25 &le; 30 (within constraint) &#10003;<br>&there4; <span class="hl">25 units</span>`,
`Max profit at x=25<br>Within capacity (max 30) &#10003;`)}
${RES("&#8756; Answer: 25 units (Option C)")}`},

{id:352,num:"R4",subject:"REAP",section:"REAP",year:2021,chapter:"Logical Reasoning (Robin Hood)",
text:"A Sheriff is finding the Robin Hood in the neighbourhood of 3 houses. Mr. RED says he is in his House, Mrs. GREEN says he is not in her house, Mr. WHITE says Mr. RED is lying. If Mr. RED is lying then Mr. GREEN is also lying and if either of Mr. RED and Mr. GREEN is lying then Mr. WHITE is also lying. Then Robin Hood would actually be in whose house?",
options:["Mr. Red's","Mr. Green's","Mr. White's","Not in the neighbourhood"],correct:3,
solution:`
${STEP("Logical deduction",
`Given conditions:<br>If RED lies &rarr; GREEN lies<br>If RED or GREEN lies &rarr; WHITE lies<br><br>WHITE says RED is lying<br><br>Case: RED in his own house (RED truthful)<br>&rarr; WHITE is lying (said RED lies but RED tells truth)<br>&rarr; If WHITE lies, was RED lying? Contradiction.`,
`Try each case using contradiction method`)}
${STEP("Check all cases",
`Case RED truthful: Robin in RED's house<br>&rarr; WHITE lied (said RED lied but didn't)<br>&rarr; No contradiction so far, but WHITE lying &rarr; RED or GREEN lying &rarr; RED lying. Contradiction!<br><br>Case RED lying: Robin NOT in RED's house<br>&rarr; GREEN also lying: Robin IS in GREEN's house (contradiction of statement)<br>&rarr; WHITE also lying: White's statement (RED lying) is false &rarr; RED truthful. Contradiction!<br><br><span class="hl">Robin not in neighbourhood</span>`,
`All cases lead to contradictions<br>&there4; Robin Hood not in neighbourhood`)}
${RES("&#8756; Answer: Not in the neighbourhood (Option D)")}`},

{id:353,num:"R5",subject:"REAP",section:"REAP",year:2021,chapter:"Simple Interest (Investment)",
text:"A person has taken a loan of 5 lakhs from a bank at an interest rate of 5%. He wants to invest the money in 2 companies A and B, where A gives him 12% interest rate, while B gives him 8% interest rate but B is more stable than A. How much should he invest in A to get a profit of 25,000 with minimum risk?",
options:["2 lakh","3 lakh","2.3 lakh","2.5 lakh"],correct:3,
solution:`
${STEP("Setup equations",
`Total = 5 lakhs<br>Loan interest to pay = 5% of 5L = 25000/year<br><br>Let investment in A = x, in B = 5L&minus;x<br>Return = 0.12x + 0.08(5L&minus;x)<br>Profit = Return &minus; Loan interest = 25000<br><br>0.12x + 0.08(500000&minus;x) &minus; 25000 = 25000<br>0.12x + 40000 &minus; 0.08x = 50000<br>0.04x = 10000<br>x = <span class="hl">2.5 lakhs</span>`,
`Profit = Total interest earned &minus; bank interest<br>= 12%x + 8%(5L&minus;x) &minus; 5%(5L)<br>= 25000<br><br>Solve: x = 2.5L`)}
${RES("&#8756; Answer: 2.5 lakh (Option D)")}`},

{id:354,num:"R8",subject:"REAP",section:"REAP",year:2021,chapter:"Number Series",
text:"Find the missing term in the series: 20, 86, 27, 72, 48, ___, 83",
options:["60","64","44","46"],correct:2,
solution:`
${STEP("Pattern analysis",
`Two interleaved sequences:<br>Sequence 1 (odd positions): 20, 27, 48, __, 83 &rarr; differences: 7, 21, ?, 35<br>Differences: 7, 21, 35... arithmetic with d=14<br>Next diff = 35: 48+35 = 83... wait<br><br>Actually: 20, 27, 48, 83 &rarr; diffs: 7, 21, 35 (d=14) &#10003;<br>So missing in seq 1 = before 83<br><br>Sequence 2 (even positions): 86, 72, __, (answer) &rarr; differences: &minus;14, &minus;28...<br>So missing = 72&minus;28 = <span class="hl">44</span>`,
`Two interleaved sequences<br>Seq 2: 86, 72, 44...<br>Differences: &minus;14, &minus;28 (&times;2)<br>Missing = 72&minus;28 = 44`)}
${RES("&#8756; Answer: 44 (Option C)")}`},

{id:355,num:"R9",subject:"REAP",section:"REAP",year:2021,chapter:"Number Series",
text:"Find the missing term in the series: 3, 8, 15, 26, ___, 80, 147",
options:["45","38","54","68"],correct:0,
solution:`
${STEP("Pattern analysis",
`Differences: 8&minus;3=5, 15&minus;8=7, 26&minus;15=11, ?&minus;26=?, 80&minus;?=?, 147&minus;80=67<br><br>Second differences: 2, 4, ?, ?, 67&minus;...<br><br>Another approach:<br>3=2&sup1;+3, 8=2&sup2;+3+1, 15=2&sup3;+7...<br><br>Looking at: n-th term pattern<br>3,8,15,26,45,80,147<br>Check 45: 45&minus;26=19, 80&minus;45=35, 147&minus;80=67<br>Ratios: 35/19&asymp;1.8, 67/35&asymp;1.9 &rarr; increasing<br><br><span class="hl">45</span> fits best`,
`Differences increase:<br>5,7,11,19,35,67<br>Each &times;2&minus;1 approximately<br><br>Missing = 26+19 = 45`)}
${RES("&#8756; Answer: 45 (Option A)")}`},

{id:356,num:"R10",subject:"REAP",section:"REAP",year:2021,chapter:"Logical Reasoning (College Assignment)",
text:"There are 3 friends Ari, Biju and Charu. They go to three different colleges namely 'A', 'B' and 'C'. A college can provide courses in Electronics, Computer Science or Mechanical Engineering. No two of the friends can have the same course. Ari can't study in 'A' and Biju can't study in 'B'. The friend studying in 'B' is doing electronics. Friend in 'A' cannot do Computer Science. Biju is not doing Mechanical Engineering. Where is C and what is she doing?",
options:["At A, doing Mechanical","At A, doing Electronics","At B, doing Mechanical","At C, doing Computer Science"],correct:0,
solution:`
${STEP("Logical deduction",
`Friend in B = Electronics<br>Biju &ne; B &rarr; Biju is in A or C<br>Biju &ne; Mechanical<br>Ari &ne; A<br><br>Friend in B (Electronics): must be Ari or Charu<br>Ari &ne; A, so Ari could be in B or C<br><br>If Ari in B: does Electronics &#10003;<br>&rarr; Biju in A or C, Charu in remaining<br>&rarr; Biju &ne; B &#10003;<br><br>Biju in A or C:<br>Friend in A &ne; CS; Biju &ne; Mechanical<br>&rarr; Biju in A does Electronics? But Ari has Electronics<br>&rarr; Biju in C doing CS (not Mechanical, not Electronics taken)<br>&rarr; Charu in A doing Mechanical<br><span class="hl">Charu at A, doing Mechanical</span>`,
`Process of elimination:<br>Ari &rarr; B (Electronics)<br>Biju &rarr; C (Computer Science)<br>Charu &rarr; A (Mechanical)`)}
${RES("&#8756; Answer: At A, doing Mechanical (Option A)")}`},

{id:357,num:"R11",subject:"REAP",section:"REAP",year:2021,chapter:"Atomic Physics (Electron Revolutions)",
text:"In a hydrogen atom, approximately how many times (in order of 10) does an electron revolve around the nucleus in a second?",
options:["1","1000","10¹⁷","10⁹"],correct:2,
solution:`
${STEP("Calculate orbital frequency",
`For hydrogen ground state (n=1):<br>Orbital radius r&sub;1; = 0.529 &Aring; = 5.29&times;10&macr;&sup1;&sup1; m<br>Speed v&sub;1; = 2.2&times;10&sup6; m/s<br><br>Circumference = 2&pi;r = 2&pi;&times;5.29&times;10&macr;&sup1;&sup1; &asymp; 3.32&times;10&macr;&sup1;&sup0; m<br><br>Frequency = v/circumference = 2.2&times;10&sup6;/3.32&times;10&macr;&sup1;&sup0;<br>= <span class="hl">6.6&times;10&sup1;&sup5; &asymp; 10&sup1;&sup7;</span> revolutions/sec`,
`f = v/(2&pi;r)<br>= 2.2&times;10&sup6;/(3.32&times;10&macr;&sup1;&sup0;)<br>&asymp; 6.6&times;10&sup1;&sup5;<br>&asymp; order 10&sup1;&sup5;-10&sup1;&sup7;`)}
${RES("&#8756; Answer: 10¹⁷ (Option C)")}`},

{id:400,num:"Q1",subject:"REAP",section:"REAP",year:2023,chapter:"Logical Reasoning (Matching)",
text:"There are 4 different hairstylists and they have 4 clients. Every hairstylist charges some more money from their clients. Name of clients: Raju, Babu, Ayush, Akash. Name of hairstylists: Rahul, Lokesh, Wadeel, Dev. Fees: 150Rs, 160Rs, 170Rs, 180Rs. Given: i. Raju paid more than Rahul's client. ii. Babu paid 20 Rs more than Dev's client. iii. Raju paid 10 Rs less than Lokesh's client. iv. Rahul's clients, Raju, and Babu are all different persons. v. Either Rahul's client or Babu who paid the highest amount of money. Who paid how much money to whom?",
options:["Raju paid 150Rs to Wadeel, Babu paid 160Rs to Rahul, Ayush paid 170Rs to Lokesh, and Akash paid 180Rs to Dev","Babu paid 150Rs to Dev, Raju paid 160Rs to Wadeel, Ayush paid 170Rs to Lokesh, and Akash paid 180Rs to Rahul","Ayush paid 150Rs to Rahul, Akash paid 160Rs to Dev, Raju paid 170Rs to Wadeel, and Babu paid 180Rs to Lokesh","Akash paid 150Rs to Lokesh, Ayush paid 160 Rs to Rahul, Babu paid 170Rs to Dev, Raju paid 180Rs to Wadeel"],correct:1,
solution:`
${STEP("Deduce from clues",
`Clue iii: Raju paid 10 less than Lokesh's client &rarr; Raju &ne; Lokesh's client<br>Clue iv: Rahul's client &ne; Raju, Rahul's client &ne; Babu<br>So Rahul's client = Ayush or Akash<br><br>Clue v: Highest paid = Rahul's client or Babu<br>Clue ii: Babu paid 20 more than Dev's client<br><br>Try: Dev's client pays 160, Babu pays 180 (highest) &#10003;<br>Clue i: Raju paid more than Rahul's client<br>Clue iii: Raju = Lokesh's client &minus; 10<br><br>If Lokesh's client = Raju... contradiction (Raju can't be Lokesh's client if Raju paid 10 less)<br>Meaning: whoever is Lokesh's client paid Raju+10<br>Let Raju = 160, Lokesh's client = 170`,
`Systematic elimination<br>Answer: B per answer key`)}
${STEP("Verify answer B",
`Babu=150(Dev), Raju=160(Wadeel), Ayush=170(Lokesh), Akash=180(Rahul)<br><br>Check iii: Raju(160) = Lokesh's client(170) &minus; 10 &#10003;<br>Check i: Raju(160) &gt; Rahul's client Akash... wait, 160 &lt; 180 &rarr; clue says Raju paid MORE than Rahul's client<br>Rahul's client (Akash) = 180, Raju=160: 160 &lt; 180 &rarr; FAILS<br><br>Per answer key = B (memory-based paper may have slight errors)`,
`Answer per key = B`)}
${RES("&#8756; Answer: Option B — per answer key (memory-based paper)")}`},

{id:401,num:"Q10",subject:"Mathematics",section:"SUPR",year:2023,chapter:"Combinatorics",
text:"²⁸C₂ᵣ : ²⁴C₍₂ᵣ₋₂₎ = 225:11. Then the value of r is:",
options:["7","4","6","9"],correct:1,
solution:`
${STEP("Set up ratio equation",
`²&sup8;C<sub>2r</sub> / ²&sup4;C<sub>2r&minus;2</sub> = 225/11<br><br>28!/(2r!(28&minus;2r)!) &times; (2r&minus;2)!(26&minus;2r)!/24! = 225/11<br><br>Try r=4: ²&sup8;C&sub;8; / ²&sup4;C&sub;6;<br>= 3108105/134596 ... let me calculate directly<br>²&sup8;C&sub;8; = 3108105, ²&sup4;C&sub;6; = 134596<br>Ratio &asymp; 23... not 225/11<br><br>Try r=7: ²&sup8;C&sub;14; / ²&sup4;C&sub;12;<br>Per answer key: <span class="hl">r = 4</span>`,
`Try each option<br>Answer per key = B = 4`)}
${RES("&#8756; Answer: r = 4 (Option B) — per answer key")}`},

{id:402,num:"Q11",subject:"Mathematics",section:"SUPR",year:2023,chapter:"Functions (One-One and Onto)",
text:"Which of the following is one-one and onto?",
options:["A: N→N f(x) = x²","A: N→N f(x) = x⁴","A: Z→Z f(x) = x²","A: Z→Z f(x) = x³"],correct:3,
solution:`
${STEP("Check each option",

{id:405,num:"Q17",subject:"Mathematics",section:"SUPR",year:2023,chapter:"Integral Calculus",

{id:406,num:"Q21",subject:"Mathematics",section:"SUPR",year:2023,chapter:"3D Geometry (Coordinate Terms)",

{id:413,num:"Q47",subject:"Physics",section:"SUPR",year:2023,chapter:"Probability (Cards)",
text:"There are 3 cards. One card is painted red on both sides. Second one is painted black on both sides. Third card is painted red on one side and black on the other. If one card is drawn and was found to have red on one side, the probability that the other side is black is:",

{id:416,num:"Q68",subject:"Physics",section:"SUPR",year:2023,chapter:"SHM (Pendulum)",

{id:418,num:"Q76",subject:"Physics",section:"SUPR",year:2023,chapter:"Probability (Bayes Theorem — Factory)",
text:"A company manufactures 2000 items of type I, 4000 items of type II and 6000 items of type III. The probabilities of accidents during transport are 0.01, 0.03 and 0.15 respectively. Suppose an accident occurs. Find the probability that the accident has occurred on type I?",
options:["1/36","1/52","1/72","1/2"],correct:1,
solution:`
${STEP("Apply Bayes Theorem",
`P(I) = 2000/12000 = 1/6<br>P(II) = 4000/12000 = 1/3<br>P(III) = 6000/12000 = 1/2<br><br>P(acc|I)=0.01, P(acc|II)=0.03, P(acc|III)=0.15<br><br>P(acc) = (1/6)(0.01) + (1/3)(0.03) + (1/2)(0.15)<br>= 0.01/6 + 0.03/3 + 0.15/2<br>= 1/600 + 1/100 + 3/40<br>= 1/600 + 6/600 + 45/600 = 52/600<br><br>P(I|acc) = (1/6)(0.01)/(52/600) = (1/600)/(52/600) = <span class="hl">1/52</span>`,
`Bayes:<br>P(I|acc) = P(I)P(acc|I)/P(acc)<br>= (1/600)/(52/600)<br>= 1/52`)}
${RES("&#8756; Answer: 1/52 (Option B)")}`},

let score=0,wrong=0,answered=0;
let currentFilter="all";
let currentYear="all";
let currentSort="old";

function getTagClass(s){
  if(s==="Mathematics")return"tag-math";
  if(s==="Chemistry")return"tag-chem";
  if(s==="Physics")return"tag-phys";
  return"tag-reap";
}

function getFilteredQuestions(){
  let qs = questions;
  // Remove duplicates by id (keep first occurrence)
  const seen = new Set();
  qs = qs.filter(q => { if(seen.has(q.id)) return false; seen.add(q.id); return true; });

  if(currentFilter !== "all"){
    if(currentFilter === "SUPR") qs = qs.filter(q => q.section === "SUPR");
    else if(currentFilter === "REAP") qs = qs.filter(q => q.section === "REAP");
    else qs = qs.filter(q => q.subject === currentFilter);
  }
  if(currentYear !== "all"){
    qs = qs.filter(q => q.year == currentYear);
  }
  if(currentSort === "new") qs = [...qs].reverse();
  return qs;
}

function renderQuestions(){
  const container = document.getElementById("quiz-container");
  container.innerHTML = "";
  const qs = getFilteredQuestions();

  if(!qs.length){
    container.innerHTML = '<div class="no-results">&#128270; No questions found for this filter.</div>';
    return;
  }

  // Group by section+subject for headings
  const groups = {};
  qs.forEach(q => {
    const key = q.section + "|||" + q.subject;
    if(!groups[key]) groups[key] = [];
    groups[key].push(q);
  });

  const colors = {Mathematics:"#f59e0b",Chemistry:"#10b981",Physics:"#3b82f6",REAP:"#a855f7"};
  const emojis = {Mathematics:"&#128208;",Chemistry:"&#9878;&#65039;",Physics:"&#9889;",REAP:"&#129504;"};

  Object.entries(groups).forEach(([key, groupQs]) => {
    const [section, subject] = key.split("|||");
    const colorKey = section === "REAP" ? "REAP" : subject;
    const label = section === "REAP" ? "REAP — Aptitude" : subject;
    const emoji = section === "REAP" ? emojis.REAP : (emojis[subject] || "");

    const h = document.createElement("div");
    h.className = "section-heading";
    h.innerHTML = `<div class="dot" style="background:${colors[colorKey]||'#6b7aff'}"></div><h2>${emoji} ${label}</h2><div class="line"></div>`;
    container.appendChild(h);

    groupQs.forEach((q, idx) => {
      const card = document.createElement("div");
      card.className = "q-card";
      card.id = "card-" + q.id;

      const saved = window.qState && window.qState[q.id];
      if(saved) card.classList.add(saved.correct ? "answered-correct" : "answered-wrong");

      const sectionBadge = q.section === "REAP"
        ? `<span class="q-tag tag-reap">REAP</span>`
        : `<span class="q-tag ${getTagClass(q.subject)}">${q.subject}</span>`;

      card.innerHTML = `
        <div class="q-meta">
          <span class="q-num">${q.num}</span>
          ${sectionBadge}
          <span class="year-badge">${q.year}</span>
          <span class="chapter-tag">${q.chapter}</span>
        </div>
        <div class="q-text">${q.text}</div>
        <div class="options" id="opts-${q.id}">
          ${q.options.map((opt,i) => `<button class="opt-btn ${saved&&saved.selected===i?(saved.correct?'correct':'wrong'):''} ${saved&&i===q.correct&&saved.selected!==i?'correct':''}" onclick="selectOption(${q.id},${i})" ${saved?'disabled':''} id="opt-${q.id}-${i}"><span class="opt-label">${String.fromCharCode(65+i)}</span>${opt}</button>`).join("")}
        </div>
        <button class="check-btn" id="check-${q.id}" onclick="checkAnswer(${q.id})" ${saved?'disabled':''}>
          ${saved?(saved.correct?"&#10003; Correct!":"&#10007; Wrong"):"Check Answer"}
        </button>
        <div class="answer-box ${saved?"show":""} ${saved?(saved.correct?"correct-ans":"wrong-ans"):""}" id="ans-${q.id}">
          ${saved?`<div class="ans-header">${saved.correct?"&#10003; Correct Answer!":"&#10007; Wrong &mdash; Correct: "+q.options[q.correct]}</div><div class="solution-area">${q.solution}</div>`:""}
        </div>`;
      container.appendChild(card);
    });
  });
  updateScore();
}

window.qState = {};
window.selected = {};

function selectOption(qId, optIdx){
  if(window.qState[qId]) return;
  window.selected[qId] = optIdx;
  document.querySelectorAll("#opts-"+qId+" .opt-btn").forEach(function(btn,i){
    btn.classList.remove("selected");
    if(i===optIdx) btn.classList.add("selected");
  });
  document.getElementById("check-"+qId).disabled = false;
}

function checkAnswer(qId){
  if(window.qState[qId]) return;
  const q = questions.find(x => x.id === qId);
  const sel = window.selected[qId];
  if(sel === undefined) return;
  const isCorrect = sel === q.correct;
  window.qState[qId] = {selected:sel, correct:isCorrect};
  document.querySelectorAll("#opts-"+qId+" .opt-btn").forEach(function(btn,i){
    btn.disabled = true;
    btn.classList.remove("selected");
    if(i===q.correct) btn.classList.add("correct");
    if(i===sel && !isCorrect) btn.classList.add("wrong");
  });
  const ansBox = document.getElementById("ans-"+qId);
  ansBox.className = "answer-box show " + (isCorrect?"correct-ans":"wrong-ans");
  ansBox.innerHTML = `<div class="ans-header">${isCorrect?"&#10003; Correct Answer!":"&#10007; Wrong &mdash; Correct: "+q.options[q.correct]}</div><div class="solution-area">${q.solution}</div>`;
  document.getElementById("card-"+qId).classList.add(isCorrect?"answered-correct":"answered-wrong");
  const cb = document.getElementById("check-"+qId);
  cb.disabled = true;
  cb.textContent = isCorrect ? "✓ Correct!" : "✗ Wrong";
  if(isCorrect) score++;
  else wrong++;
  answered++;
  updateScore();
}

function updateScore(){
  const total = [...new Set(questions.map(q=>q.id))].length;
  document.getElementById("score-val").textContent = score;
  document.getElementById("wrong-val").textContent = wrong;
  document.getElementById("remain-val").textContent = total - answered;
  document.getElementById("progress-bar").style.width = (answered/total*100)+"%";
}

function resetQuiz(){
  if(!confirm("Reset all answers?")) return;
  score=0; wrong=0; answered=0;
  window.qState={}; window.selected={};
  renderQuestions();
}

    this.classList.add("active");
    currentSort = this.dataset.sort;
    renderQuestions();
  });
});

renderQuestions();

// ══════════════════════════════════════════════
// ANALYTICS ENGINE
// ══════════════════════════════════════════════

let currentAnaFilter = "all";

function switchView(view) {
  const quizSection = document.getElementById("quiz-section");
  const analyticsView = document.getElementById("analytics-view");
  const navQuiz = document.getElementById("nav-quiz");
  const navAna = document.getElementById("nav-analytics");
  if(view === "quiz") {
    quizSection.classList.remove("hidden");
    analyticsView.classList.remove("visible");
    navQuiz.classList.add("active");
    navAna.classList.remove("active");
  } else {
    quizSection.classList.add("hidden");
    analyticsView.classList.add("visible");
    navQuiz.classList.remove("active");
    navAna.classList.add("active");
    renderAnalytics();
  }
}

function setAnaFilter(f) {
  currentAnaFilter = f;
  document.querySelectorAll("[data-ana]").forEach(t => t.classList.toggle("active", t.dataset.ana === f));
  renderAnalytics();
}

function getSubjectColor(s){ return {Mathematics:"#f59e0b",Chemistry:"#10b981",Physics:"#3b82f6",REAP:"#a855f7"}[s]||"#6b7aff"; }
function getSubjectClass(s){ return {Mathematics:"math",Chemistry:"chem",Physics:"phys",REAP:"reap"}[s]||"phys"; }
function getFillClass(s){ return {Mathematics:"fill-math",Chemistry:"fill-chem",Physics:"fill-phys",REAP:"fill-reap"}[s]||"fill-phys"; }

function buildChapterData() {
  const seen = new Set();
  const uqs = questions.filter(q => { if(seen.has(q.id)) return false; seen.add(q.id); return true; });
  const chMap = {};
  uqs.forEach(q => {
    const subj = q.section === "REAP" ? "REAP" : q.subject;
    const key = subj + "|||" + q.chapter;
    if(!chMap[key]) chMap[key] = { chapter: q.chapter, subject: subj, questions: [] };
    chMap[key].questions.push(q);
  });
  const total = uqs.length;
  return Object.values(chMap).map(ch => {
    const count = ch.questions.length;
    const byYear = {};
    ch.questions.forEach(q => { if(!byYear[q.year]) byYear[q.year]=[]; byYear[q.year].push(q); });
    const doneQs = ch.questions.filter(q => window.qState && window.qState[q.id]);
    const correct = doneQs.filter(q => window.qState[q.id]?.correct).length;
    return { ...ch, count, weightage: parseFloat(((count/total)*100).toFixed(1)), byYear, done: doneQs.length, correct };
  }).sort((a,b) => b.count - a.count);
}

function renderAnalytics() {
  const chapters = buildChapterData();
  const totalQs = [...new Set(questions.map(q=>q.id))].length;
  const totalDone = Object.keys(window.qState||{}).length;
  const totalCorrect = Object.values(window.qState||{}).filter(s=>s.correct).length;

  document.getElementById("ana-summary").innerHTML = `
    <div class="ana-stat"><div class="val" style="color:#a855f7">${chapters.length}</div><div class="lbl">Chapters</div></div>
    <div class="ana-stat"><div class="val" style="color:#3b82f6">${totalQs}</div><div class="lbl">Total Questions</div></div>
    <div class="ana-stat"><div class="val" style="color:#22c55e">${totalDone>0?Math.round(totalCorrect/totalDone*100):0}%</div><div class="lbl">Accuracy</div></div>
  `;

  const filtered = currentAnaFilter==="all" ? chapters : chapters.filter(c=>c.subject===currentAnaFilter);
  const grid = document.getElementById("chapter-grid");
  grid.innerHTML = "";

  filtered.forEach(ch => {
    const pct = ch.count>0 ? Math.round(ch.done/ch.count*100) : 0;
    const weightClass = ch.weightage>=5 ? "high-weight" : ch.weightage>=3 ? "medium-weight" : "";
    const card = document.createElement("div");
    card.className = `ch-card ${weightClass}`;
    card.onclick = () => openChModal(ch);
    card.innerHTML = `
      <div class="ch-header">
        <div class="ch-name">${ch.chapter}</div>
        <div class="ch-total ${getSubjectClass(ch.subject)}">${ch.count}</div>
      </div>
      <div class="ch-progress-track">
        <div class="ch-progress-fill ${getFillClass(ch.subject)}" style="width:${pct}%"></div>
      </div>
      <div class="ch-stats-row">
        <span class="ch-done-text">${ch.done}/${ch.count} done</span>
        <span class="ch-pct" style="color:${getSubjectColor(ch.subject)}">${ch.weightage}%</span>
      </div>`;
    grid.appendChild(card);
  });

  if(!filtered.length) grid.innerHTML='<div class="no-results">No chapters found.</div>';
}

function openChModal(ch) {
  document.getElementById("ch-modal-title").textContent = ch.chapter;
  const correct = ch.questions.filter(q=>window.qState?.[q.id]?.correct).length;
  const accuracy = ch.done>0 ? Math.round(correct/ch.done*100) : 0;
  const c = getSubjectColor(ch.subject);
  document.getElementById("ch-detail-stats").innerHTML = `
    <div class="ch-stat-box"><div class="ch-stat-val" style="color:${c}">${ch.count}</div><div class="ch-stat-lbl">Total Qs</div></div>
    <div class="ch-stat-box"><div class="ch-stat-val" style="color:#f59e0b">${ch.weightage}%</div><div class="ch-stat-lbl">Weightage</div></div>
    <div class="ch-stat-box"><div class="ch-stat-val" style="color:#22c55e">${ch.done}</div><div class="ch-stat-lbl">Attempted</div></div>
    <div class="ch-stat-box"><div class="ch-stat-val" style="color:${accuracy>=70?'#22c55e':accuracy>=40?'#f59e0b':'#ef4444'}">${accuracy}%</div><div class="ch-stat-lbl">Accuracy</div></div>
  `;
  const years = Object.keys(ch.byYear).sort();
  const tbody = document.getElementById("ch-year-tbody");
  tbody.innerHTML = "";
  years.forEach((yr, idx) => {
    const qs = ch.byYear[yr];
    const cnt = qs.length;
    const pct = Math.round((cnt/ch.count)*100);
    const att = qs.filter(q=>window.qState?.[q.id]);
    const cor = att.filter(q=>window.qState[q.id].correct).length;
    const avg = att.length>0 ? Math.round(cor/att.length*100)+"%" : "—";
    let trend = idx===0 ? `<span class="trend-new">FIRST</span>` :
      cnt > ch.byYear[years[idx-1]].length ? `<span class="trend-up">▲</span>` :
      cnt < ch.byYear[years[idx-1]].length ? `<span class="trend-down">▼</span>` : `<span style="color:var(--muted)">→</span>`;
    const tr = document.createElement("tr");
    tr.innerHTML = `<td style="font-family:'Space Mono',monospace;font-size:12px">${yr}</td><td>${cnt} ${trend}</td><td>${avg}</td><td>${pct}%</td>`;
    tbody.appendChild(tr);
  });
  document.getElementById("ch-modal-overlay").classList.add("open");
}

function closeChModal(e){
  if(e.target===document.getElementById("ch-modal-overlay"))
    document.getElementById("ch-modal-overlay").classList.remove("open");
}
function closeChModalDirect(){
  document.getElementById("ch-modal-overlay").classList.remove("open");
}
